const CourseViewerSheet = ({ open, course, isSaved, onClose, onToggleSave, onOpenPlace, onPlayReel }) => {
  const [view, setView] = useState('timeline');
  const [mapIdx, setMapIdx] = useState(0);
  const mapBoxRef = useRef(null);
  const mapInstRef = useRef(null);
  const markersRef = useRef([]);
  const polylineRef = useRef(null);

  useEffect(() => {
    if (!open) return;
    const onKey = e => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [open, onClose]);

  useEffect(() => { if (open) { setView('timeline'); setMapIdx(0); } }, [open, course?.id]);

  // Kakao map for map view — SDK loaded with autoload=false, so MUST wrap in kakao.maps.load()
  useEffect(() => {
    if (!open || view !== 'map' || !course || !mapBoxRef.current) return;
    if (!(window.kakao && window.kakao.maps && window.kakao.maps.load)) return;
    let cleanedUp = false;
    window.kakao.maps.load(() => {
      if (cleanedUp || !mapBoxRef.current) return;
      try {
        const stops = course.stops;
        const center = new window.kakao.maps.LatLng(
          stops.reduce((s, p) => s + p.lat, 0) / stops.length,
          stops.reduce((s, p) => s + p.lng, 0) / stops.length
        );
        if (!mapInstRef.current) {
          mapInstRef.current = new window.kakao.maps.Map(mapBoxRef.current, { center, level: 5 });
        } else {
          mapInstRef.current.setCenter(center);
          mapInstRef.current.relayout();
        }
        // Clear previous overlays
        markersRef.current.forEach(m => m.setMap(null));
        if (polylineRef.current) polylineRef.current.setMap(null);
        markersRef.current = [];
        // Polyline connecting stops
        polylineRef.current = new window.kakao.maps.Polyline({
          path: stops.map(s => new window.kakao.maps.LatLng(s.lat, s.lng)),
          strokeWeight: 3,
          strokeColor: '#FF7A45',
          strokeOpacity: 0.85,
          strokeStyle: 'solid',
        });
        polylineRef.current.setMap(mapInstRef.current);
        // Numbered pin overlays
        stops.forEach((s, i) => {
          const el = document.createElement('div');
          el.className = 'course-pin' + (i === mapIdx ? ' active' : '');
          el.textContent = String(i + 1);
          el.onclick = () => setMapIdx(i);
          const ov = new window.kakao.maps.CustomOverlay({
            position: new window.kakao.maps.LatLng(s.lat, s.lng),
            content: el,
            yAnchor: 1,
          });
          ov.setMap(mapInstRef.current);
          markersRef.current.push(ov);
        });
        // Fit bounds
        const bounds = new window.kakao.maps.LatLngBounds();
        stops.forEach(s => bounds.extend(new window.kakao.maps.LatLng(s.lat, s.lng)));
        try { mapInstRef.current.setBounds(bounds, 60, 60, 60, 60); } catch {}
      } catch (err) {
        console.error('[QAOHROAD map] init failed:', err);
      }
    });
    return () => {
      cleanedUp = true;
      markersRef.current.forEach(m => m.setMap(null));
      markersRef.current = [];
      if (polylineRef.current) { polylineRef.current.setMap(null); polylineRef.current = null; }
    };
  }, [open, view, course, mapIdx]);

  if (!open || !course) return null;
  const stops = course.stops;
  return (
    <div className="course-view-back" onClick={onClose}>
      <div className="course-view-sheet" onClick={e => e.stopPropagation()} role="dialog" aria-label={course.title}>
        <div className="course-view-head" style={{ background: stops[0].bg }}>
          <button className="course-view-back-btn" onClick={onClose} aria-label="닫기">←</button>
          {onPlayReel && (
            <button className="course-view-reel-btn" onClick={() => onPlayReel(course)} aria-label="영상으로 이어보기">
              <span className="reel-play-ico" aria-hidden="true">▶</span>
              <span>영상으로</span>
            </button>
          )}
          <div className="course-view-head-meta">
            <div className="course-view-eyebrow">QAOHROAD ✦ {courseAgoLabel(course.startAgoH)}</div>
            <div className="course-view-title">{course.title}</div>
            <div className="course-view-sub">
              <span className="course-view-av" style={{ background: course.friend?.color || '#E5E0D0' }} />
              {course.nick}
              <span className="course-view-dot">·</span>
              <span>{stops.length}곳</span>
              <span className="course-view-dot">·</span>
              <span className="mono">{formatKm(course.totalKm)}</span>
            </div>
          </div>
        </div>
        <div className="course-view-tabs" role="tablist">
          <button
            role="tab"
            aria-selected={view === 'timeline'}
            className={"course-view-tab" + (view === 'timeline' ? ' on' : '')}
            onClick={() => setView('timeline')}
          >타임라인</button>
          <button
            role="tab"
            aria-selected={view === 'map'}
            className={"course-view-tab" + (view === 'map' ? ' on' : '')}
            onClick={() => setView('map')}
          >지도</button>
        </div>
        <div className="course-view-body">
          {view === 'timeline' ? (
            <div className="course-timeline">
              {stops.map((s, i) => (
                <div key={s.id} className="course-tl-row">
                  <div className="course-tl-rail">
                    <div className="course-tl-num">{i + 1}</div>
                    {i < stops.length - 1 && <div className="course-tl-line" />}
                  </div>
                  <button className="course-tl-card" onClick={() => onOpenPlace && onOpenPlace(s)}>
                    <div className="course-tl-cover" style={{ background: s.bg }}>
                      <div className="course-tl-emoji">{s.emoji}</div>
                    </div>
                    <div className="course-tl-meta">
                      <div className="course-tl-place">{s.placeName}</div>
                      <div className="course-tl-cap">{s.caption}</div>
                      <div className="course-tl-tags">
                        <span className="course-tl-cat">{s.placeCat}</span>
                        {s.sticker?.sub && <span className="course-tl-area">{s.sticker.sub.split('·')[0].trim()}</span>}
                        {i > 0 && (
                          <span className="course-tl-dist mono">
                            ↘ {formatKm(haversineKm(
                              { lat: stops[i - 1].lat, lng: stops[i - 1].lng },
                              { lat: s.lat, lng: s.lng }
                            ))}
                          </span>
                        )}
                      </div>
                    </div>
                  </button>
                </div>
              ))}
            </div>
          ) : (
            <div className="course-map">
              <div className="course-map-box" ref={mapBoxRef} />
              <div className="course-map-carousel">
                {stops.map((s, i) => (
                  <button
                    key={s.id}
                    className={"course-map-mini" + (i === mapIdx ? ' on' : '')}
                    onClick={() => setMapIdx(i)}
                  >
                    <div className="course-map-mini-num">{i + 1}</div>
                    <div className="course-map-mini-emoji">{s.emoji}</div>
                    <div className="course-map-mini-name">{s.placeName}</div>
                  </button>
                ))}
              </div>
              <div className="course-map-detail">
                <div className="course-map-detail-num">{mapIdx + 1}</div>
                <div className="course-map-detail-body">
                  <div className="course-map-detail-name">{stops[mapIdx].placeName}</div>
                  <div className="course-map-detail-cap">{stops[mapIdx].caption}</div>
                  <div className="course-map-detail-meta">
                    <span className="course-tl-cat">{stops[mapIdx].placeCat}</span>
                    {stops[mapIdx].sticker?.sub && <span>{stops[mapIdx].sticker.sub.split('·')[0].trim()}</span>}
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
        <div className="course-view-foot">
          <button
            className={"course-follow-btn" + (isSaved ? ' is-saved' : '')}
            onClick={() => onToggleSave(course)}
          >
            {isSaved ? '✓ 내 QAOHROAD에 저장됨 · 해제' : '✦ 이 코스 따라가기'}
          </button>
        </div>
      </div>
    </div>
  );
};

/* Cinematic reel: plays a course's stops one after another as a connected video.
   - photo stops show a ken-burns animated background
   - video stops play the actual <video> element, advancing on `ended`
   - gradient-only stops auto-advance after REEL_STOP_MS
   - top progress bars show position, like a story tray
   - tap/click left/right zone to step, ESC/×/backdrop to close */
const REEL_STOP_MS = 4800;
const CourseReelView = ({ open, course, onClose }) => {
  const [idx, setIdx] = useState(0);
  const [progress, setProgress] = useState(0);
  const rafRef = useRef(null);
  const startRef = useRef(0);
  const elapsedRef = useRef(0);
  const pausedRef = useRef(false);
  const videoRef = useRef(null);

  const stops = course?.stops || [];
  const cur = stops[idx];
  const isVideo = !!(cur && cur.video);

  useEffect(() => { if (open) { setIdx(0); setProgress(0); } }, [open, course?.id]);

  useEffect(() => {
    if (!open || !cur) return;
    if (isVideo) { setProgress(0); return () => {}; }
    startRef.current = performance.now();
    elapsedRef.current = 0;
    setProgress(0);
    const tick = (t) => {
      if (pausedRef.current) { startRef.current = t - elapsedRef.current; rafRef.current = requestAnimationFrame(tick); return; }
      elapsedRef.current = t - startRef.current;
      const pct = Math.min(100, (elapsedRef.current / REEL_STOP_MS) * 100);
      setProgress(pct);
      if (pct >= 100) {
        if (idx + 1 < stops.length) setIdx(i => i + 1);
        else onClose();
        return;
      }
      rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [open, idx, isVideo, cur?.id]);

  useEffect(() => {
    if (!open) return;
    const onKey = e => {
      if (e.key === 'Escape') onClose();
      else if (e.key === 'ArrowRight') goNext();
      else if (e.key === 'ArrowLeft') goPrev();
    };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [open, idx, stops.length]);

  const goNext = () => { if (idx + 1 < stops.length) setIdx(i => i + 1); else onClose(); };
  const goPrev = () => { if (idx > 0) setIdx(i => i - 1); };

  const setPaused = (v) => {
    pausedRef.current = v;
    const vEl = videoRef.current;
    if (vEl) { if (v) vEl.pause(); else vEl.play().catch(() => {}); }
  };
  const handleVideoTime = () => {
    const v0 = videoRef.current;
    if (!v0 || !v0.duration) return;
    setProgress(Math.min(100, (v0.currentTime / v0.duration) * 100));
  };
  const handleVideoEnded = () => { if (idx + 1 < stops.length) setIdx(i => i + 1); else onClose(); };

  if (!open || !course || !cur) return null;
  const hasPhoto = !!cur.photo;
  const subArea = cur.sticker?.sub ? cur.sticker.sub.split('·')[0].trim() : '';

  return (
    <div
      className="course-reel"
      role="dialog"
      aria-label={`${course.title} 영상으로 보기`}
      onPointerDown={() => setPaused(true)}
      onPointerUp={() => setPaused(false)}
      onPointerLeave={() => setPaused(false)}
      onPointerCancel={() => setPaused(false)}
    >
      <div className="course-reel-bg" key={cur.id} style={hasPhoto
        ? { backgroundImage: `url(${cur.photo})`, backgroundSize: 'cover', backgroundPosition: 'center', backgroundColor: '#000' }
        : isVideo ? { background: '#000' }
        : { background: cur.bg }
      }>
        {!hasPhoto && !isVideo && <div className="course-reel-emoji">{cur.emoji}</div>}
        {isVideo && (
          <video
            key={cur.id}
            ref={videoRef}
            className="course-reel-video"
            src={cur.video}
            autoPlay
            playsInline
            onTimeUpdate={handleVideoTime}
            onEnded={handleVideoEnded}
            onError={handleVideoEnded}
          />
        )}
        <div className="course-reel-shade" />
      </div>

      <div className="course-reel-bars">
        {stops.map((_, i) => (
          <div key={i} className={"course-reel-bar" + (i < idx ? ' done' : i === idx ? ' active' : '')}>
            <div className="course-reel-bar-fill" style={i === idx ? { width: progress + '%' } : undefined} />
          </div>
        ))}
      </div>

      <div className="course-reel-head">
        <div className="course-reel-eyebrow">QAOHROAD ✦ {idx + 1} / {stops.length}</div>
        <div className="course-reel-title">{course.title}</div>
        <div className="course-reel-friend">
          <span className="course-reel-av" style={{ background: course.friend?.color || '#E5E0D0' }} />
          {course.nick}
        </div>
        <button className="course-reel-close" onClick={onClose} aria-label="닫기">✕</button>
      </div>

      <div className="course-reel-stop">
        <div className="course-reel-stop-num">{idx + 1}</div>
        <div className="course-reel-stop-meta">
          <div className="course-reel-stop-name">{cur.placeName}</div>
          <div className="course-reel-stop-cap">{cur.caption}</div>
          <div className="course-reel-stop-tags">
            <span className="course-reel-tag">{cur.placeCat}</span>
            {subArea && <span className="course-reel-area">{subArea}</span>}
          </div>
        </div>
      </div>

      <div className="course-reel-zones" aria-hidden="true">
        <div className="course-reel-zone left" onClick={(e) => { e.stopPropagation(); goPrev(); }} />
        <div className="course-reel-zone right" onClick={(e) => { e.stopPropagation(); goNext(); }} />
      </div>
    </div>
  );
};

/* StopDetailSheet — tap a timeline row to see this specific stop:
   - the friend's actual upload (video > photo > gradient+emoji)
   - place info (name, category, neighborhood) + caption
   - mini kakao-map showing the spot
   - prev/next chevrons + arrow keys + swipe gestures to walk through stops
   - bottom CTA: jumps to the next stop, or "전체 코스 보기" on the last */
const StopDetailSheet = ({ open, course, stopIndex, onClose, onChangeIndex, onPlayReel }) => {
  const stops = course?.stops || [];
  const cur = stops[stopIndex];
  const isVideo = !!(cur && cur.video);
  const hasPhoto = !!(cur && cur.photo);
  const miniMapRef = useRef(null);
  const miniMapInst = useRef(null);
  const miniMarkerRef = useRef(null);
  const videoRef = useRef(null);
  const [videoTime, setVideoTime] = useState(0);
  const [videoDur, setVideoDur] = useState(0);
  const touchRef = useRef({ x: 0, y: 0, t: 0 });

  // Keyboard navigation
  useEffect(() => {
    if (!open) return;
    const onKey = e => {
      if (e.key === 'Escape') onClose();
      else if (e.key === 'ArrowRight') goNext();
      else if (e.key === 'ArrowLeft') goPrev();
    };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [open, stopIndex, stops.length]);

  // Mini map for this stop's location — SDK is autoload=false, so MUST wrap in kakao.maps.load()
  useEffect(() => {
    if (!open || !cur || !miniMapRef.current) return;
    if (!(window.kakao && window.kakao.maps && window.kakao.maps.load)) return;
    let cleanedUp = false;
    window.kakao.maps.load(() => {
      if (cleanedUp || !miniMapRef.current) return;
      try {
        const pt = new window.kakao.maps.LatLng(cur.lat, cur.lng);
        if (!miniMapInst.current) {
          miniMapInst.current = new window.kakao.maps.Map(miniMapRef.current, {
            center: pt, level: 4, draggable: false, scrollwheel: false, disableDoubleClickZoom: true,
          });
        } else {
          miniMapInst.current.setCenter(pt);
          miniMapInst.current.relayout();
        }
        if (miniMarkerRef.current) miniMarkerRef.current.setMap(null);
        const el = document.createElement('div');
        el.className = 'stop-mini-pin';
        el.textContent = String(stopIndex + 1);
        miniMarkerRef.current = new window.kakao.maps.CustomOverlay({
          position: pt, content: el, yAnchor: 1,
        });
        miniMarkerRef.current.setMap(miniMapInst.current);
      } catch (err) {
        console.error('[QAOHROAD stop-mini-map] init failed:', err);
      }
    });
    return () => {
      cleanedUp = true;
      if (miniMarkerRef.current) { miniMarkerRef.current.setMap(null); miniMarkerRef.current = null; }
    };
  }, [open, stopIndex, cur?.id]);

  // Reset video state + auto-advance progress when stop changes
  const [autoProgress, setAutoProgress] = useState(0);
  useEffect(() => {
    setVideoTime(0); setVideoDur(0); setAutoProgress(0);
  }, [stopIndex, cur?.id]);

  // Auto-advance ALL stops after ~15s (skip on the last stop, pause when sheet closes)
  useEffect(() => {
    if (!open || !cur) return;
    if (stopIndex + 1 >= stops.length) return;
    const DURATION = 15000;
    const startedAt = Date.now();
    const tickId = setInterval(() => {
      const elapsed = Date.now() - startedAt;
      setAutoProgress(Math.min(elapsed / DURATION, 1));
    }, 100);
    const timer = setTimeout(() => onChangeIndex(stopIndex + 1), DURATION);
    return () => { clearInterval(tickId); clearTimeout(timer); };
  }, [open, stopIndex, cur?.id, stops.length, onChangeIndex]);

  if (!open || !course || !cur) return null;

  const goNext = () => { if (stopIndex + 1 < stops.length) onChangeIndex(stopIndex + 1); };
  const goPrev = () => { if (stopIndex > 0) onChangeIndex(stopIndex - 1); };
  const isFirst = stopIndex === 0;
  const isLast = stopIndex === stops.length - 1;
  const subArea = cur.sticker?.sub ? cur.sticker.sub.split('·')[0].trim() : '';
  const prevStop = !isFirst ? stops[stopIndex - 1] : null;
  const nextStop = !isLast ? stops[stopIndex + 1] : null;
  const prevDist = prevStop ? haversineKm({ lat: prevStop.lat, lng: prevStop.lng }, { lat: cur.lat, lng: cur.lng }) : 0;
  const nextDist = nextStop ? haversineKm({ lat: cur.lat, lng: cur.lng }, { lat: nextStop.lat, lng: nextStop.lng }) : 0;

  const onTouchStart = e => {
    const t = e.touches[0];
    touchRef.current = { x: t.clientX, y: t.clientY, t: Date.now() };
  };
  const onTouchEnd = e => {
    const t = e.changedTouches[0];
    const dx = t.clientX - touchRef.current.x;
    const dy = t.clientY - touchRef.current.y;
    const dt = Date.now() - touchRef.current.t;
    if (dt > 500) return;
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.4) {
      if (dx < 0) goNext(); else goPrev();
    }
  };

  return (
    <div className="stop-detail-back" onClick={onClose} role="dialog" aria-label={`${cur.placeName} 상세`}>
      <div
        className="stop-detail-sheet"
        onClick={e => e.stopPropagation()}
        onTouchStart={onTouchStart}
        onTouchEnd={onTouchEnd}
      >
        <div className="stop-detail-head">
          <button className="stop-detail-close" onClick={onClose} aria-label="닫기">←</button>
          <div className="stop-detail-eyebrow">
            <span className="stop-detail-pip">{stopIndex + 1}</span>
            <span>/ {stops.length}</span>
            <span className="stop-detail-dot">·</span>
            <span>{course.nick}의 {course.title.replace(course.nick + '의 ', '')}</span>
          </div>
        </div>

        <div className="stop-detail-body">
          <div className="stop-detail-media" key={cur.id}>
            <div
              className="stop-detail-bg"
              style={hasPhoto
                ? { backgroundImage: `url(${cur.photo})`, backgroundSize: 'cover', backgroundPosition: 'center', backgroundColor: '#000' }
                : isVideo ? { background: '#000' }
                : { background: cur.bg }}
            >
              {!hasPhoto && !isVideo && (
                <div className="stop-detail-emoji-wrap">
                  <div className="stop-detail-emoji">{cur.emoji}</div>
                  <div className="stop-detail-placeholder">친구가 이 자리에 영상을 올리면 여기서 재생돼요</div>
                </div>
              )}
              {isVideo && (
                <video
                  key={cur.id}
                  ref={videoRef}
                  className="stop-detail-video"
                  src={cur.video}
                  autoPlay
                  playsInline
                  controls={false}
                  onLoadedMetadata={e => setVideoDur(e.currentTarget.duration || 0)}
                  onTimeUpdate={e => setVideoTime(e.currentTarget.currentTime || 0)}
                  onEnded={() => { if (stopIndex + 1 < stops.length) onChangeIndex(stopIndex + 1); }}
                />
              )}
              <div className="stop-detail-shade" />
              {!isLast && (
                <div className="stop-detail-vbar">
                  <div
                    className="stop-detail-vbar-fill"
                    style={{ width: (isVideo
                      ? (Math.min(videoTime, 15) / 15 * 100)
                      : (autoProgress * 100)) + '%' }}
                  />
                </div>
              )}
              <div className="stop-detail-caption">
                <span className="stop-detail-cap-emoji">{cur.emoji}</span>
                <span className="stop-detail-cap-text">{cur.caption}</span>
              </div>
            </div>

            {!isFirst && (
              <button className="stop-detail-nav prev" onClick={goPrev} aria-label="이전 정류장">‹</button>
            )}
            {!isLast && (
              <button className="stop-detail-nav next" onClick={goNext} aria-label="다음 정류장">›</button>
            )}
          </div>

          <div className="stop-detail-info">
            <div className="stop-detail-info-row">
              <span className="stop-detail-cat">{cur.placeCat}</span>
              {subArea && <span className="stop-detail-area">📍 {subArea}</span>}
            </div>
            <div className="stop-detail-name">{cur.placeName}</div>
            {cur.sticker?.sub && (
              <div className="stop-detail-sub">{cur.sticker.sub}</div>
            )}

            <div className="stop-detail-mapwrap">
              <div className="stop-detail-mapbox" ref={miniMapRef} />
              <div className="stop-detail-mapfoot">
                <span className="mono">{cur.lat.toFixed(4)}, {cur.lng.toFixed(4)}</span>
                <span className="stop-detail-mapfoot-dot">·</span>
                <span>여기였어요 ✦</span>
              </div>
            </div>

            <div className="stop-detail-trip">
              {!isFirst && (
                <div className="stop-detail-trip-row">
                  <span className="stop-detail-trip-arrow">↙</span>
                  <span className="stop-detail-trip-label">이전 정류장</span>
                  <span className="stop-detail-trip-place">{prevStop.placeName}</span>
                  <span className="stop-detail-trip-dist mono">{formatKm(prevDist)}</span>
                </div>
              )}
              {!isLast && (
                <div className="stop-detail-trip-row next">
                  <span className="stop-detail-trip-arrow">↗</span>
                  <span className="stop-detail-trip-label">다음 정류장</span>
                  <span className="stop-detail-trip-place">{nextStop.placeName}</span>
                  <span className="stop-detail-trip-dist mono">{formatKm(nextDist)}</span>
                </div>
              )}
            </div>
          </div>
        </div>

        <div className="stop-detail-foot">
          <button className="stop-detail-prev-btn" onClick={goPrev} disabled={isFirst} aria-label="이전 영상">
            ‹ 이전
          </button>
          {!isLast ? (
            <button className="stop-detail-next-btn" onClick={goNext}>
              <span className="stop-detail-next-label">다음 영상으로</span>
              <span className="stop-detail-next-place">→ {nextStop.placeName}</span>
            </button>
          ) : (
            <button className="stop-detail-next-btn finale" onClick={() => { onClose(); onPlayReel && onPlayReel(course); }}>
              <span className="stop-detail-next-label">▶ 전체 코스 영상으로 보기</span>
              <span className="stop-detail-next-place">{stops.length}개 정류장 이어서</span>
            </button>
          )}
        </div>
      </div>
    </div>
  );
};

/* ─────────────────  QAOH POINT 충전 시트  ─────────────────
   슬라이더 1 ~ 1,000,000 (1 point = 1 KRW). 빠른 칩 + 정확한 수치 입력 지원. */

/* ─────────────────  NotificationsSheet  ─────────────────
   bell 아이콘으로 열기. 4종 알림(팔로우/맞팔/핫지/스토리 답장) 탭 필터 + 시간순. */
const NOTIF_TABS = [
  { key: 'all',         label: '전체', emoji: '🔔'  },
  { key: 'follow',      label: '팔로우', emoji: '✦' },
  { key: 'mutual',      label: '맞팔',  emoji: '🤝' },
  { key: 'hotji',       label: '핫지',  emoji: '💌' },
  { key: 'story-reply', label: '답장',  emoji: '💬' },
];
const NotificationsSheet = ({ open, notifications, onClose, onClear, onOpenProfile, onOpenThread }) => {
  const [tab, setTab] = useState('all');
  useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [open, onClose]);
  useEffect(() => { if (!open) setTimeout(() => setTab('all'), 320); }, [open]);

  const filtered = useMemo(() => {
    const list = tab === 'all' ? notifications : notifications.filter(n => n.type === tab);
    return list.slice().sort((a, b) => b.ts - a.ts);
  }, [notifications, tab]);

  const buildRow = (n) => {
    const friend = USERS_BY_ID.get(n.fromId);
    if (!friend) return null;
    let icon, line1, line2;
    if (n.type === 'follow') {
      icon = '✦';
      line1 = <><b>{friend.nick}</b>님이 회원님을 팔로우하기 시작했어요</>;
      line2 = <span className="mute">{friend.handle}</span>;
    } else if (n.type === 'mutual') {
      icon = '🤝';
      line1 = <><b>{friend.nick}</b>님과 맞팔로우 되었어요</>;
      line2 = <span className="mute">서로의 활동이 친구 활동에 표시돼요</span>;
    } else if (n.type === 'hotji') {
      icon = '💌';
      const bd = BADGE_BY_ID[n.payload?.badgeId];
      line1 = <><b>{friend.nick}</b>님이 핫지를 보냈어요</>;
      line2 = bd
        ? <span className="notif-badge-chip" style={{ ['--bcol']: bd.color }}><span className="notif-badge-em">{bd.em}</span> {bd.nm}</span>
        : <span className="mute">새 배지 도착 ✨</span>;
    } else if (n.type === 'story-reply') {
      icon = '💬';
      line1 = <><b>{friend.nick}</b>님이 내 스토리에 답장했어요</>;
      line2 = (
        <span className="notif-reply-quote">
          {n.payload?.storyEmoji && <span className="notif-reply-em">{n.payload.storyEmoji}</span>}
          <span>"{n.payload?.replyText || '답장 ✨'}"</span>
        </span>
      );
    }
    const isStoryReply = n.type === 'story-reply';
    return (
      <button
        key={n.id}
        type="button"
        className={"notif-row" + (n.read ? '' : ' is-unread')}
        onClick={() => {
          if (isStoryReply && onOpenThread) onOpenThread(n.fromId);
          else if (onOpenProfile) onOpenProfile(friend);
        }}
      >
        <span className="notif-av" style={{ background: friend.color }} aria-hidden="true">
          <span className="notif-av-em">{icon}</span>
        </span>
        <span className="notif-body">
          <span className="notif-line1">{line1}</span>
          <span className="notif-line2">{line2}</span>
          <span className="notif-time">
            {fmtRelTime(n.ts)}
            {isStoryReply && <span className="notif-thread-cta">답장 보기 ›</span>}
          </span>
        </span>
        {!n.read && <span className="notif-unread-dot" aria-hidden="true" />}
      </button>
    );
  };

  return (
    <div
      className={"notif-modal-back" + (open ? ' show' : '')}
      onClick={onClose}
      aria-hidden={!open}
    >
      <div
        className={"notif-modal" + (open ? ' show' : '')}
        role="dialog"
        aria-modal="true"
        aria-label="알림"
        onClick={(e) => e.stopPropagation()}
      >
        <div className="notif-head">
          <div className="notif-head-title">
            <span className="notif-head-em" aria-hidden="true">🔔</span>
            <h3>알림</h3>
          </div>
          <div className="notif-head-actions">
            {notifications.length > 0 && (
              <button type="button" className="notif-clear" onClick={onClear}>모두 지우기</button>
            )}
            <button type="button" className="icon-btn" onClick={onClose} aria-label="닫기"><IconClose size={14} /></button>
          </div>
        </div>
        <div className="notif-tabs" role="tablist">
          {NOTIF_TABS.map(t => {
            const cnt = t.key === 'all' ? notifications.length : notifications.filter(n => n.type === t.key).length;
            return (
              <button
                key={t.key}
                type="button"
                role="tab"
                aria-selected={tab === t.key}
                className={"notif-tab" + (tab === t.key ? ' on' : '')}
                onClick={() => setTab(t.key)}
              >
                <span className="notif-tab-em" aria-hidden="true">{t.emoji}</span>
                <span>{t.label}</span>
                {cnt > 0 && <span className="notif-tab-cnt">{cnt}</span>}
              </button>
            );
          })}
        </div>
        <div className="notif-body-scroll">
          {filtered.length === 0 ? (
            <div className="notif-empty">
              <div className="notif-empty-em" aria-hidden="true">🔕</div>
              <div className="notif-empty-t">아직 알림이 없어요</div>
              <div className="notif-empty-sub">팔로우 · 맞팔 · 핫지 · 스토리 답장을 받으면 여기에 표시돼요</div>
            </div>
          ) : (
            <div className="notif-list">
              {filtered.map(buildRow)}
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

/* ─────────────────  메시지함 시트 (스토리 답장 스레드)  ─────────────────
   친구별 스레드 리스트 → 클릭 시 스레드 뷰(카톡 스타일 버블 + 입력바). */
const MSG_QUICK_EMOJIS = ['😂', '❤️', '🔥', '✨', '👀', '🙌', '🥹', '💌'];

const MessagesSheet = ({
  open, threads, activeThreadId, onClose,
  onOpenThread, onBack, onSend, onMarkRead, unlockedBadges
}) => {
  const [draft, setDraft] = useState('');
  const [attachOpen, setAttachOpen] = useState(false);
  const listRef = useRef(null);

  // ESC 키: 스레드 뷰 → 리스트, 리스트 → 닫기
  useEffect(() => {
    if (!open) return;
    const onKey = (e) => {
      if (e.key !== 'Escape') return;
      if (activeThreadId) onBack();
      else onClose();
    };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [open, activeThreadId, onBack, onClose]);

  // 스레드 진입 시 자동 읽음 처리 + 맨 아래로 스크롤
  useEffect(() => {
    if (!open || !activeThreadId) return;
    const tid = setTimeout(() => onMarkRead && onMarkRead(activeThreadId), 250);
    return () => clearTimeout(tid);
  }, [open, activeThreadId, onMarkRead]);

  const activeThread = useMemo(
    () => threads.find(t => t.id === activeThreadId) || null,
    [threads, activeThreadId]
  );
  const activeFriend = activeThread ? USERS_BY_ID.get(activeThread.friendId) : null;

  // 새 메시지 들어오면 맨 아래로 스크롤
  useEffect(() => {
    if (!activeThread || !listRef.current) return;
    const el = listRef.current;
    requestAnimationFrame(() => {
      el.scrollTop = el.scrollHeight;
    });
  }, [activeThread, activeThread && activeThread.messages.length]);

  // 시트 닫히면 draft 초기화
  useEffect(() => { if (!open) { setDraft(''); setAttachOpen(false); } }, [open]);

  // 리스트 뷰용 정렬: 최신 메시지 기준 내림차순
  const sortedThreads = useMemo(() => {
    return threads.slice().sort((a, b) => {
      const aLast = a.messages[a.messages.length - 1]?.ts || a.createdAt;
      const bLast = b.messages[b.messages.length - 1]?.ts || b.createdAt;
      return bLast - aLast;
    });
  }, [threads]);

  const submitDraft = () => {
    if (!activeThread) return;
    const t = draft.trim();
    if (!t) return;
    onSend(activeThread.id, t, 'text');
    setDraft('');
  };

  const sendBadge = (badgeId) => {
    if (!activeThread) return;
    const bd = BADGE_BY_ID[badgeId];
    if (!bd) return;
    onSend(activeThread.id, bd.nm, 'badge', badgeId);
    setAttachOpen(false);
  };

  // ─── 리스트 뷰
  const totalUnread = sortedThreads.reduce(
    (s, t) => s + t.messages.filter(m => m.from === 'friend' && !m.read).length, 0
  );
  const renderListView = () => (
    <>
      <div className="msg-list-head">
        <div className="msg-list-head-row">
          <div className="msg-list-title">
            <span className="msg-list-eyebrow">MESSAGES</span>
            <h3>
              <span className="msg-list-em" aria-hidden="true">💌</span>
              메시지함
              {totalUnread > 0 && (
                <span className="msg-list-cnt" aria-label={`안 읽은 메시지 ${totalUnread}개`}>{totalUnread}</span>
              )}
            </h3>
          </div>
          <button type="button" className="msg-list-close" onClick={onClose} aria-label="닫기">
            <IconClose size={13} />
          </button>
        </div>
        <p className="msg-list-sub">스토리에 친구가 보낸 답장을 모아 봐요 ✦</p>
      </div>

      <div className="msg-body-scroll msg-list-scroll">
        {sortedThreads.length === 0 ? (
          <div className="msg-empty">
            <div className="msg-empty-em" aria-hidden="true">💌</div>
            <div className="msg-empty-t">아직 메시지가 없어요</div>
            <div className="msg-empty-sub">친구가 내 스토리에 답장을 보내면 여기에 표시돼요</div>
          </div>
        ) : (
          <ul className="msg-thread-list" role="list">
            {sortedThreads.map(t => {
              const friend = USERS_BY_ID.get(t.friendId);
              if (!friend) return null;
              const last = t.messages[t.messages.length - 1];
              const unread = t.messages.filter(m => m.from === 'friend' && !m.read).length;
              const isBadge = last && last.kind === 'badge';
              const fromMe = last && last.from === 'me';
              const previewText = !last
                ? '대화 시작'
                : isBadge ? `${last.text} 배지` : last.text;
              return (
                <li key={t.id} className="msg-thread-li">
                  <button
                    type="button"
                    className={"msg-thread-row" + (unread > 0 ? ' has-unread' : '')}
                    onClick={() => onOpenThread(t.id)}
                  >
                    <span className="msg-thread-av-wrap" aria-hidden="true">
                      <span className="msg-thread-av" style={{ background: friend.color }}>
                        {friend.nick[0]}
                      </span>
                      {t.storyEmoji && (
                        <span className="msg-thread-story-em" aria-hidden="true">{t.storyEmoji}</span>
                      )}
                    </span>
                    <span className="msg-thread-body">
                      <span className="msg-thread-top">
                        <span className="msg-thread-nick">{friend.nick}</span>
                        <span className="msg-thread-time">{last ? fmtRelTime(last.ts) : ''}</span>
                      </span>
                      <span className="msg-thread-preview-row">
                        {isBadge && <span className="msg-thread-prefix">✦</span>}
                        {!isBadge && fromMe && <span className="msg-thread-prefix me">나</span>}
                        <span className={"msg-thread-preview" + (unread > 0 ? ' bold' : '')}>{previewText}</span>
                      </span>
                    </span>
                    {unread > 0 && (
                      <span className="msg-thread-unread" aria-label={`안 읽은 메시지 ${unread}개`}>
                        {unread}
                      </span>
                    )}
                  </button>
                </li>
              );
            })}
          </ul>
        )}
      </div>
    </>
  );

  // ─── 스레드 뷰
  const renderThreadView = () => {
    if (!activeThread || !activeFriend) return null;
    const f = activeFriend;
    return (
      <>
        <div className="msg-head msg-head-thread">
          <button type="button" className="msg-back-btn" onClick={onBack} aria-label="뒤로">
            <IconChevR size={14} style={{ transform: 'rotate(180deg)' }} />
          </button>
          <div className="msg-head-friend">
            <span className="msg-thread-av sm" style={{ background: f.color }} aria-hidden="true">{f.nick[0]}</span>
            <div className="msg-head-friend-body">
              <span className="msg-head-friend-nick">{f.nick}</span>
              <span className="msg-head-friend-handle">{f.handle}</span>
            </div>
          </div>
          <button type="button" className="icon-btn" onClick={onClose} aria-label="닫기">
            <IconClose size={14} />
          </button>
        </div>

        {activeThread.storyCaption && (
          <div className="msg-story-ctx">
            <span className="msg-story-ctx-em" aria-hidden="true">{activeThread.storyEmoji || '💬'}</span>
            <div className="msg-story-ctx-body">
              <span className="msg-story-ctx-lab">답장한 스토리</span>
              <span className="msg-story-ctx-cap">{activeThread.storyCaption}</span>
            </div>
          </div>
        )}

        <div className="msg-bubble-scroll" ref={listRef}>
          <div className="msg-bubble-list">
            {activeThread.messages.map((m, i) => {
              const prev = activeThread.messages[i - 1];
              const showAv = m.from === 'friend' && (!prev || prev.from !== 'friend');
              const isBadge = m.kind === 'badge' && m.badgeId;
              const bd = isBadge ? BADGE_BY_ID[m.badgeId] : null;
              return (
                <div key={m.id} className={"msg-row " + (m.from === 'me' ? 'me' : 'friend')}>
                  {m.from === 'friend' && (
                    <span
                      className="msg-row-av"
                      style={{ background: f.color, visibility: showAv ? 'visible' : 'hidden' }}
                      aria-hidden="true"
                    >{f.nick[0]}</span>
                  )}
                  <div className={"msg-bubble" + (isBadge ? ' is-badge' : '')}>
                    {isBadge && bd ? (
                      <span className="msg-badge-card" style={{ ['--bcol']: bd.color }}>
                        <span className="msg-badge-em">{bd.em}</span>
                        <span className="msg-badge-body">
                          <span className="msg-badge-lab">핫지 배지 전송</span>
                          <span className="msg-badge-nm">{bd.nm}</span>
                        </span>
                      </span>
                    ) : (
                      <span className="msg-bubble-text">{m.text}</span>
                    )}
                    <span className="msg-bubble-ts">{fmtRelTime(m.ts)}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {attachOpen && (
          <div className="msg-attach-drawer" role="dialog" aria-label="핫지 배지 첨부">
            <div className="msg-attach-head">
              <span>잠금 해제한 배지 보내기</span>
              <button type="button" className="msg-attach-close" onClick={() => setAttachOpen(false)}>×</button>
            </div>
            <div className="msg-attach-grid">
              {BADGES.filter(b => unlockedBadges.has(b.id)).map(b => (
                <button
                  key={b.id}
                  type="button"
                  className="msg-attach-cell"
                  style={{ ['--bcol']: b.color }}
                  onClick={() => sendBadge(b.id)}
                >
                  <span className="msg-attach-em">{b.em}</span>
                  <span className="msg-attach-nm">{b.nm}</span>
                </button>
              ))}
              {BADGES.filter(b => unlockedBadges.has(b.id)).length === 0 && (
                <div className="msg-attach-empty">잠금 해제한 배지가 아직 없어요</div>
              )}
            </div>
          </div>
        )}

        <div className="msg-quick-row">
          {MSG_QUICK_EMOJIS.map(e => (
            <button
              key={e}
              type="button"
              className="msg-quick-chip"
              onClick={() => setDraft(d => d + e)}
              aria-label={`${e} 추가`}
            >{e}</button>
          ))}
          <button
            type="button"
            className={"msg-quick-chip msg-attach-trigger" + (attachOpen ? ' on' : '')}
            onClick={() => setAttachOpen(v => !v)}
            aria-label="핫지 배지 첨부"
          >✦</button>
        </div>

        <div className="msg-input-bar">
          <textarea
            className="msg-input"
            placeholder={`${f.nick}에게 답장 보내기...`}
            value={draft}
            onChange={(e) => setDraft(e.target.value)}
            onKeyDown={(e) => {
              if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                submitDraft();
              }
            }}
            rows={1}
          />
          <button
            type="button"
            className="msg-send-btn"
            onClick={submitDraft}
            disabled={!draft.trim()}
            aria-label="보내기"
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
              <line x1="22" y1="2" x2="11" y2="13" />
              <polygon points="22 2 15 22 11 13 2 9 22 2" />
            </svg>
          </button>
        </div>
      </>
    );
  };

  return (
    <div
      className={"notif-modal-back" + (open ? ' show' : '')}
      onClick={onClose}
      aria-hidden={!open}
    >
      <div
        className={"notif-modal msg-modal" + (open ? ' show' : '') + (activeThreadId ? ' in-thread' : '')}
        role="dialog"
        aria-modal="true"
        aria-label="메시지함"
        onClick={(e) => e.stopPropagation()}
      >
        {activeThreadId ? renderThreadView() : renderListView()}
      </div>
    </div>
  );
};

const QAPO_PURCHASE_MIN = 1;
const QAPO_PURCHASE_MAX = 1_000_000;
const QAPO_QUICK_PICKS = [1000, 10000, 50000, 100000, 500000, 1000000];
const QAPO_PAY_METHODS = [
  { id: 'card',    label: '신용 · 체크카드', icon: '💳' },
  { id: 'kakaopay', label: '카카오페이',       icon: '🟡' },
  { id: 'naverpay', label: '네이버페이',       icon: '🟢' },
  { id: 'tosspay',  label: '토스',             icon: '🔵' },
];
const QapoPurchaseSheet = ({ balance, onPurchase, onClose }) => {
  const [amount, setAmount] = useState(10000);
  const [rawText, setRawText] = useState('10000');
  const [pay, setPay] = useState('card');
  const clamp = (n) => Math.min(QAPO_PURCHASE_MAX, Math.max(QAPO_PURCHASE_MIN, Math.round(n || 0)));
  const setBoth = (n) => {
    const v = clamp(n);
    setAmount(v);
    setRawText(String(v));
  };
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [onClose]);
  const krw = amount.toLocaleString();
  const pointLabel = amount.toLocaleString();
  const newBalance = (balance + amount).toLocaleString();
  return (
    <div
      className="req-modal-back"
      onClick={e => { if (e.target === e.currentTarget) onClose(); }}
      role="dialog"
      aria-modal="true"
      aria-label="QAOH POINT 충전"
    >
      <div className="req-modal qapo-buy-modal" onClick={e => e.stopPropagation()}>
        <div className="handle-bar" aria-hidden="true" />
        <div className="head">
          <h3>QAOH POINT 충전</h3>
          <button className="close" onClick={onClose} aria-label="닫기"><IconClose size={14} /></button>
        </div>
        <div className="body qapo-buy-body">

          <div className="qapo-buy-balance">
            <span className="qapo-buy-balance-lab">현재 잔액</span>
            <span className="qapo-buy-balance-val"><span className="coin" aria-hidden="true">Q</span>{balance.toLocaleString()}</span>
          </div>

          <div className="qapo-buy-hero">
            <div className="qapo-buy-hero-lab">충전 금액</div>
            <div className="qapo-buy-hero-row">
              <input
                type="text"
                inputMode="numeric"
                className="qapo-buy-amount-input"
                value={rawText}
                aria-label="QAOH POINT 수량"
                onChange={(e) => {
                  const digits = e.target.value.replace(/[^0-9]/g, '');
                  setRawText(digits);
                  if (digits === '') { setAmount(QAPO_PURCHASE_MIN); return; }
                  const n = parseInt(digits, 10);
                  if (Number.isFinite(n)) setAmount(clamp(n));
                }}
                onBlur={() => setRawText(String(amount))}
              />
              <span className="qapo-buy-amount-unit">QAOH POINT</span>
            </div>
            <div className="qapo-buy-hero-krw"><span className="qapo-buy-eq">＝</span>{krw}원</div>
          </div>

          <div className="qapo-buy-slider-wrap">
            <input
              type="range"
              className="qapo-buy-slider"
              min={QAPO_PURCHASE_MIN}
              max={QAPO_PURCHASE_MAX}
              step={1}
              value={amount}
              onChange={(e) => setBoth(parseInt(e.target.value, 10))}
              aria-label="충전 금액 슬라이더"
            />
            <div className="qapo-buy-slider-axis">
              <span>1</span>
              <span>10만</span>
              <span>50만</span>
              <span>100만</span>
            </div>
          </div>

          <div className="qapo-buy-quick">
            {QAPO_QUICK_PICKS.map(n => (
              <button
                key={n}
                type="button"
                className={'qapo-buy-chip' + (amount === n ? ' is-active' : '')}
                onClick={() => setBoth(n)}
              >+{n >= 10000 ? `${n/10000}만` : n.toLocaleString()}</button>
            ))}
          </div>

          <div className="qapo-buy-pay">
            <div className="qapo-buy-pay-lab">결제 수단</div>
            <div className="qapo-buy-pay-grid">
              {QAPO_PAY_METHODS.map(m => (
                <button
                  key={m.id}
                  type="button"
                  className={'qapo-buy-pay-cell' + (pay === m.id ? ' is-active' : '')}
                  onClick={() => setPay(m.id)}
                  aria-pressed={pay === m.id}
                >
                  <span className="qapo-buy-pay-ic" aria-hidden="true">{m.icon}</span>
                  <span className="qapo-buy-pay-lab2">{m.label}</span>
                </button>
              ))}
            </div>
          </div>

          <div className="qapo-buy-summary">
            <div className="qapo-buy-sum-row">
              <span>결제 금액</span>
              <strong>{krw}원</strong>
            </div>
            <div className="qapo-buy-sum-row sub">
              <span>적립 후 잔액</span>
              <span><span className="coin small" aria-hidden="true">Q</span>{newBalance}</span>
            </div>
            <div className="qapo-buy-sum-note">QAOH POINT 1개 = 1원 · 충전 후 즉시 사용 가능</div>
          </div>

          <div className="qapo-buy-foot">
            <button
              type="button"
              className="qapo-buy-cta"
              onClick={() => onPurchase(amount, pay)}
            >
              <span className="coin" aria-hidden="true">Q</span>
              <span>{pointLabel} 충전하기 · {krw}원</span>
            </button>
            <div className="qapo-buy-foot-cap">데모용 결제 — 실제 청구는 일어나지 않아요</div>
          </div>

        </div>
      </div>
    </div>
  );
};

const fmtNum = (n) => Number(n || 0).toLocaleString('ko-KR');
const fmtRel = (ts) => {
  if (!ts) return '—';
  const diff = Date.now() - ts;
  if (diff < 60_000) return '방금';
  if (diff < 3_600_000) return Math.floor(diff / 60_000) + '분 전';
  if (diff < 86_400_000) return Math.floor(diff / 3_600_000) + '시간 전';
  const days = Math.floor(diff / 86_400_000);
  if (days < 30) return days + '일 전';
  const d = new Date(ts);
  return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')}`;
};
const fmtDate = (ts) => {
  const d = new Date(ts || Date.now());
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
};

/* Deterministic synth — 통계 차트를 위한 시드 기반 sin 곡선 */
const synthSeries = (seed, len, base, jitter) => {
  const out = [];
  for (let i = 0; i < len; i++) {
    const v = base + Math.sin((i + seed) * 0.78) * (base * 0.18) + (((seed + i) * 9301) % jitter);
    out.push(Math.max(0, Math.round(v)));
  }
  return out;
};

const RANGE_PRESETS = [

];

/* 단위 스케일: 일 → 월 → 년 데이터 양 확장 */
const RANGE_MULT = {
  '7d':  { d: 1,   u: 1 },
  '30d': { d: 1,   u: 1 },
  '1y':  { d: 28,  u: 26 },
  '5y':  { d: 340, u: 310 },
  'max': { d: 260, u: 240 },
};

const rangeAxis = (id, points) => {
  const y = new Date().getFullYear();
  if (id === '7d') return ['월','화','수','목','금','토','일'];
  if (id === '30d') {
    return Array.from({ length: points }, (_, i) =>
      i === 0 ? `D-${points-1}` : i === points-1 ? '오늘' : i % 5 === 0 ? `D-${points-1-i}` : ''
    );
  }
  if (id === '1y') return ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  if (id === '5y') return Array.from({ length: points }, (_, i) => `${y - (points-1-i)}년`);
  if (id === 'max') return Array.from({ length: points }, (_, i) => `${y - (points-1-i) * 2}`);
  return [];
};

const AdminSparkline = ({ values, color = '#FF7A45', height = 56 }) => {
  if (!values || !values.length) return null;
  const max = Math.max(...values, 1);
  const min = Math.min(...values, 0);
  const span = Math.max(max - min, 1);
  const w = 100; // viewBox width, scaled by CSS
  const stepX = w / (values.length - 1 || 1);
  const pts = values.map((v, i) => `${(i * stepX).toFixed(2)},${(height - ((v - min) / span) * (height - 8) - 4).toFixed(2)}`).join(' ');
  const area = `M0,${height} L${pts.split(' ').join(' L')} L${w},${height} Z`;
  return (
    <svg className="admin-spark" viewBox={`0 0 ${w} ${height}`} preserveAspectRatio="none" aria-hidden="true">
      <defs>
        <linearGradient id="adminSparkGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.35"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill="url(#adminSparkGrad)"/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
};

/* ─── Users panel ─── */
const AdminUsers = ({ registry, banned, onBan, onUnban, onDelete }) => {
  const [query, setQuery] = useState('');
  const [filter, setFilter] = useState('all');

  // Unified user list: registry (real) + seed (FRIENDS + SOCIAL_EXTRA)
  const allUsers = useMemo(() => {
    const fromRegistry = Object.entries(registry).map(([h, r]) => ({
      handle: h,
      nickname: (r && r.account && r.account.nickname) || h,
      email: (r && r.account && r.account.email) || '—',
      savedAt: (r && r.savedAt) || 0,
      kind: 'registered',
      region: r && r.account && r.account.region ? `${r.account.region.city} ${r.account.region.district || ''}`.trim() : '—',
    }));
    const fromSeed = [...FRIENDS, ...SOCIAL_EXTRA].map(u => ({
      handle: cleanHandle(u.handle),
      nickname: u.nick,
      email: '—',
      savedAt: 0,
      kind: 'seed',
      color: u.color,
    }));
    return [...fromRegistry, ...fromSeed];
  }, [registry]);

  const filtered = useMemo(() => {
    let arr = allUsers;
    if (filter === 'banned') arr = arr.filter(u => banned.has(u.handle));
    else if (filter === 'registered') arr = arr.filter(u => u.kind === 'registered');
    else if (filter === 'seed') arr = arr.filter(u => u.kind === 'seed');
    if (query.trim()) {
      const q = query.trim().toLowerCase();
      arr = arr.filter(u => u.handle.includes(q) || (u.nickname || '').toLowerCase().includes(q) || (u.email || '').toLowerCase().includes(q));
    }
    return arr;
  }, [allUsers, filter, banned, query]);

  return (
    <>
      <div className="admin-toolbar">
        <input
          className="admin-search"
          type="text"
          placeholder="닉네임 · 아이디 · 이메일로 검색"
          value={query}
          onChange={(e) => setQuery(e.target.value)}
        />
        <div className="admin-filter">
          {['all', 'registered', 'seed', 'banned'].map(f => (
            <button key={f} className={"admin-chip" + (filter === f ? ' on' : '')} onClick={() => setFilter(f)}>
              {f === 'all' ? '전체' : f === 'registered' ? '가입 사용자' : f === 'seed' ? '시드 사용자' : '정지됨'}
              <span className="admin-chip-count">
                {f === 'all' ? allUsers.length
                  : f === 'registered' ? allUsers.filter(u => u.kind === 'registered').length
                  : f === 'seed' ? allUsers.filter(u => u.kind === 'seed').length
                  : allUsers.filter(u => banned.has(u.handle)).length}
              </span>
            </button>
          ))}
        </div>
      </div>

      <div className="admin-table-wrap">
        <table className="admin-table">
          <thead>
            <tr>
              <th style={{ width: '36px' }}></th>
              <th>닉네임</th>
              <th>아이디</th>
              <th>이메일</th>
              <th>가입일</th>
              <th>구분</th>
              <th>상태</th>
              <th style={{ textAlign: 'right' }}>액션</th>
            </tr>
          </thead>
          <tbody>
            {filtered.length === 0 ? (
              <tr><td colSpan={8}><div className="admin-empty">조건에 맞는 사용자가 없어요</div></td></tr>
            ) : filtered.map(u => {
              const isBanned = banned.has(u.handle);
              return (
                <tr key={u.kind + ':' + u.handle} className={isBanned ? 'is-banned' : ''}>
                  <td><div className="admin-av" style={u.color ? { background: u.color, color: '#1A1A1A' } : null}>{(u.nickname || '?').slice(0, 1)}</div></td>
                  <td><div className="admin-cell-main">{u.nickname}</div></td>
                  <td><div className="admin-cell-mono">@{u.handle}</div></td>
                  <td><div className="admin-cell-mono small">{u.email}</div></td>
                  <td>{u.savedAt ? fmtRel(u.savedAt) : <span className="admin-muted">—</span>}</td>
                  <td>{u.kind === 'registered' ? <span className="admin-pill admin-pill-info">가입자</span> : <span className="admin-pill admin-pill-ghost">시드</span>}</td>
                  <td>{isBanned ? <span className="admin-pill admin-pill-danger">정지</span> : <span className="admin-pill admin-pill-success">활성</span>}</td>
                  <td style={{ textAlign: 'right' }}>
                    <div className="admin-row-actions">
                      {isBanned ? (
                        <button className="admin-btn" onClick={() => onUnban(u.handle)}>복원</button>
                      ) : (
                        <button className="admin-btn admin-btn-warn" onClick={() => {
                          const reason = window.prompt('정지 사유를 입력하세요 (선택)');
                          onBan(u.handle, reason || '');
                        }}>정지</button>
                      )}
                      {u.kind === 'registered' ? (
                        <button className="admin-btn admin-btn-danger" onClick={() => {
                          if (window.confirm(`@${u.handle} 계정을 영구 삭제할까요?`)) onDelete(u.handle);
                        }}>삭제</button>
                      ) : null}
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </>
  );
};

/* ─── Content (Polls) panel ─── */
const POLL_CATEGORIES = ['맛집', '카페', '테크', '데이트', '야식', '캠퍼스', '활동', '편의점'];
const POLL_EMOJI_PRESETS = ['🍝', '🍕', '🍔', '🍜', '🍙', '🍱', '☕', '🥛', '🍰', '🍪', '🍎', '🍓', '🌶️', '🥩', '🍗', '🥟', '💪', '🧘', '🎬', '🎤', '🎧', '💻', '📱', '🎮', '🏠', '🚌', '🌊', '☀️', '🌙', '🅰️', '🅱️'];

const AdminContent = ({ polls, hiddenPolls, pinnedPolls, onToggleHidden, onTogglePinned, onCreatePoll, onDeleteCustomPoll }) => {
  const [filter, setFilter] = useState('all');
  const [query, setQuery] = useState('');
  const [modalOpen, setModalOpen] = useState(false);

  const customCount = polls.filter(p => p.custom).length;

  const list = useMemo(() => {
    let arr = polls;
    if (filter === 'hidden') arr = arr.filter(p => hiddenPolls.has(p.id));
    else if (filter === 'pinned') arr = arr.filter(p => pinnedPolls.has(p.id));
    else if (filter === 'visible') arr = arr.filter(p => !hiddenPolls.has(p.id));
    else if (filter === 'custom') arr = arr.filter(p => p.custom);
    if (query.trim()) {
      const q = query.trim().toLowerCase();
      arr = arr.filter(p => p.title.toLowerCase().includes(q) || p.cat.includes(q) || p.a.includes(q) || p.b.includes(q));
    }
    return arr;
  }, [polls, filter, hiddenPolls, pinnedPolls, query]);

  return (
    <>
      <div className="admin-toolbar">
        <input className="admin-search" type="text" placeholder="제목 · 카테고리 · 옵션으로 검색" value={query} onChange={(e) => setQuery(e.target.value)}/>
        <div className="admin-filter">
          {['all', 'visible', 'hidden', 'pinned', 'custom'].map(f => (
            <button key={f} className={"admin-chip" + (filter === f ? ' on' : '')} onClick={() => setFilter(f)}>
              {f === 'all' ? '전체'
                : f === 'visible' ? '게시중'
                : f === 'hidden' ? '숨김'
                : f === 'pinned' ? '핀고정'
                : '내가 만든'}
              <span className="admin-chip-count">
                {f === 'all' ? polls.length
                  : f === 'visible' ? polls.length - hiddenPolls.size
                  : f === 'hidden' ? hiddenPolls.size
                  : f === 'pinned' ? pinnedPolls.size
                  : customCount}
              </span>
            </button>
          ))}
        </div>
        <button className="admin-btn admin-btn-primary admin-btn-lg" onClick={() => setModalOpen(true)}>
          <span style={{ fontSize: 18, lineHeight: 1, marginInlineEnd: 6 }}>+</span> 새 폴 만들기
        </button>
      </div>

      <div className="admin-table-wrap">
        <table className="admin-table">
          <thead>
            <tr>
              <th>카테고리</th>
              <th>제목</th>
              <th>옵션 A</th>
              <th>옵션 B</th>
              <th style={{ textAlign: 'right' }}>표 합계</th>
              <th style={{ textAlign: 'right' }}>핫지수</th>
              <th>상태</th>
              <th style={{ textAlign: 'right' }}>액션</th>
            </tr>
          </thead>
          <tbody>
            {list.length === 0 ? (
              <tr><td colSpan={8}><div className="admin-empty">조건에 맞는 폴이 없어요</div></td></tr>
            ) : list.map(p => {
              const hidden = hiddenPolls.has(p.id);
              const pinned = pinnedPolls.has(p.id);
              return (
                <tr key={p.id} className={hidden ? 'is-banned' : ''}>
                  <td>
                    <span className="admin-pill admin-pill-ghost">{p.cat}</span>
                    {p.custom ? <span className="admin-pill admin-pill-info" style={{ marginInlineStart: 4 }}>NEW</span> : null}
                  </td>
                  <td><div className="admin-cell-main">{p.title}</div><div className="admin-cell-sub">{p.loc}</div></td>
                  <td><span className="admin-emoji">{p.ea}</span> {p.a} <span className="admin-muted">· {fmtNum(p.va)}</span></td>
                  <td><span className="admin-emoji">{p.eb}</span> {p.b} <span className="admin-muted">· {fmtNum(p.vb)}</span></td>
                  <td style={{ textAlign: 'right' }} className="admin-cell-mono">{fmtNum(p.va + p.vb)}</td>
                  <td style={{ textAlign: 'right' }} className="admin-cell-mono">{fmtNum(p.hot)}</td>
                  <td>
                    {hidden ? <span className="admin-pill admin-pill-danger">숨김</span> : <span className="admin-pill admin-pill-success">게시중</span>}
                    {pinned ? <span className="admin-pill admin-pill-warn" style={{ marginInlineStart: 4 }}>핀</span> : null}
                  </td>
                  <td style={{ textAlign: 'right' }}>
                    <div className="admin-row-actions">
                      <button className="admin-btn" onClick={() => onTogglePinned(p.id)}>{pinned ? '핀 해제' : '핀고정'}</button>
                      <button className={"admin-btn " + (hidden ? '' : 'admin-btn-warn')} onClick={() => onToggleHidden(p.id)}>{hidden ? '복원' : '숨기기'}</button>
                      {p.custom ? (
                        <button className="admin-btn admin-btn-danger" onClick={() => onDeleteCustomPoll(p.id)}>삭제</button>
                      ) : null}
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {modalOpen ? (
        <AdminCreatePollModal
          onClose={() => setModalOpen(false)}
          onCreate={(data) => { onCreatePoll(data); setModalOpen(false); }}
        />
      ) : null}
    </>
  );
};

/* ─── Create-poll modal ─── */
const AdminCreatePollModal = ({ onClose, onCreate }) => {
  const [cat, setCat] = useState(POLL_CATEGORIES[0]);
  const [loc, setLoc] = useState('전국');
  const [title, setTitle] = useState('');
  const [a, setA] = useState('');
  const [b, setB] = useState('');
  const [ea, setEa] = useState('🅰️');
  const [eb, setEb] = useState('🅱️');
  const [reward, setReward] = useState(30);
  const [touched, setTouched] = useState(false);

  const titleOk = title.trim().length >= 3 && title.trim().length <= 60;
  const aOk = a.trim().length >= 1 && a.trim().length <= 24;
  const bOk = b.trim().length >= 1 && b.trim().length <= 24;
  const rewardOk = Number(reward) > 0 && Number(reward) <= 500;
  const canSubmit = titleOk && aOk && bOk && rewardOk;

  // ESC로 닫기
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onClose]);

  const submit = (e) => {
    if (e && e.preventDefault) e.preventDefault();
    setTouched(true);
    if (!canSubmit) return;
    onCreate({ cat, loc: loc.trim() || '전국', title: title.trim(), a: a.trim(), b: b.trim(), ea, eb, reward });
  };

  return (
    <div className="admin-modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="admin-modal" role="dialog" aria-modal="true" aria-labelledby="create-poll-title">
        <header className="admin-modal-head">
          <div>
            <h2 id="create-poll-title">새 폴(투표) 만들기</h2>
            <p>모바일 앱 카홈/카오뷰에 즉시 노출돼요. 표·핫지수는 0부터 시작.</p>
          </div>
          <button className="admin-modal-close" onClick={onClose} aria-label="닫기">✕</button>
        </header>

        <form className="admin-modal-body" onSubmit={submit}>
          <div className="admin-form-row two-col">
            <div>
              <label className="admin-form-label">카테고리 *</label>
              <select className="admin-input" value={cat} onChange={(e) => setCat(e.target.value)}>
                {POLL_CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <div>
              <label className="admin-form-label">지역</label>
              <input className="admin-input" type="text" maxLength={12} value={loc} onChange={(e) => setLoc(e.target.value)} placeholder="예: 전국 · 성수 · 강남"/>
            </div>
          </div>

          <label className="admin-form-label">질문 제목 *</label>
          <input className="admin-input" type="text" maxLength={60} value={title} onChange={(e) => setTitle(e.target.value)} placeholder="예: 짜장면 vs 짬뽕?"/>
          <div className={"admin-form-hint" + (touched && !titleOk ? ' err' : '')}>
            {touched && !titleOk ? '제목은 3-60자로 적어 주세요' : `${title.length}/60자 · 짧고 또렷한 두 선택지가 들어가도록`}
          </div>

          <div className="admin-form-row two-col">
            <div>
              <label className="admin-form-label">옵션 A *</label>
              <div className="admin-option-row">
                <button type="button" className="admin-emoji-pick" aria-label="이모지 선택" onClick={() => {
                  const i = POLL_EMOJI_PRESETS.indexOf(ea);
                  setEa(POLL_EMOJI_PRESETS[(i + 1) % POLL_EMOJI_PRESETS.length]);
                }}>{ea}</button>
                <input className="admin-input" type="text" maxLength={24} value={a} onChange={(e) => setA(e.target.value)} placeholder="짜장면"/>
              </div>
              {touched && !aOk ? <div className="admin-form-hint err">옵션 A를 입력해 주세요 (1-24자)</div> : null}
            </div>
            <div>
              <label className="admin-form-label">옵션 B *</label>
              <div className="admin-option-row">
                <button type="button" className="admin-emoji-pick" aria-label="이모지 선택" onClick={() => {
                  const i = POLL_EMOJI_PRESETS.indexOf(eb);
                  setEb(POLL_EMOJI_PRESETS[(i + 1) % POLL_EMOJI_PRESETS.length]);
                }}>{eb}</button>
                <input className="admin-input" type="text" maxLength={24} value={b} onChange={(e) => setB(e.target.value)} placeholder="짬뽕"/>
              </div>
              {touched && !bOk ? <div className="admin-form-hint err">옵션 B를 입력해 주세요 (1-24자)</div> : null}
            </div>
          </div>

          <label className="admin-form-label">QAOH POINT 보상</label>
          <input className="admin-input" type="number" min={1} max={500} step={5} value={reward} onChange={(e) => setReward(e.target.value)}/>
          <div className={"admin-form-hint" + (touched && !rewardOk ? ' err' : '')}>
            {touched && !rewardOk ? '1-500 사이로 입력해 주세요' : '투표 1회당 사용자에게 지급될 QAOH POINT (기본 30)'}
          </div>

          <div className="admin-modal-preview">
            <div className="admin-modal-preview-label">미리보기</div>
            <div className="admin-modal-preview-card">
              <span className="admin-pill admin-pill-ghost">{cat}</span>
              <div className="admin-modal-preview-title">{title || '질문 제목이 여기 나타나요'}</div>
              <div className="admin-modal-preview-options">
                <div><span className="admin-emoji">{ea}</span> {a || '옵션 A'}</div>
                <div style={{ opacity: 0.6 }}>vs</div>
                <div><span className="admin-emoji">{eb}</span> {b || '옵션 B'}</div>
              </div>
              <div className="admin-modal-preview-meta">{loc || '전국'} · 💰 {reward} QAOH POINT</div>
            </div>
          </div>

          <footer className="admin-modal-foot">
            <button type="button" className="admin-btn admin-btn-ghost" onClick={onClose}>취소</button>
            <button type="submit" className="admin-btn admin-btn-primary admin-btn-lg" disabled={!canSubmit}>
              폴 만들기
            </button>
          </footer>
        </form>
      </div>
    </div>
  );
};

/* ─── Reports panel ─── */
const AdminReports = ({ reports, onResolve, onDismiss, onBanFromReport }) => {
  const [filter, setFilter] = useState('pending');
  const list = reports.filter(r => filter === 'all' ? true : r.status === filter);

  return (
    <>
      <div className="admin-toolbar">
        <div className="admin-filter">
          {['pending', 'resolved', 'dismissed', 'all'].map(f => (
            <button key={f} className={"admin-chip" + (filter === f ? ' on' : '')} onClick={() => setFilter(f)}>
              {f === 'pending' ? '대기' : f === 'resolved' ? '처리됨' : f === 'dismissed' ? '기각됨' : '전체'}
              <span className="admin-chip-count">{f === 'all' ? reports.length : reports.filter(r => r.status === f).length}</span>
            </button>
          ))}
        </div>
      </div>

      {list.length === 0 ? (
        <div className="admin-card"><div className="admin-empty">조건에 맞는 신고가 없어요</div></div>
      ) : (
        <div className="admin-report-grid">
          {list.map(r => (
            <div className={"admin-report" + (r.status === 'pending' ? ' is-pending' : '')} key={r.id}>
              <div className="admin-report-head">
                <span className={"admin-pill " + (r.kind === 'user' ? 'admin-pill-warn' : 'admin-pill-info')}>{r.kind === 'user' ? '사용자' : '폴'}</span>
                <span className="admin-report-target">{r.targetLabel}</span>
                <span className="admin-report-time">{fmtRel(r.ts)}</span>
              </div>
              <div className="admin-report-reason">{r.reason}</div>
              <div className="admin-report-meta">신고자 <strong className="admin-cell-mono">{r.reporter}</strong></div>
              {r.status === 'pending' ? (
                <div className="admin-report-actions">
                  {r.kind === 'user' ? (
                    <button className="admin-btn admin-btn-warn" onClick={() => onBanFromReport(r)}>정지 + 처리</button>
                  ) : null}
                  <button className="admin-btn" onClick={() => onResolve(r.id, '경고 발송')}>경고 처리</button>
                  <button className="admin-btn admin-btn-ghost" onClick={() => onDismiss(r.id, '근거 부족')}>기각</button>
                </div>
              ) : (
                <div className="admin-report-resolved">
                  <span className={"admin-pill " + (r.status === 'resolved' ? 'admin-pill-success' : 'admin-pill-ghost')}>{r.status === 'resolved' ? '처리됨' : '기각됨'}</span>
                  {r.resolution ? <span className="admin-muted">· {r.resolution}</span> : null}
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </>
  );
};

/* ─── Announcements panel ─── */
const AdminAnnouncements = ({ announcements, onPush, onRemove }) => {
  const [title, setTitle] = useState('');
  const [body, setBody] = useState('');
  const [level, setLevel] = useState('info');
  const submit = (e) => {
    if (e && e.preventDefault) e.preventDefault();
    if (!title.trim() || !body.trim()) return;
    onPush({ id: 'a' + Date.now(), title: title.trim(), body: body.trim(), level, ts: Date.now() });
    setTitle(''); setBody(''); setLevel('info');
  };
  return (
    <>
      <div className="admin-grid form-2-col">
        <form className="admin-card" onSubmit={submit}>
          <div className="admin-card-head">
            <div>
              <div className="admin-card-title">새 공지 작성</div>
              <div className="admin-card-sub">모바일 앱 상단에 베너로 표시</div>
            </div>
          </div>
          <div className="admin-form">
            <label className="admin-form-label">제목</label>
            <input className="admin-input" type="text" maxLength={80} value={title} onChange={(e) => setTitle(e.target.value)} placeholder="예: 점검 안내" required/>
            <label className="admin-form-label">본문</label>
            <textarea className="admin-input" rows={4} maxLength={300} value={body} onChange={(e) => setBody(e.target.value)} placeholder="공지 내용을 입력하세요 (최대 300자)" required/>
            <label className="admin-form-label">우선순위</label>
            <div className="admin-radio-row">
              {[{ id: 'info', label: '안내' }, { id: 'warn', label: '주의' }, { id: 'danger', label: '긴급' }].map(o => (
                <label key={o.id} className={"admin-radio" + (level === o.id ? ' on' : '')}>
                  <input type="radio" name="annlevel" value={o.id} checked={level === o.id} onChange={() => setLevel(o.id)}/>
                  <span>{o.label}</span>
                </label>
              ))}
            </div>
            <button type="submit" className="admin-btn admin-btn-primary admin-btn-lg">전송</button>
          </div>
        </form>
        <div className="admin-card">
          <div className="admin-card-head">
            <div>
              <div className="admin-card-title">발송된 공지 · {announcements.length}건</div>
              <div className="admin-card-sub">최근순</div>
            </div>
          </div>
          {announcements.length === 0 ? (
            <div className="admin-empty">아직 발송된 공지가 없어요. 좌측 폼으로 첫 공지를 작성해 보세요.</div>
          ) : (
            <div className="admin-ann-list">
              {announcements.slice().sort((a, b) => b.ts - a.ts).map(a => (
                <div className={"admin-ann admin-ann-" + a.level} key={a.id}>
                  <div className="admin-ann-head">
                    <span className={"admin-pill admin-pill-" + (a.level === 'danger' ? 'danger' : a.level === 'warn' ? 'warn' : 'info')}>{a.level === 'danger' ? '긴급' : a.level === 'warn' ? '주의' : '안내'}</span>
                    <span className="admin-ann-title">{a.title}</span>
                    <button className="admin-btn admin-btn-ghost admin-btn-sm" onClick={() => { if (window.confirm('이 공지를 삭제할까요?')) onRemove(a.id); }}>삭제</button>
                  </div>
                  <div className="admin-ann-body">{a.body}</div>
                  <div className="admin-ann-time">{fmtDate(a.ts)} · {fmtRel(a.ts)}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </>
  );
};
