/* ─── AdminAIGen — AI 폴 자동 생성 ─── */
const AdminAIGen = ({ aiPolls, schedule, history, onGenerateNow, onToggleSchedule, onSetHour, onDeletePoll, onClearAll }) => {
  const [filter, setFilter] = useState('all'); // all | today | category
  const [catFilter, setCatFilter] = useState('전체');
  const [generating, setGenerating] = useState(false);
  const [flash, setFlash] = useState(null); // {count}
  const [query, setQuery] = useState('');

  /* 통계 계산 */
  const stats = useMemo(() => {
    const todayMidnight = (() => {
      const n = new Date(); return new Date(n.getFullYear(), n.getMonth(), n.getDate()).getTime();
    })();
    const todayCount = aiPolls.filter(p => p.generatedAt >= todayMidnight).length;
    const totalCount = aiPolls.length;
    const totalVotes = aiPolls.reduce((s, p) => s + (p.va || 0) + (p.vb || 0), 0);
    const avgTrend = aiPolls.length ? Math.round(aiPolls.reduce((s, p) => s + (p.trendScore || 0), 0) / aiPolls.length) : 0;
    const catDist = (() => {
      const m = new Map();
      for (const p of aiPolls) m.set(p.cat, (m.get(p.cat) || 0) + 1);
      return Array.from(m.entries()).sort((a, b) => b[1] - a[1]);
    })();
    return { todayCount, totalCount, totalVotes, avgTrend, catDist };
  }, [aiPolls]);

  /* 필터링된 폴 */
  const filteredPolls = useMemo(() => {
    let arr = aiPolls;
    if (filter === 'today') {
      const n = new Date();
      const midnight = new Date(n.getFullYear(), n.getMonth(), n.getDate()).getTime();
      arr = arr.filter(p => p.generatedAt >= midnight);
    }
    if (catFilter !== '전체') arr = arr.filter(p => p.cat === catFilter);
    if (query.trim()) {
      const q = query.trim().toLowerCase();
      arr = arr.filter(p => p.title.toLowerCase().includes(q) || p.a.toLowerCase().includes(q) || p.b.toLowerCase().includes(q));
    }
    return arr;
  }, [aiPolls, filter, catFilter, query]);

  const categories = useMemo(() => {
    const set = new Set(aiPolls.map(p => p.cat));
    return ['전체', ...Array.from(set)];
  }, [aiPolls]);

  /* 다음 자동 생성 시각 계산 */
  const nextRunLabel = (() => {
    if (!schedule.enabled) return '자동 생성 꺼짐';
    const now = new Date();
    const todayRun = new Date(now.getFullYear(), now.getMonth(), now.getDate(), schedule.hour, 0, 0).getTime();
    const next = Date.now() >= todayRun ? todayRun + 86400000 : todayRun;
    const d = new Date(next);
    const isTomorrow = d.toDateString() !== now.toDateString();
    return `${isTomorrow ? '내일' : '오늘'} ${String(d.getHours()).padStart(2, '0')}:00`;
  })();

  const handleGenerate = async (count) => {
    setGenerating(true);
    /* 사용자에게 "생성 중" 인상을 주기 위해 1.2초 의도적 지연 */
    await new Promise(r => setTimeout(r, 1200));
    onGenerateNow(count);
    setGenerating(false);
    setFlash({ count, ts: Date.now() });
    setTimeout(() => setFlash(null), 3200);
  };

  return (
    <>
      {/* 상단 액션 영역 */}
      <div className="admin-ai-hero">
        <div className="admin-ai-hero-left">
          <div className="admin-ai-hero-badge">
            <span className="admin-ai-spark" aria-hidden="true">✦</span> AI Generator
          </div>
          <h2 className="admin-ai-hero-title">한국 트렌드 폴, AI가 매일 100개 생성</h2>
          <p className="admin-ai-hero-sub">250+ 큐레이션 라이브러리에서 카테고리 다양성을 보장하며 매일 다른 100개를 셔플 · 발행합니다.</p>
          <div className="admin-ai-hero-actions">
            <button className="admin-btn admin-btn-primary admin-btn-lg" disabled={generating} onClick={() => handleGenerate(100)}>
              {generating ? <><span className="admin-ai-spin" aria-hidden="true">⟳</span> 생성 중…</> : <>✦ 지금 100개 생성</>}
            </button>
            <button className="admin-btn admin-btn-ghost" disabled={generating} onClick={() => handleGenerate(20)}>+ 20개 더 추가</button>
            {aiPolls.length > 0 && (
              <button className="admin-btn admin-btn-danger-ghost" onClick={onClearAll}>전체 삭제</button>
            )}
          </div>
          {flash && (
            <div className="admin-ai-flash" role="status">
              ✓ {flash.count}개 폴이 생성되어 즉시 사용자 앱에 노출됩니다
            </div>
          )}
        </div>
        <div className="admin-ai-hero-right">
          <div className="admin-ai-schedule-card">
            <div className="admin-ai-schedule-head">
              <span className="admin-ai-clock" aria-hidden="true">⏰</span>
              <span>자동 생성 스케줄</span>
            </div>
            <label className="admin-ai-schedule-row">
              <span>매일 자동 생성</span>
              <span className="admin-toggle-wrap">
                <input type="checkbox" className="admin-toggle" checked={schedule.enabled} onChange={(e) => onToggleSchedule(e.target.checked)}/>
              </span>
            </label>
            <label className="admin-ai-schedule-row admin-ai-schedule-hour">
              <span>생성 시각</span>
              <select className="admin-select" value={schedule.hour} onChange={(e) => onSetHour(e.target.value)} disabled={!schedule.enabled}>
                {Array.from({ length: 24 }, (_, i) => i).map(h => (
                  <option key={h} value={h}>{String(h).padStart(2, '0')}:00</option>
                ))}
              </select>
            </label>
            <div className="admin-ai-schedule-meta">
              <span className="admin-ai-schedule-meta-dot" data-on={schedule.enabled ? 'true' : 'false'}/>
              <span>다음 실행: <b>{nextRunLabel}</b></span>
            </div>
            {schedule.lastRun > 0 && (
              <div className="admin-ai-schedule-foot">마지막 자동 실행 {fmtRel(schedule.lastRun)}</div>
            )}
          </div>
        </div>
      </div>

      {/* KPI 카드 */}
      <div className="admin-kpi-grid">
        <div className="admin-kpi">
          <div className="admin-kpi-label">오늘 생성된 폴</div>
          <div className="admin-kpi-value">{fmtNum(stats.todayCount)}</div>
          <div className="admin-kpi-foot">목표 100개</div>
        </div>
        <div className="admin-kpi">
          <div className="admin-kpi-label">누적 AI 폴</div>
          <div className="admin-kpi-value">{fmtNum(stats.totalCount)}</div>
          <div className="admin-kpi-foot">최근 300개 보관</div>
        </div>
        <div className="admin-kpi">
          <div className="admin-kpi-label">총 응답 수</div>
          <div className="admin-kpi-value">{fmtNum(stats.totalVotes)}</div>
          <div className="admin-kpi-foot">AI 폴 누적</div>
        </div>
        <div className="admin-kpi">
          <div className="admin-kpi-label">평균 트렌드 스코어</div>
          <div className="admin-kpi-value">{stats.avgTrend}<span style={{ fontSize: 18, opacity: 0.6 }}>/100</span></div>
          <div className="admin-kpi-foot">70~99 범위</div>
        </div>
      </div>

      {/* 카테고리 분포 + 최근 히스토리 */}
      <div className="admin-ai-twocol">
        <section className="admin-card">
          <header className="admin-card-head">
            <h3>카테고리 분포</h3>
            <span className="admin-card-sub">현재 누적 {stats.totalCount}개 기준</span>
          </header>
          {stats.catDist.length === 0 ? (
            <p className="admin-empty">아직 생성된 폴이 없어요. 우상단에서 "지금 100개 생성"을 눌러 시작해 보세요.</p>
          ) : (
            <ul className="admin-bar-list">
              {stats.catDist.slice(0, 10).map(([cat, n]) => {
                const pct = stats.totalCount ? Math.round((n / stats.totalCount) * 100) : 0;
                return (
                  <li key={cat} className="admin-bar-item">
                    <span className="admin-bar-label">{cat}</span>
                    <span className="admin-bar-track"><span className="admin-bar-fill" style={{ width: pct + '%' }}/></span>
                    <span className="admin-bar-val">{n}<span style={{ opacity: 0.5 }}> · {pct}%</span></span>
                  </li>
                );
              })}
            </ul>
          )}
        </section>
        <section className="admin-card">
          <header className="admin-card-head">
            <h3>생성 히스토리</h3>
            <span className="admin-card-sub">최근 {Math.min(history.length, 8)}건</span>
          </header>
          {history.length === 0 ? (
            <p className="admin-empty">아직 실행 기록이 없어요.</p>
          ) : (
            <ul className="admin-audit-mini">
              {history.slice(0, 8).map((h, i) => (
                <li key={h.ts + '-' + i}>
                  <span className={"admin-audit-kind-pill kind-" + (h.kind === 'auto' ? 'set-flag' : 'create-poll')}>
                    {h.kind === 'auto' ? '자동' : '수동'}
                  </span>
                  <span className="admin-audit-detail">{h.count}개 생성</span>
                  <span className="admin-audit-time">{fmtRel(h.ts)}</span>
                </li>
              ))}
            </ul>
          )}
        </section>
      </div>

      {/* 폴 목록 */}
      <section className="admin-card admin-ai-list-card">
        <header className="admin-card-head">
          <h3>생성된 폴 ({filteredPolls.length})</h3>
          <div className="admin-card-actions">
            <input className="admin-search admin-search-sm" type="text" placeholder="제목/옵션 검색" value={query} onChange={(e) => setQuery(e.target.value)}/>
          </div>
        </header>
        <div className="admin-ai-filter-bar">
          <div className="admin-filter">
            <button className={"admin-chip" + (filter === 'all' ? ' on' : '')} onClick={() => setFilter('all')}>전체 <span className="admin-chip-count">{aiPolls.length}</span></button>
            <button className={"admin-chip" + (filter === 'today' ? ' on' : '')} onClick={() => setFilter('today')}>오늘 생성 <span className="admin-chip-count">{stats.todayCount}</span></button>
          </div>
          <div className="admin-filter admin-filter-cats">
            {categories.slice(0, 9).map(c => (
              <button key={c} className={"admin-chip admin-chip-sm" + (catFilter === c ? ' on' : '')} onClick={() => setCatFilter(c)}>{c}</button>
            ))}
          </div>
        </div>
        {filteredPolls.length === 0 ? (
          <p className="admin-empty">{aiPolls.length === 0 ? '✦ "지금 100개 생성"을 눌러 첫 폴을 만들어 보세요.' : '조건에 맞는 폴이 없어요.'}</p>
        ) : (
          <div className="admin-ai-grid">
            {filteredPolls.slice(0, 60).map(p => (
              <article key={p.id} className="admin-ai-poll">
                <header className="admin-ai-poll-head">
                  <span className="admin-ai-poll-cat">{p.cat}</span>
                  <span className="admin-ai-poll-score" title="트렌드 스코어">🔥 {p.trendScore}</span>
                </header>
                <h4 className="admin-ai-poll-title">{p.title}</h4>
                <div className="admin-ai-poll-opts">
                  <div className="admin-ai-poll-opt"><span className="admin-ai-poll-emoji">{p.ea}</span><span>{p.a}</span></div>
                  <span className="admin-ai-poll-vs">vs</span>
                  <div className="admin-ai-poll-opt"><span className="admin-ai-poll-emoji">{p.eb}</span><span>{p.b}</span></div>
                </div>
                <footer className="admin-ai-poll-foot">
                  <span>{fmtRel(p.generatedAt)} · {p.loc}</span>
                  <button className="admin-btn admin-btn-ghost admin-btn-xs" onClick={() => onDeletePoll(p.id)}>삭제</button>
                </footer>
              </article>
            ))}
            {filteredPolls.length > 60 && (
              <div className="admin-ai-grid-more">+ {filteredPolls.length - 60}개 더 (검색으로 좁혀 보세요)</div>
            )}
          </div>
        )}
      </section>
    </>
  );
};

/* ─── Best Picks: 매달 5곳 큐레이션 ─── */
const AdminBestPicks = ({ bestPicks, history, onSave, onClear }) => {
  const [filter, setFilter] = useState('all');
  const [query, setQuery] = useState('');
  const [selected, setSelected] = useState(() => bestPicks.picks || []);
  const [note, setNote] = useState(bestPicks.note || '');

  // 외부 갱신 시 동기화
  useEffect(() => {
    setSelected(bestPicks.picks || []);
    setNote(bestPicks.note || '');
  }, [bestPicks.monthStart, bestPicks.picks?.length]); // eslint-disable-line react-hooks/exhaustive-deps

  const currentMonthStart = getMonthStartTs();
  const savedMonthStart = bestPicks.monthStart || 0;
  const isCurrentMonth = savedMonthStart === currentMonthStart;
  const needsUpdate = !isCurrentMonth && bestPicks.picks?.length > 0;

  const filtered = useMemo(() => {
    let arr = PLACES;
    if (filter !== 'all') arr = arr.filter(p => p.cat === filter);
    if (query.trim()) {
      const q = query.trim().toLowerCase();
      arr = arr.filter(p => p.name.toLowerCase().includes(q) || p.tags.toLowerCase().includes(q));
    }
    return [...arr].sort((a, b) => b.votes - a.votes);
  }, [filter, query]);

  const togglePlace = (id) => {
    setSelected(prev => {
      if (prev.includes(id)) return prev.filter(x => x !== id);
      if (prev.length >= 5) {
        window.alert('베스트 픽은 최대 5곳까지 선정할 수 있어요. 다른 곳을 빼고 추가해 주세요.');
        return prev;
      }
      return [...prev, id];
    });
  };
  const moveUp = (idx) => {
    if (idx === 0) return;
    setSelected(prev => {
      const a = [...prev]; [a[idx - 1], a[idx]] = [a[idx], a[idx - 1]]; return a;
    });
  };
  const moveDown = (idx) => {
    setSelected(prev => {
      if (idx >= prev.length - 1) return prev;
      const a = [...prev]; [a[idx], a[idx + 1]] = [a[idx + 1], a[idx]]; return a;
    });
  };
  const removeAt = (idx) => setSelected(prev => prev.filter((_, i) => i !== idx));

  const canSave = selected.length >= 1 && selected.length <= 5;
  const handleSave = () => {
    if (!canSave) return;
    onSave(selected, note.trim());
  };

  const placeById = (id) => PLACES.find(p => p.id === id);
  const categories = ['all', '카페', '맛집', '쇼핑', '활동', '캠퍼스'];

  return (
    <>
      <div className="admin-best-grid">
        <section className="admin-card admin-best-current">
          <header className="admin-card-head">
            <div>
              <h3>이번 달 베스트 픽</h3>
              <p className="admin-muted">선정된 5곳이 카오맵 하단에 노출됩니다</p>
            </div>
            <div className="admin-best-week-pill">
              {savedMonthStart
                ? <>📅 {formatMonthLabel(savedMonthStart)}<span style={{marginInlineStart:6, opacity:0.7}}>({isCurrentMonth ? '이번 달' : '지난 달'})</span></>
                : <>📅 미선정</>}
            </div>
          </header>

          {needsUpdate && (
            <div className="admin-best-warn">
              <span>⚠️</span>
              <div>
                <b>새 달이 시작됐어요</b>
                <p>지난 달 베스트 픽이 아직 노출 중입니다. 사용자에게는 "지난 달" 라벨로 표시돼요. 이번 달 5곳을 새로 선정해 주세요.</p>
              </div>
            </div>
          )}

          <ol className="admin-best-selected">
            {selected.length === 0 ? (
              <li className="admin-best-empty">아직 선정된 곳이 없어요. 아래 후보 중 5곳을 골라 주세요.</li>
            ) : selected.map((id, idx) => {
              const p = placeById(id);
              if (!p) return null;
              return (
                <li key={id} className="admin-best-row">
                  <span className="admin-best-rank">{idx + 1}</span>
                  <div className="admin-best-body">
                    <div className="admin-best-name">{p.name}</div>
                    <div className="admin-best-meta">
                      <span className="admin-pill admin-pill-ghost">{p.cat}</span>
                      <span className="admin-muted">{p.tags}</span>
                      <span className="admin-cell-mono">{fmtNum(p.votes)}표</span>
                    </div>
                  </div>
                  <div className="admin-best-row-actions">
                    <button className="admin-btn admin-btn-ghost admin-btn-xs" onClick={() => moveUp(idx)} disabled={idx === 0} title="위로">▲</button>
                    <button className="admin-btn admin-btn-ghost admin-btn-xs" onClick={() => moveDown(idx)} disabled={idx === selected.length - 1} title="아래로">▼</button>
                    <button className="admin-btn admin-btn-danger admin-btn-xs" onClick={() => removeAt(idx)} title="제외">✕</button>
                  </div>
                </li>
              );
            })}
          </ol>

          <label className="admin-form-label" style={{marginTop:14}}>주제/큐레이션 노트 (선택)</label>
          <input
            className="admin-input"
            type="text"
            maxLength={48}
            value={note}
            onChange={(e) => setNote(e.target.value)}
            placeholder='예: "이번 달은 성수 카페 특집" · "여름맞이 한강 핫플"'
          />

          <footer className="admin-card-foot">
            <span className="admin-best-count">선정 {selected.length} / 5곳</span>
            <div className="admin-best-foot-actions">
              <button className="admin-btn admin-btn-ghost" onClick={onClear} disabled={!bestPicks.picks?.length}>비우기</button>
              <button className="admin-btn admin-btn-primary admin-btn-lg" onClick={handleSave} disabled={!canSave}>
                {isCurrentMonth ? '이번 달로 저장' : '이번 달로 발행'}
              </button>
            </div>
          </footer>
        </section>

        <section className="admin-card admin-best-history">
          <header className="admin-card-head">
            <div>
              <h3>지난 큐레이션 기록</h3>
              <p className="admin-muted">최근 12개월</p>
            </div>
          </header>
          {history.length === 0 ? (
            <div className="admin-empty admin-empty-soft">아직 기록이 없어요. 첫 베스트 픽을 발행해 보세요.</div>
          ) : (
            <ul className="admin-best-history-list">
              {history.map((h, i) => (
                <li key={i}>
                  <div className="admin-best-history-week">{formatMonthLabel(h.monthStart)}</div>
                  <div className="admin-best-history-picks">
                    {h.picks.map(pid => placeById(pid)?.name).filter(Boolean).join(' · ') || '—'}
                  </div>
                  {h.note ? <div className="admin-best-history-note">"{h.note}"</div> : null}
                </li>
              ))}
            </ul>
          )}
        </section>
      </div>

      <section className="admin-card admin-best-pool">
        <header className="admin-card-head">
          <div>
            <h3>후보 장소 ({filtered.length}곳)</h3>
            <p className="admin-muted">카오맵에 등록된 모든 장소 · 클릭으로 선정/제외</p>
          </div>
          <div className="admin-best-pool-tools">
            <input
              className="admin-input admin-input-sm"
              type="text"
              placeholder="이름 · 태그 검색"
              value={query}
              onChange={(e) => setQuery(e.target.value)}
              style={{width: 180}}
            />
          </div>
        </header>
        <div className="admin-filter">
          {categories.map(c => (
            <button key={c} className={"admin-chip" + (filter === c ? ' on' : '')} onClick={() => setFilter(c)}>
              {c === 'all' ? '전체' : c}
              <span className="admin-chip-count">{c === 'all' ? PLACES.length : PLACES.filter(p => p.cat === c).length}</span>
            </button>
          ))}
        </div>
        <div className="admin-best-pool-grid">
          {filtered.map(p => {
            const picked = selected.includes(p.id);
            const idx = selected.indexOf(p.id);
            return (
              <button
                key={p.id}
                type="button"
                className={"admin-best-cell" + (picked ? ' is-picked' : '')}
                onClick={() => togglePlace(p.id)}
              >
                {picked ? <span className="admin-best-cell-rank">{idx + 1}</span> : null}
                <div className="admin-best-cell-name">{p.name}</div>
                <div className="admin-best-cell-meta">
                  <span className="admin-pill admin-pill-ghost">{p.cat}</span>
                  <span className="admin-muted admin-cell-mono">{fmtNum(p.votes)}</span>
                </div>
                <div className="admin-best-cell-tags">{p.tags}</div>
              </button>
            );
          })}
        </div>
      </section>
    </>
  );
};

const AdminConsole = ({ account, onLogout }) => {
  const [section, setSection] = useState('dashboard');
  const [refreshTick, setRefreshTick] = useState(0);
  const bump = () => setRefreshTick(t => t + 1);

  const registry = useMemo(() => loadAccountsRegistry(), [refreshTick]);
  const banned = useMemo(() => loadBannedHandles(), [refreshTick]);
  const hiddenPolls = useMemo(() => loadHiddenPolls(), [refreshTick]);
  const pinnedPolls = useMemo(() => loadPinnedPolls(), [refreshTick]);
  const announcements = useMemo(() => loadAnnouncements(), [refreshTick]);
  const flags = useMemo(() => loadFlags(), [refreshTick]);
  const audit = useMemo(() => loadAuditLog(), [refreshTick]);
  const reports = useMemo(() => loadReports(), [refreshTick]);
  const customPolls = useMemo(() => loadCustomPolls(), [refreshTick]);
  const aiPolls = useMemo(() => loadAIPolls(), [refreshTick]);
  const aiSchedule = useMemo(() => loadAISchedule(), [refreshTick]);
  const aiHistory = useMemo(() => loadAIHistory(), [refreshTick]);
  const bestPicks = useMemo(() => loadBestPicks(), [refreshTick]);
  const bestPicksHistory = useMemo(() => loadBestPicksHistory(), [refreshTick]);
  /* allPolls — 관리자가 만든 폴 + AI 생성 폴 + 시드. content/dashboard 양쪽에서 함께 사용. */
  const allPolls = useMemo(() => [...customPolls, ...aiPolls, ...POLLS_SEED], [customPolls, aiPolls]);

  /* AI 자동 생성 — 콘솔 마운트 시 1회 확인.
     스케줄이 켜져 있고, lastRun이 오늘 예약 시각 이전이며, 현재 시각이 예약 시각을 지났다면
     자동으로 100개 생성. */
  useEffect(() => {
    const s = loadAISchedule();
    if (!s.enabled) return;
    const now = new Date();
    const todayScheduled = new Date(now.getFullYear(), now.getMonth(), now.getDate(), s.hour, 0, 0).getTime();
    if (Date.now() >= todayScheduled && s.lastRun < todayScheduled) {
      const generated = generateAIPolls(100);
      addAIPolls(generated);
      const next = { ...s, lastRun: Date.now() };
      saveAISchedule(next);
      appendAIHistory({ kind: 'auto', count: generated.length, batchId: generated[0]?.batchId });
      appendAuditLog({ kind: 'ai-generate', actor: 'system', target: 'auto', detail: `${generated.length}개 자동 생성` });
      bump();
    }
  }, []); // eslint-disable-line react-hooks/exhaustive-deps

  const onBan = (handle, reason) => {
    const set = loadBannedHandles();
    const h = cleanHandle(handle);
    if (set.has(h)) return;
    set.add(h);
    saveBannedHandles(set);
    appendAuditLog({ kind: 'ban-user', actor: 'admin', target: '@' + h, detail: reason || '' });
    bump();
  };
  const onUnban = (handle) => {
    const set = loadBannedHandles();
    const h = cleanHandle(handle);
    if (!set.has(h)) return;
    set.delete(h);
    saveBannedHandles(set);
    appendAuditLog({ kind: 'unban-user', actor: 'admin', target: '@' + h, detail: '' });
    bump();
  };
  const onDeleteUser = (handle) => {
    const h = cleanHandle(handle);
    removeAccountFromRegistry(h);
    appendAuditLog({ kind: 'delete-user', actor: 'admin', target: '@' + h, detail: '계정 영구 삭제' });
    bump();
  };
  const onToggleHidden = (pollId) => {
    const set = loadHiddenPolls();
    if (set.has(pollId)) { set.delete(pollId); appendAuditLog({ kind: 'unhide-poll', actor: 'admin', target: pollId, detail: '' }); }
    else { set.add(pollId); appendAuditLog({ kind: 'hide-poll', actor: 'admin', target: pollId, detail: '' }); }
    saveHiddenPolls(set);
    bump();
  };
  const onTogglePinned = (pollId) => {
    const set = loadPinnedPolls();
    if (set.has(pollId)) { set.delete(pollId); appendAuditLog({ kind: 'unpin-poll', actor: 'admin', target: pollId, detail: '' }); }
    else { set.add(pollId); appendAuditLog({ kind: 'pin-poll', actor: 'admin', target: pollId, detail: '' }); }
    savePinnedPolls(set);
    bump();
  };
  const onPushAnn = (data) => {
    const arr = loadAnnouncements();
    arr.push(data);
    saveAnnouncements(arr);
    appendAuditLog({ kind: 'push-announcement', actor: 'admin', target: data.id, detail: data.title });
    bump();
  };
  const onRemoveAnn = (id) => {
    const arr = loadAnnouncements().filter(a => a.id !== id);
    saveAnnouncements(arr);
    appendAuditLog({ kind: 'remove-announcement', actor: 'admin', target: id, detail: '' });
    bump();
  };
  const onToggleFlag = (key, value) => {
    const next = { ...loadFlags(), [key]: value };
    saveFlags(next);
    appendAuditLog({ kind: 'set-flag', actor: 'admin', target: key, detail: String(value) });
    bump();
  };
  const onClearStorage = () => {
    if (!window.confirm('정말 모든 관리자 데이터를 초기화할까요?\n가입자 계정은 유지되지만 관리자가 만든 폴 · 공지 · 플래그는 모두 사라집니다.')) return;
    [ADMIN_KEYS.banned, ADMIN_KEYS.hiddenPolls, ADMIN_KEYS.pinnedPolls, ADMIN_KEYS.announcements, ADMIN_KEYS.flags, ADMIN_KEYS.audit, ADMIN_KEYS.reports, CUSTOM_POLLS_KEY, AI_POLLS_KEY, AI_SCHEDULE_KEY, AI_HISTORY_KEY, BEST_PICKS_KEY, BEST_PICKS_HISTORY_KEY].forEach(k => {
      try { localStorage.removeItem(k); } catch (e) {}
    });
    appendAuditLog({ kind: 'reset-storage', actor: 'admin', target: '—', detail: '전체 초기화' });
    bump();
  };
  const onResolveReport = (id, resolution) => {
    const arr = loadReports().map(r => r.id === id ? { ...r, status: 'resolved', resolution, resolvedAt: Date.now() } : r);
    saveReports(arr);
    appendAuditLog({ kind: 'resolve-report', actor: 'admin', target: id, detail: resolution });
    bump();
  };
  const onDismissReport = (id, reason) => {
    const arr = loadReports().map(r => r.id === id ? { ...r, status: 'dismissed', resolution: reason, resolvedAt: Date.now() } : r);
    saveReports(arr);
    appendAuditLog({ kind: 'dismiss-report', actor: 'admin', target: id, detail: reason });
    bump();
  };
  const onBanFromReport = (report) => {
    if (report.kind !== 'user') return;
    const h = cleanHandle(report.target);
    onBan(h, '신고 처리: ' + report.reason);
    onResolveReport(report.id, '신고 대상 정지 처리');
  };
  const onCreatePoll = (data) => {
    const id = 'cp' + Date.now();
    const poll = {
      id, custom: true,
      cat: data.cat, loc: data.loc || '전국',
      title: data.title,
      a: data.a, b: data.b, ea: data.ea || '🅰️', eb: data.eb || '🅱️',
      va: 0, vb: 0, hot: 0,
      reward: Number(data.reward) || 30,
      createdAt: Date.now(),
    };
    addCustomPoll(poll);
    appendAuditLog({ kind: 'create-poll', actor: 'admin', target: id, detail: poll.title });
    bump();
  };
  const onDeleteCustomPoll = (id) => {
    if (!window.confirm('이 폴을 영구 삭제할까요?\n이미 받은 표는 함께 사라집니다.')) return;
    removeCustomPoll(id);
    // 숨김/핀고정 기록도 함께 정리
    const hp = loadHiddenPolls(); hp.delete(id); saveHiddenPolls(hp);
    const pp = loadPinnedPolls(); pp.delete(id); savePinnedPolls(pp);
    appendAuditLog({ kind: 'delete-poll', actor: 'admin', target: id, detail: '관리자 생성 폴 삭제' });
    bump();
  };

  /* 베스트 픽 — 1주일에 한 번 갱신, 5곳 선정 */
  const onSaveBestPicks = (placeIds, note) => {
    commitBestPicks(placeIds, note);
    appendAuditLog({ kind: 'set-best-picks', actor: 'admin', target: 'month-' + new Date().toISOString().slice(0, 7), detail: `${placeIds.length}곳 선정` });
    bump();
  };
  const onClearBestPicks = () => {
    if (!window.confirm('이번 달 베스트 픽을 모두 비울까요?\n사용자 화면에서는 안내 메시지가 표시됩니다.')) return;
    saveBestPicks({ picks: [], monthStart: 0, note: '' });
    appendAuditLog({ kind: 'clear-best-picks', actor: 'admin', target: '—', detail: '' });
    bump();
  };

  /* AI 폴 핸들러 */
  const onGenerateNow = (count = 100) => {
    const generated = generateAIPolls(count, Date.now() & 0xFFFFFFFF);
    addAIPolls(generated);
    const s = loadAISchedule();
    saveAISchedule({ ...s, lastRun: Date.now() });
    appendAIHistory({ kind: 'manual', count: generated.length, batchId: generated[0]?.batchId });
    appendAuditLog({ kind: 'ai-generate', actor: 'admin', target: 'manual', detail: `${generated.length}개 수동 생성` });
    bump();
  };
  const onToggleAISchedule = (enabled) => {
    const s = loadAISchedule();
    saveAISchedule({ ...s, enabled });
    appendAuditLog({ kind: 'set-flag', actor: 'admin', target: 'ai-schedule', detail: enabled ? 'ON' : 'OFF' });
    bump();
  };
  const onSetAIHour = (hour) => {
    const s = loadAISchedule();
    const h = Math.max(0, Math.min(23, Number(hour) || 0));
    saveAISchedule({ ...s, hour: h });
    appendAuditLog({ kind: 'set-flag', actor: 'admin', target: 'ai-schedule-hour', detail: String(h).padStart(2, '0') + ':00' });
    bump();
  };
  const onDeleteAIPoll = (id) => {
    removeAIPoll(id);
    const hp = loadHiddenPolls(); hp.delete(id); saveHiddenPolls(hp);
    const pp = loadPinnedPolls(); pp.delete(id); savePinnedPolls(pp);
    appendAuditLog({ kind: 'delete-poll', actor: 'admin', target: id, detail: 'AI 생성 폴 삭제' });
    bump();
  };
  const onClearAIPolls = () => {
    if (!window.confirm('AI가 생성한 폴을 모두 삭제할까요?\n사용자가 받은 표도 함께 사라집니다.')) return;
    const ids = loadAIPolls().map(p => p.id);
    clearAIPolls();
    const hp = loadHiddenPolls(); ids.forEach(id => hp.delete(id)); saveHiddenPolls(hp);
    const pp = loadPinnedPolls(); ids.forEach(id => pp.delete(id)); savePinnedPolls(pp);
    appendAuditLog({ kind: 'ai-clear', actor: 'admin', target: '—', detail: `${ids.length}개 일괄 삭제` });
    bump();
  };

  const currentNav = ADMIN_NAV.find(n => n.id === section) || ADMIN_NAV[0];

  return (
    <div className="admin-shell">
      <aside className="admin-sidebar">
        <div className="admin-brand">
          <div className="admin-brand-mark">Q</div>
          <div className="admin-brand-text">
            <div className="admin-brand-name">QAOH Admin</div>
            <div className="admin-brand-sub">관리자 콘솔</div>
          </div>
        </div>
        <nav className="admin-nav">
          {ADMIN_NAV.map(n => (
            <button key={n.id} className={"admin-nav-item" + (section === n.id ? ' on' : '')} onClick={() => setSection(n.id)}>
              <AdminNavIcon d={n.icon}/>
              <span>{n.label}</span>
              {n.id === 'reports' && reports.filter(r => r.status === 'pending').length > 0 ? (
                <span className="admin-nav-badge">{reports.filter(r => r.status === 'pending').length}</span>
              ) : null}
              {n.id === 'system' && flags.maintenance ? (
                <span className="admin-nav-badge warn">⚠</span>
              ) : null}
            </button>
          ))}
        </nav>
        <div className="admin-sidebar-foot">
          <div className="admin-me">
            <div className="admin-me-av">A</div>
            <div className="admin-me-body">
              <div className="admin-me-name">{account.nickname}</div>
              <div className="admin-me-handle">@{account.handle}</div>
            </div>
          </div>
          <button className="admin-btn admin-btn-ghost admin-btn-block" onClick={onLogout}>로그아웃</button>
        </div>
      </aside>
      <main className="admin-main">
        <header className="admin-topbar">
          <div className="admin-topbar-title">
            <h1>{currentNav.label}</h1>
            <p>{
              section === 'dashboard' ? 'QAOH 서비스의 핵심 지표를 한 눈에 보세요'
              : section === 'analytics' ? '출시 후 실제 사용자의 활성도 · 리텐션 · 세그먼트를 기간별로 추적합니다'
              : section === 'users' ? '가입 사용자와 시드 사용자를 관리합니다'
              : section === 'content' ? '폴(투표) 콘텐츠 게시 · 숨김 · 핀고정'
              : section === 'bestpicks' ? '카오맵 하단에 노출되는 이번 달 베스트 픽 5곳을 선정합니다'
              : section === 'ai' ? 'AI가 매일 한국 트렌드 폴 100개를 자동 생성합니다'
              : section === 'reports' ? '커뮤니티 신고를 검토하고 처리하세요'
              : section === 'announcements' ? '모바일 앱 베너 공지를 발송 · 관리'
              : section === 'system' ? '기능 플래그와 시스템 운영 설정'
              : '관리자 액션의 시간순 기록'
            }</p>
          </div>
          <div className="admin-topbar-meta">
            {flags.maintenance ? <span className="admin-pill admin-pill-danger">🔧 점검 모드 ON</span> : null}
            <span className="admin-pill admin-pill-ghost">{new Date().toLocaleDateString('ko-KR')}</span>
          </div>
        </header>
        <div className="admin-content">
          {section === 'dashboard' && <AdminDashboard registry={registry} banned={banned} hiddenPolls={hiddenPolls} reports={reports} announcements={announcements} audit={audit} polls={allPolls}/>}
          {section === 'analytics' && <AdminAnalytics/>}
          {section === 'users' && <AdminUsers registry={registry} banned={banned} onBan={onBan} onUnban={onUnban} onDelete={onDeleteUser}/>}
          {section === 'content' && <AdminContent polls={allPolls} hiddenPolls={hiddenPolls} pinnedPolls={pinnedPolls} onToggleHidden={onToggleHidden} onTogglePinned={onTogglePinned} onCreatePoll={onCreatePoll} onDeleteCustomPoll={onDeleteCustomPoll}/>}
          {section === 'bestpicks' && <AdminBestPicks bestPicks={bestPicks} history={bestPicksHistory} onSave={onSaveBestPicks} onClear={onClearBestPicks}/>}
          {section === 'ai' && <AdminAIGen aiPolls={aiPolls} schedule={aiSchedule} history={aiHistory} onGenerateNow={onGenerateNow} onToggleSchedule={onToggleAISchedule} onSetHour={onSetAIHour} onDeletePoll={onDeleteAIPoll} onClearAll={onClearAIPolls}/>}
          {section === 'reports' && <AdminReports reports={reports} onResolve={onResolveReport} onDismiss={onDismissReport} onBanFromReport={onBanFromReport}/>}
          {section === 'announcements' && <AdminAnnouncements announcements={announcements} onPush={onPushAnn} onRemove={onRemoveAnn}/>}
          {section === 'system' && <AdminSystem flags={flags} onToggleFlag={onToggleFlag} onClearStorage={onClearStorage}/>}
          {section === 'audit' && <AdminAudit audit={audit}/>}
        </div>
      </main>
    </div>
  );
};

/* ─────────────────  APP  ───────────────── */
const App = () => {
  const [tab, setTab] = useState('home');
  // QAPO를 localStorage에 영속화 (jjlj 같은 owner 계정의 부여값이 새로고침 후에도 유지되도록)
  const QAPO_KEY = 'qaoh-qapo';
  const [qapo, setQapo] = useState(() => {
    try { const n = Number(localStorage.getItem(QAPO_KEY)); return Number.isFinite(n) && n >= 0 ? n : 2450; }
    catch (e) { return 2450; }
  });
  useEffect(() => { try { localStorage.setItem(QAPO_KEY, String(qapo)); } catch (e) {} }, [qapo]);
  const [qapoPurchaseOpen, setQapoPurchaseOpen] = useState(false);

  // 알림 (notifications) — bell 아이콘으로 열기. 팔로우/맞팔/핫지/스토리 답장 4종.
  const [notifications, setNotifications] = useState(() => loadNotifs());
  const [notifOpen, setNotifOpen] = useState(false);
  useEffect(() => { saveNotifs(notifications); }, [notifications]);
  const notifUnreadCount = useMemo(() => notifications.filter(n => !n.read).length, [notifications]);
  const addNotification = useCallback((type, fromId, payload = {}) => {
    if (!type || !fromId) return;
    setNotifications(prev => [
      { id: 'n_' + Date.now() + '_' + Math.floor(Math.random() * 1000), type, fromId, payload, ts: Date.now(), read: false },
      ...prev,
    ].slice(0, 200));
  }, []);
  const openNotifications = () => {
    setNotifOpen(true);
    // 열면 모두 읽음 처리 (살짝 지연: 사용자가 뱃지가 사라지는 걸 인지하도록)
    setTimeout(() => {
      setNotifications(prev => prev.map(n => n.read ? n : { ...n, read: true }));
    }, 400);
  };
  const clearNotifications = () => setNotifications([]);

  // 카오로드 — 저장한 코스 (내 카오필에서 노출됨)
  const [savedCourses, setSavedCourses] = useState(() => loadSavedCourses());
  useEffect(() => { saveSavedCourses(savedCourses); }, [savedCourses]);
  const [courseListOpen, setCourseListOpen] = useState(false);
  const [activeCourse, setActiveCourse] = useState(null);
  const friendsByIdForCourses = useMemo(() => new Map(FRIENDS.map(f => [f.id, f])), []);
  const friendCourses = useMemo(() => getCourses(STORIES, FRIENDS), []);
  const isCourseSaved = useCallback((courseId) => savedCourses.some(c => c.id === courseId), [savedCourses]);
  const toggleSaveCourse = useCallback((course) => {
    setSavedCourses(prev => {
      if (prev.some(c => c.id === course.id)) {
        setToast({ kind: 'course-removed', name: course.title });
        return prev.filter(c => c.id !== course.id);
      }
      // Save a compact snapshot (so course persists even if source story expires)
      const snapshot = {
        id: course.id,
        authorId: course.authorId,
        nick: course.nick,
        friendColor: course.friend?.color,
        title: course.title,
        savedAt: Date.now(),
        cats: course.cats,
        totalKm: course.totalKm,
        stops: course.stops.map(s => ({
          id: s.id, emoji: s.emoji, caption: s.caption, bg: s.bg,
          placeName: s.placeName, placeCat: s.placeCat, lat: s.lat, lng: s.lng,
          sticker: s.sticker,
        })),
      };
      setToast({ kind: 'course-saved', name: course.title });
      return [snapshot, ...prev];
    });
  }, []);
  const openCourseList = () => setCourseListOpen(true);
  const openCourse = useCallback((course) => {
    setActiveCourse(course);
    setCourseListOpen(false);
  }, []);
  const closeCourse = () => setActiveCourse(null);
  const [reelCourse, setReelCourse] = useState(null);
  const openReel = useCallback((course) => { setReelCourse(course); }, []);
  const closeReel = useCallback(() => setReelCourse(null), []);
  // 정류장 디테일 (타임라인에서 카드 탭 → 영상/사진 + 장소 정보)
  const [stopDetail, setStopDetail] = useState(null); // { course, idx } | null
  const openStopDetail = useCallback((course, stop) => {
    const i = course.stops.findIndex(s => s.id === stop.id);
    if (i >= 0) setStopDetail({ course, idx: i });
  }, []);
  const closeStopDetail = useCallback(() => setStopDetail(null), []);
  const changeStopDetailIndex = useCallback((newIdx) => {
    setStopDetail(prev => prev ? { ...prev, idx: newIdx } : null);
  }, []);

  // 메시지함 (스토리 답장 스레드)
  const [threads, setThreads] = useState(() => loadMessageThreads());
  const [messagesOpen, setMessagesOpen] = useState(false);
  const [activeThreadId, setActiveThreadId] = useState(null);
  useEffect(() => { saveMessageThreads(threads); }, [threads]);
  const messagesUnreadCount = useMemo(() => {
    let n = 0;
    for (const t of threads) {
      for (const m of t.messages) {
        if (m.from === 'friend' && !m.read) n++;
      }
    }
    return n;
  }, [threads]);
  const openMessages = (threadId = null) => {
    setActiveThreadId(threadId);
    setMessagesOpen(true);
  };
  const closeMessages = () => {
    setMessagesOpen(false);
    setActiveThreadId(null);
  };
  const markThreadRead = useCallback((threadId) => {
    setThreads(prev => prev.map(t => {
      if (t.id !== threadId) return t;
      return { ...t, messages: t.messages.map(m => m.read ? m : { ...m, read: true }) };
    }));
  }, []);
  const sendMessage = useCallback((threadId, text, kind = 'text', badgeId = null) => {
    if (!threadId || !text) return;
    const trimmed = text.trim();
    if (!trimmed && kind === 'text') return;
    setThreads(prev => prev.map(t => {
      if (t.id !== threadId) return t;
      const msg = {
        id: 'm_' + Date.now() + '_' + Math.floor(Math.random() * 1000),
        from: 'me',
        text: trimmed,
        kind, badgeId,
        ts: Date.now(),
        read: true,
      };
      return { ...t, messages: [...t.messages, msg] };
    }));
    // 1.2~2.6초 후 자동 답장 (데모용)
    const friendId = (threads.find(t => t.id === threadId) || {}).friendId;
    if (!friendId) return;
    const replies = [
      '오 좋아 ㅎㅎ', '굳굳 ✨', '진짜? 더 알려줘', '나도 그 생각 했어 ㅋㅋ',
      '오케이!', '와 대박 🙌', '같이 가자 그러면', '시간 맞춰서 갈게 ✦',
      '음 잠깐 일정 보고 답할게', '굿굿 좋아 좋아 ㅎㅎ',
    ];
    const reply = replies[Math.floor(Math.random() * replies.length)];
    const delay = 1200 + Math.floor(Math.random() * 1400);
    setTimeout(() => {
      setThreads(prev => prev.map(t => {
        if (t.id !== threadId) return t;
        const m = {
          id: 'mr_' + Date.now() + '_' + Math.floor(Math.random() * 1000),
          from: 'friend',
          text: reply,
          kind: 'text',
          badgeId: null,
          ts: Date.now(),
          read: false,
        };
        return { ...t, messages: [...t.messages, m] };
      }));
    }, delay);
  }, [threads]);

  const [voted, setVoted] = useState({});
  const [toast, setToast] = useState(null);
  const [polls, setPolls] = useState(() => {
    // 관리자가 만든 폴 + AI 생성 폴을 시드 위에 얹고, 숨김 처리한 폴은 카드에서 제외
    try {
      const hidden = loadHiddenPolls();
      const custom = loadCustomPolls();
      const ai = loadAIPolls();
      return [...custom, ...ai, ...POLLS_SEED].filter(p => !hidden.has(p.id));
    } catch (e) { return POLLS_SEED; }
  });
  const [adminAnnouncement, setAdminAnnouncement] = useState(() => {
    try {
      const all = loadAnnouncements();
      if (!all.length) return null;
      // 가장 최신 공지 1건, 최근 7일 이내인 것만
      const latest = all.slice().sort((a, b) => b.ts - a.ts)[0];
      if (!latest || (Date.now() - latest.ts) > 7 * 86_400_000) return null;
      // 사용자가 dismiss한 공지 id는 표시하지 않음
      const dismissedRaw = localStorage.getItem('qaoh-ann-dismissed') || '[]';
      const dismissed = new Set(JSON.parse(dismissedRaw));
      if (dismissed.has(latest.id)) return null;
      return latest;
    } catch (e) { return null; }
  });
  const dismissAdminAnnouncement = () => {
    if (!adminAnnouncement) return;
    try {
      const raw = localStorage.getItem('qaoh-ann-dismissed') || '[]';
      const arr = JSON.parse(raw);
      arr.push(adminAnnouncement.id);
      localStorage.setItem('qaoh-ann-dismissed', JSON.stringify(arr));
    } catch (e) {}
    setAdminAnnouncement(null);
  };
  const [maintenanceMode, setMaintenanceMode] = useState(() => {
    try { return !!loadFlags().maintenance; } catch (e) { return false; }
  });
  const [theme, setTheme] = useState(() => {
    try { return localStorage.getItem(THEME_STORAGE_KEY) || DEFAULT_THEME; }
    catch (e) { return DEFAULT_THEME; }
  });
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [settingsPanel, setSettingsPanel] = useState('menu');
  const [locationAllowed, setLocationAllowed] = useState(() => {
    try { const raw = localStorage.getItem('qaoh-loc-allowed'); return raw == null ? true : raw === '1'; }
    catch (e) { return true; }
  });
  const NOTIF_DEFAULTS = { vote: true, hotji: true, friend: true, streak: true, marketing: false };
  const [notifPrefs, setNotifPrefs] = useState(() => {
    try {
      const raw = localStorage.getItem('qaoh-notif-prefs');
      if (!raw) return NOTIF_DEFAULTS;
      const parsed = JSON.parse(raw);
      return { ...NOTIF_DEFAULTS, ...parsed };
    } catch (e) { return NOTIF_DEFAULTS; }
  });
  const [settingsTermsTab, setSettingsTermsTab] = useState(null); // 'terms' | 'privacy' | null
  useEffect(() => { try { localStorage.setItem('qaoh-loc-allowed', locationAllowed ? '1' : '0'); } catch (e) {} }, [locationAllowed]);
  useEffect(() => { try { localStorage.setItem('qaoh-notif-prefs', JSON.stringify(notifPrefs)); } catch (e) {} }, [notifPrefs]);
  const openSettingsAt = (panel) => {
    setSettingsPanel(panel || 'menu');
    setSettingsOpen(true);
  };
  const closeSettings = () => {
    setSettingsOpen(false);
    setTimeout(() => setSettingsPanel('menu'), 320);
  };
  const handleDeleteAccount = () => {
    if (typeof window !== 'undefined' && window.confirm && !window.confirm('정말 탈퇴하시겠어요?\n익명화된 데이터를 제외한 모든 정보는 30일 안에 삭제돼요.')) return;
    closeSettings();
    const deletedHandle = account && account.handle;
    setAccount(null);
    try {
      localStorage.removeItem(ACCOUNT_KEY);
      localStorage.removeItem('qaoh-welcome-dismissed');
      if (deletedHandle) removeAccountFromRegistry(deletedHandle);
    } catch (e) {}
  };
  const [splashHiding, setSplashHiding] = useState(false);
  const [splashGone, setSplashGone] = useState(false);

  // 카오필 진입 전 가입 게이트 — localStorage('qaoh-account-v2')에 영속.
  // 한 번 가입/로그인한 사용자는 명시적 로그아웃/탈퇴 전까지 절대 다시 인증 화면을 보지 않도록
  // 검증을 'handle만 존재하면 통과'로 완화. legacy 계정·admin·필드 누락에도 세션 유지.
  const ACCOUNT_KEY = 'qaoh-account-v2';
  const [account, setAccount] = useState(() => {
    try {
      const raw = localStorage.getItem(ACCOUNT_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      if (parsed && typeof parsed === 'object' && parsed.handle) return parsed;
      return null;
    } catch (e) { return null; }
  });
  // 어떤 경로로든 account가 갱신되면 즉시 localStorage 동기화. setAccount(null)은
  // 로그아웃/탈퇴 핸들러에서 명시적으로만 호출되므로, 그 외 모든 변경은 영속됨.
  useEffect(() => {
    try {
      if (account && account.handle) {
        localStorage.setItem(ACCOUNT_KEY, JSON.stringify(account));
      }
    } catch (e) {}
  }, [account]);
  // Signup → 카오필 transition state
  // 'idle' | 'celebrating' | 'profile-fading' (signup fading out, celeb still visible) | 'leaving' (celeb fading out, profile visible)
  const [unlockPhase, setUnlockPhase] = useState('idle');
  const [profileEntering, setProfileEntering] = useState(false);
  const [authMode, setAuthMode] = useState('signup'); // 'signup' | 'login'
  const [loginError, setLoginError] = useState(null);
  // 비회원 가입 유도 모달 — 게이트된 액션(투표 등)을 시도할 때 등장.
  // intent: 'vote' | 'streak' | 'profile' 등 미래 확장용.
  const [signupNudge, setSignupNudge] = useState(null);
  const openSignupNudge = (intent = 'vote') => setSignupNudge({ intent });
  const closeSignupNudge = () => setSignupNudge(null);
  const goSignupFromNudge = () => {
    setSignupNudge(null);
    setAuthMode('signup');
    setLoginError(null);
    setTab('profile');
  };
  const goLoginFromNudge = () => {
    setSignupNudge(null);
    setAuthMode('login');
    setLoginError(null);
    setTab('profile');
  };
  const handleSignup = (data) => {
    // Persist FIRST (sync, survives any React render edge cases), then update reactive state.
    try {
      localStorage.setItem(ACCOUNT_KEY, JSON.stringify(data));
    } catch (e) {}
    // 가입된 계정을 레지스트리에 등록 — 로그아웃 후 동일 아이디/비번으로 다시 로그인 가능.
    try { upsertAccountInRegistry(data); } catch (e) {}
    // Begin orchestrated transition: signup stays visible behind the celebration overlay,
    // then fades out, then celebration fades out revealing the 카오필 page.
    setUnlockPhase('celebrating');
    // After 2.4s, start fading out the signup page (it's behind the celebration overlay)
    setTimeout(() => {
      setUnlockPhase('profile-fading');
    }, 2400);
    // After 2.95s, swap to profile tab (signup unmounts, profile mounts) and start fade-in
    setTimeout(() => {
      setAccount(data);
      setTab('profile');
      setProfileEntering(true);
      setUnlockPhase('leaving');
    }, 2950);
    // After 3.55s, celebration overlay fully gone
    setTimeout(() => {
      setUnlockPhase('idle');
    }, 3550);
    // After 4.0s, drop the profile-entering class (fade-in done)
    setTimeout(() => {
      setProfileEntering(false);
    }, 4000);
  };
  const handleLogout = () => {
    setAccount(null);
    try {
      localStorage.removeItem(ACCOUNT_KEY);
      localStorage.removeItem('qaoh-welcome-dismissed');
    } catch (e) {}
    setSettingsOpen(false);
    setAuthMode('login'); // 로그아웃 후엔 로그인 화면이 먼저 보이게
    setLoginError(null);
  };
  const handleLogin = (handleInput, password) => {
    try { console.log('[QAOH login] handleLogin invoked', { handleInput, hasPw: !!password }); } catch(_) {}
    // 입력이 둘 다 비어있으면 lookup 전에 즉시 에러 표시.
    const hIn = String(handleInput || '').trim();
    const pIn = String(password || '');
    if (!hIn) { setLoginError('아이디를 입력해 주세요'); return; }
    if (!pIn) { setLoginError('비밀번호를 입력해 주세요'); return; }
    let res;
    try {
      res = lookupAccountInRegistry(handleInput, password);
    } catch (err) {
      try { console.error('[QAOH login] lookup threw', err); } catch(_) {}
      setLoginError('로그인 중 문제가 발생했어요. 잠시 후 다시 시도해 주세요');
      return;
    }
    try { console.log('[QAOH login] lookup result', res && res.error ? { error: res.error } : { ok: true, handle: res.account && res.account.handle, admin: !!res.isAdmin }); } catch(_) {}
    if (!res || res.error) {
      let msg = '아이디 또는 비밀번호가 일치하지 않아요';
      if (res && (res.error === 'no-handle' || res.error === 'not-registered')) {
        msg = '등록되지 않은 아이디예요. 먼저 회원가입을 해 주세요';
      } else if (res && res.error === 'banned') {
        msg = '정지된 계정이에요. 관리자에게 문의해 주세요';
      } else if (res && res.error === 'wrong-password') {
        msg = '비밀번호가 일치하지 않아요';
      }
      setLoginError(msg);
      return;
    }
    setLoginError(null);
    try { localStorage.setItem(ACCOUNT_KEY, JSON.stringify(res.account)); } catch (e) {}
    // 성공 토스트(불릴 때 어디서든 보이게)
    try {
      setToast({ reward: 0, choice: res.isAdmin ? '관리자 로그인 성공' : '로그인 성공 — 카오필로 이동' });
      setTimeout(() => setToast(null), 1600);
    } catch (e) {}
    setAccount(res.account);
    // 관리자 계정은 모바일 탭을 건드리지 않고 별도 콘솔로 라우팅
    if (res.isAdmin) {
      try { appendAuditLog({ kind: 'login', actor: 'admin', detail: '관리자 로그인' }); } catch (e) {}
      setAuthMode('signup');
      return;
    }
    setTab('profile');
    setProfileEntering(true);
    setTimeout(() => setProfileEntering(false), 600);
    setAuthMode('signup'); // 다음 비-로그인 진입은 기본 가입 화면
  };

  // Streak: 16 카오픽 채울 때마다 +1. 단, 직전 bump로부터 24h 쿨다운.
  // 24h–48h 사이의 grace window 안에 다시 채우면 +1, 못 채우면 streak 초기화.
  const DAILY_QUOTA = 16;
  const STREAK_KEY = 'qaoh-streak';
  const STREAK_AT_KEY = 'qaoh-streak-at';
  const COOLDOWN_MS = 24 * 60 * 60 * 1000;
  const GRACE_END_MS = 2 * COOLDOWN_MS;
  const [streak, setStreak] = useState(() => {
    try { const n = Number(localStorage.getItem(STREAK_KEY)); return Number.isFinite(n) && n >= 0 ? n : 7; }
    catch (e) { return 7; }
  });
  const [lastStreakAt, setLastStreakAt] = useState(() => {
    try { const n = Number(localStorage.getItem(STREAK_AT_KEY)); return Number.isFinite(n) && n > 0 ? n : null; }
    catch (e) { return null; }
  });
  const [todayVotes, setTodayVotes] = useState(0);
  const [nowTs, setNowTs] = useState(() => Date.now());
  const [streakBump, setStreakBump] = useState(false);
  const streakBumpTimer = useRef(null);
  const [streakUp, setStreakUp] = useState(null); // { from, to } | null — stays until tap
  const [streakUpHiding, setStreakUpHiding] = useState(false);
  const streakUpHideTimer = useRef(null);
  const dismissStreakUp = () => {
    if (!streakUp || streakUpHiding) return;
    setStreakUpHiding(true);
    clearTimeout(streakUpHideTimer.current);
    streakUpHideTimer.current = setTimeout(() => {
      setStreakUp(null);
      setStreakUpHiding(false);
    }, 360);
  };

  // Tick every 30s so cooldown countdowns and expiration checks stay live.
  useEffect(() => {
    const t = setInterval(() => setNowTs(Date.now()), 30000);
    return () => clearInterval(t);
  }, []);

  // Streak phase: 'fresh' (no prior bump), 'cooldown' (<24h since), 'active' (24-48h), 'expired' (>=48h).
  const sinceBump = lastStreakAt != null ? (nowTs - lastStreakAt) : Infinity;
  const streakPhase = lastStreakAt == null ? 'fresh'
    : sinceBump < COOLDOWN_MS ? 'cooldown'
    : sinceBump < GRACE_END_MS ? 'active'
    : 'expired';
  const cooldownRemainingMs = streakPhase === 'cooldown' ? (COOLDOWN_MS - sinceBump) : 0;

  // Auto-expire: missed the 24-48h grace window → streak 초기화.
  useEffect(() => {
    if (streakPhase !== 'expired') return;
    setStreak(0);
    setLastStreakAt(null);
    setTodayVotes(0);
    try { localStorage.setItem(STREAK_KEY, '0'); localStorage.removeItem(STREAK_AT_KEY); } catch (e) {}
  }, [streakPhase]);

  // Cooldown ended → reset progress so the next 16 votes count toward a fresh bump.
  useEffect(() => {
    if (streakPhase === 'active' && todayVotes >= DAILY_QUOTA) {
      setTodayVotes(0);
    }
  }, [streakPhase]);

  // Owner-account boost: jjlj는 프로젝트 주인이라 항상 스트릭 100·QAPO 10,000 이상 보장.
  // 핫지 보내기/QAPO 소비로 값이 줄어도 다시 임계치 미만이면 자동 보충 (테스트용 owner 권한).
  const OWNER_HANDLE = 'jjlj';
  const OWNER_MIN_STREAK = 100;
  const OWNER_MIN_QAPO = 10000;
  useEffect(() => {
    if (!account) return;
    const h = (account.handle || '').replace(/^@/, '').toLowerCase();
    if (h !== OWNER_HANDLE) return;
    if (streak < OWNER_MIN_STREAK) {
      setStreak(OWNER_MIN_STREAK);
      try { localStorage.setItem(STREAK_KEY, String(OWNER_MIN_STREAK)); } catch (e) {}
    }
    if (qapo < OWNER_MIN_QAPO) {
      setQapo(OWNER_MIN_QAPO);
    }
  }, [account, streak, qapo]);

  useEffect(() => {
    const hideAt = setTimeout(() => setSplashHiding(true), 1750);
    const removeAt = setTimeout(() => setSplashGone(true), 1750 + 450);
    return () => { clearTimeout(hideAt); clearTimeout(removeAt); };
  }, []);

  // Apply theme tokens to :root whenever theme changes
  useEffect(() => {
    const preset = THEMES.find(t => t.id === theme) || THEMES[0];
    const root = document.documentElement;
    Object.entries(preset.vars).forEach(([k, v]) => root.style.setProperty(k, v));
    try { localStorage.setItem(THEME_STORAGE_KEY, theme); } catch (e) {}
  }, [theme]);

  const voteCount = Object.keys(voted).length + 142; // baseline + new
  const toastTimer = useRef(null);
  // Auto-dismiss toast for course-* kinds (toggleSaveCourse is in a useCallback so it can't
  // reach toastTimer directly without a stale closure).
  useEffect(() => {
    if (!toast || !toast.kind || !toast.kind.startsWith('course')) return;
    const id = setTimeout(() => setToast(null), 2200);
    return () => clearTimeout(id);
  }, [toast]);

  const handleVote = (pollId, choice) => {
    // 비회원은 투표 불가 — 가입 유도 모달로 전환.
    if (!account) { openSignupNudge('vote'); return; }
    if (voted[pollId]) return;
    const poll = polls.find(p => p.id === pollId);
    if (!poll) return;
    setVoted(v => ({ ...v, [pollId]: choice }));
    setPolls(ps => ps.map(p => p.id === pollId
      ? { ...p, va: choice === 'a' ? p.va + 1 : p.va, vb: choice === 'b' ? p.vb + 1 : p.vb, hot: p.hot + 1 }
      : p
    ));
    setQapo(q => q + poll.reward);
    setToast({ reward: poll.reward, choice: choice === 'a' ? poll.a : poll.b });
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 2200);
    // Streak: 16 카오픽 채우면 +1. 단, 직전 bump 후 24h 쿨다운 중이면 진행도만 누적되지 않음.
    if (streakPhase === 'cooldown') return; // 쿨다운 중엔 streak 진행도 변경 없음
    setTodayVotes(prev => {
      const next = prev + 1;
      if (prev < DAILY_QUOTA && next >= DAILY_QUOTA) {
        const fromN = streak;
        const toN = streak + 1;
        const ts = Date.now();
        setStreak(s => {
          const ns = s + 1;
          try { localStorage.setItem(STREAK_KEY, String(ns)); } catch (e) {}
          return ns;
        });
        setLastStreakAt(ts);
        try { localStorage.setItem(STREAK_AT_KEY, String(ts)); } catch (e) {}
        setStreakBump(true);
        clearTimeout(streakBumpTimer.current);
        streakBumpTimer.current = setTimeout(() => setStreakBump(false), 600);
        // Floating cow + number-up celebration (stays until user taps)
        setStreakUp({ from: fromN, to: toN });
        setStreakUpHiding(false);
      }
      return next;
    });
  };

  // 관리자 모드 — 전체 뷰포트를 차지하는 데스크톱 콘솔. 모바일 폰 셸을 우회.
  if (account && account.role === 'admin') {
    return <AdminConsole account={account} onLogout={handleLogout} />;
  }

  // 점검 모드 — 관리자가 아닌 일반 사용자에게는 점검 안내 화면만 표시
  if (maintenanceMode) {
    return (
      <div className="stage">
        <div className="phone maintenance-phone">
          <div className="maintenance-screen">
            <div className="maintenance-icon">🔧</div>
            <div className="maintenance-title">잠시 점검 중이에요</div>
            <div className="maintenance-body">QAOH 서비스를 더 안전하게 만들기 위해 잠시 점검 중이에요.<br/>금방 다시 돌아올게요.</div>
            <div className="maintenance-foot">— QAOH 팀 드림</div>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="stage">
      <div className="phone">
        <StatusBar />
        <TopBar qapo={qapo} tab={tab} streak={streak} streakBump={streakBump} streakPhase={streakPhase} lastStreakAt={lastStreakAt} cooldownMs={COOLDOWN_MS} onQapoClick={() => setQapoPurchaseOpen(true)} onBellClick={openNotifications} notifUnread={notifUnreadCount} />
        {adminAnnouncement ? (
          <div className={"ann-banner ann-" + adminAnnouncement.level}>
            <span className="ann-dot" aria-hidden="true">{adminAnnouncement.level === 'danger' ? '⚠️' : adminAnnouncement.level === 'warn' ? '🔔' : '📣'}</span>
            <div className="ann-body">
              <div className="ann-title">{adminAnnouncement.title}</div>
              <div className="ann-text">{adminAnnouncement.body}</div>
            </div>
            <button className="ann-close" onClick={dismissAdminAnnouncement} aria-label="공지 닫기">×</button>
          </div>
        ) : null}
        {!account && tab !== 'profile' && (
          <button className="guest-banner" type="button" onClick={goSignupFromNudge} aria-label="회원가입 하기">
            <span className="guest-banner-icon" aria-hidden="true">👀</span>
            <div className="guest-banner-body">
              <div className="guest-banner-title">둘러보는 중이에요</div>
              <div className="guest-banner-sub">가입하고 투표·QAOH POINT 시작하기</div>
            </div>
            <span className="guest-banner-arrow" aria-hidden="true">→</span>
          </button>
        )}

        {tab === 'home'    && <HomeTab    polls={polls} onVote={handleVote} voted={voted} qapo={qapo} account={account} />}
        {tab === 'map'     && <MapTab polls={polls} />}
        {tab === 'vote'    && <VoteTab    polls={polls} onVote={handleVote} voted={voted} todayVotes={todayVotes} dailyQuota={DAILY_QUOTA} streakPhase={streakPhase} cooldownRemainingMs={cooldownRemainingMs} />}
        {tab === 'friends' && <FriendsTab qapo={qapo} setQapo={setQapo} streak={streak} account={account} addNotification={addNotification} onOpenMessages={openMessages} messagesUnread={messagesUnreadCount} onOpenCourseList={openCourseList} courseCount={friendCourses.length} />}
        {tab === 'profile' && (
          account
            ? <ProfileTab qapo={qapo} voteCount={voteCount} onOpenSettings={openSettingsAt} currentTheme={theme} account={account} onLogout={handleLogout} voted={voted} onGoVote={() => setTab('vote')} entering={profileEntering} locationAllowed={locationAllowed} notifPrefs={notifPrefs} savedCourses={savedCourses} onOpenCourse={(snapshot) => {
                // Re-hydrate a saved snapshot back into a course-shaped object the viewer expects.
                const friend = FRIENDS.find(f => f.id === snapshot.authorId) || { color: snapshot.friendColor || '#E5E0D0', nick: snapshot.nick };
                setActiveCourse({
                  id: snapshot.id, authorId: snapshot.authorId, nick: snapshot.nick, friend,
                  title: snapshot.title, stops: snapshot.stops,
                  startAgoH: 0, endAgoH: 0, totalKm: snapshot.totalKm, cats: snapshot.cats,
                });
              }} onRemoveCourse={(id) => setSavedCourses(prev => prev.filter(c => c.id !== id))} />
            : (authMode === 'login'
                ? <LoginScreen
                    onLogin={handleLogin}
                    onBack={() => { setTab('home'); setAuthMode('signup'); setLoginError(null); }}
                    onSwitchToSignup={() => { setAuthMode('signup'); setLoginError(null); }}
                    errorMessage={loginError}
                    clearError={() => setLoginError(null)}
                  />
                : <SignupScreen
                    onSignup={handleSignup}
                    onBack={() => setTab('home')}
                    onSwitchToLogin={() => { setAuthMode('login'); setLoginError(null); }}
                    closing={unlockPhase === 'profile-fading' || unlockPhase === 'leaving'}
                  />
              )
        )}

        {unlockPhase !== 'idle' && (
          <UnlockCelebration leaving={unlockPhase === 'leaving'} />
        )}

        <BottomNav tab={tab} onTab={setTab} />

        <div className={"toast" + (toast ? ' show' : '') + (toast && (toast.kind === 'course-saved' || toast.kind === 'course-removed' || toast.kind === 'course-info') ? ' kao-course' : '')}>
          <span className="coin">{toast && toast.kind && toast.kind.startsWith('course') ? '🗺️' : 'Q'}</span>
          <span>{
            !toast ? '' :
            toast.kind === 'purchase' ? `+${toast.reward.toLocaleString()} QAOH POINT 충전 완료` :
            toast.kind === 'course-saved' ? `✦ "${toast.name}" 내 QAOHROAD에 저장됨` :
            toast.kind === 'course-removed' ? `✕ "${toast.name}" 저장 해제됨` :
            toast.kind === 'course-info' ? `장소 스토리를 ${COURSE_MIN_STOPS}개 올리면 내 QAOHROAD가 자동 생성돼요` :
            `+${toast.reward} QAOH POINT · ${toast.choice} 선택!`
          }</span>
        </div>

        {qapoPurchaseOpen && (
          <QapoPurchaseSheet
            balance={qapo}
            onClose={() => setQapoPurchaseOpen(false)}
            onPurchase={(n) => {
              setQapo(q => q + n);
              setQapoPurchaseOpen(false);
              setToast({ kind: 'purchase', reward: n });
              clearTimeout(toastTimer.current);
              toastTimer.current = setTimeout(() => setToast(null), 2400);
            }}
          />
        )}

        <CourseListSheet
          open={courseListOpen}
          courses={friendCourses}
          savedCourses={savedCourses}
          onClose={() => setCourseListOpen(false)}
          onOpenCourse={openCourse}
          onSelfCourse={() => {
            setCourseListOpen(false);
            setToast({ kind: 'course-info', name: '내 QAOHROAD' });
            setTimeout(() => { clearTimeout(toastTimer.current); toastTimer.current = setTimeout(() => setToast(null), 2400); }, 0);
          }}
        />

        <CourseViewerSheet
          open={!!activeCourse}
          course={activeCourse}
          isSaved={activeCourse ? isCourseSaved(activeCourse.id) : false}
          onClose={closeCourse}
          onToggleSave={toggleSaveCourse}
          onPlayReel={openReel}
          onOpenPlace={(stop) => openStopDetail(activeCourse, stop)}
        />

        <CourseReelView
          open={!!reelCourse}
          course={reelCourse}
          onClose={closeReel}
        />

        <StopDetailSheet
          open={!!stopDetail}
          course={stopDetail?.course}
          stopIndex={stopDetail?.idx ?? 0}
          onClose={closeStopDetail}
          onChangeIndex={changeStopDetailIndex}
          onPlayReel={openReel}
        />

        <NotificationsSheet
          open={notifOpen}
          notifications={notifications}
          onClose={() => setNotifOpen(false)}
          onClear={clearNotifications}
          onOpenThread={(friendId) => {
            const thr = threads.find(t => t.friendId === friendId);
            if (thr) {
              setNotifOpen(false);
              setTab('friends');
              setTimeout(() => openMessages(thr.id), 100);
            }
          }}
        />

        <MessagesSheet
          open={messagesOpen}
          threads={threads}
          activeThreadId={activeThreadId}
          onClose={closeMessages}
          onOpenThread={(id) => setActiveThreadId(id)}
          onBack={() => setActiveThreadId(null)}
          onSend={sendMessage}
          onMarkRead={markThreadRead}
          unlockedBadges={(() => {
            try {
              const arr = loadJSON('qaoh-unlocked-badges', null);
              return new Set(arr || INITIAL_RECEIVED_BADGES.map(r => r.id));
            } catch { return new Set(); }
          })()}
        />


        {signupNudge && (
          <div className="nudge-backdrop" onClick={closeSignupNudge} role="presentation">
            <div className="nudge-card" onClick={(e) => e.stopPropagation()} role="dialog" aria-modal="true" aria-labelledby="nudge-title">
              <button className="nudge-dismiss" onClick={closeSignupNudge} aria-label="닫기">×</button>
              <div className="nudge-mascot" aria-hidden="true">
                <img src="mpicgqsn-Main-Mascot-transparent.png" alt="" />
              </div>
              <div className="nudge-eyebrow">JOIN QAOH</div>
              <h2 id="nudge-title" className="nudge-title">투표는 회원만 가능해요</h2>
              <p className="nudge-body">
                가입하면 매일 투표하고 <strong>QAOH POINT</strong>를 모을 수 있어요.<br/>
                30초면 가입 끝 — 둘러보기는 자유롭게 계속할 수 있어요.
              </p>
              <div className="nudge-perks">
                <div className="nudge-perk"><span className="nudge-perk-i">Q</span>투표마다 QAOH POINT 적립</div>
                <div className="nudge-perk"><span className="nudge-perk-i">🔥</span>매일 스트릭 쌓기</div>
                <div className="nudge-perk"><span className="nudge-perk-i">👥</span>친구의 픽 확인</div>
              </div>
              <button className="nudge-cta" onClick={goSignupFromNudge}>회원가입 하고 시작하기 →</button>
              <button className="nudge-secondary" onClick={goLoginFromNudge}>이미 회원이에요 · 로그인</button>
              <button className="nudge-tertiary" onClick={closeSignupNudge}>좀 더 둘러볼게요</button>
            </div>
          </div>
        )}

        <SettingsSheet
          open={settingsOpen}
          panel={settingsPanel}
          setPanel={setSettingsPanel}
          currentTheme={theme}
          onPick={(id) => setTheme(id)}
          onClose={closeSettings}
          account={account}
          locationAllowed={locationAllowed}
          setLocationAllowed={setLocationAllowed}
          notifPrefs={notifPrefs}
          setNotifPrefs={setNotifPrefs}
          onDeleteAccount={handleDeleteAccount}
          onOpenTerms={(tab) => setSettingsTermsTab(tab)}
        />
        {settingsTermsTab && (
          <TermsSheet
            tab={settingsTermsTab}
            onTab={setSettingsTermsTab}
            onClose={() => setSettingsTermsTab(null)}
            onAgree={() => setSettingsTermsTab(null)}
            agreedTerms={true}
            agreedPrivacy={true}
          />
        )}

        {!splashGone && (
          <div className={"splash" + (splashHiding ? ' hide' : '')} aria-hidden={splashHiding}>
            <div className="splash-mascot-wrap" aria-hidden="true">
              <img src="mpicgqsn-Main-Mascot-transparent.png" alt="" className="splash-mascot" />
            </div>
            <div className="splash-name">QAOH</div>
          </div>
        )}

        {streakUp && (
          <div
            className={"streak-up" + (streakUpHiding ? ' dismissing' : '')}
            role="button"
            tabIndex={0}
            aria-label={`스트릭 ${streakUp.from}일에서 ${streakUp.to}일로 증가. 탭하여 닫기`}
            onClick={dismissStreakUp}
            onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); dismissStreakUp(); } }}
            key={`streak-up-${streakUp.to}`}
          >
            <div className="streak-up-cow" aria-hidden="true">
              <svg width="200" height="138" viewBox="0 0 220 138" xmlns="http://www.w3.org/2000/svg">
                {/* ground shadow — under everything, gives a sense of weight and depth */}
                <ellipse className="ground-shadow" cx="108" cy="132" rx="80" ry="5" fill="#1A1A1A"/>
                {/* tail (back end of cow, far left) */}
                <g className="tail">
                  <path d="M48 58 Q26 50 22 72 Q21 82 28 86" stroke="#1A1A1A" strokeWidth="3.6" fill="none" strokeLinecap="round"/>
                  <ellipse cx="26" cy="88" rx="6.5" ry="7.5" fill="#1A1A1A"/>
                </g>
                {/* hind legs (behind body) */}
                <rect className="leg lh1" x="66" y="92" width="14" height="34" rx="5" fill="#1A1A1A"/>
                <rect className="leg lh2" x="86" y="92" width="14" height="34" rx="5" fill="#FAF4E8" stroke="#1A1A1A" strokeWidth="1.8"/>
                {/* hooves on hind legs */}
                <rect x="66" y="120" width="14" height="6" rx="2" fill="#1A1A1A"/>
                <rect x="86" y="120" width="14" height="6" rx="2" fill="#1A1A1A"/>
                {/* body (cream pill) */}
                <ellipse cx="108" cy="72" rx="74" ry="34" fill="#FAF4E8" stroke="#1A1A1A" strokeWidth="1.8"/>
                {/* body top highlight — light from above, adds roundness */}
                <ellipse cx="100" cy="48" rx="46" ry="5" fill="#FFFCEF" opacity="0.7"/>
                {/* body underside shadow — bottom darkening, adds 3D depth */}
                <ellipse cx="110" cy="100" rx="56" ry="3.6" fill="#1A1A1A" opacity="0.10"/>
                {/* black patches on body */}
                <path d="M70 50 Q66 64 80 70 Q98 70 102 56 Q98 44 84 44 Q72 44 70 50 Z" fill="#1A1A1A"/>
                <path d="M132 78 Q130 92 148 92 Q166 90 168 78 Q165 64 148 66 Q132 70 132 78 Z" fill="#1A1A1A"/>
                <ellipse cx="58" cy="82" rx="9" ry="5" fill="#1A1A1A"/>
                {/* front legs (in front of body) */}
                <rect className="leg lf1" x="116" y="92" width="14" height="34" rx="5" fill="#1A1A1A"/>
                <rect className="leg lf2" x="138" y="92" width="14" height="34" rx="5" fill="#FAF4E8" stroke="#1A1A1A" strokeWidth="1.8"/>
                <rect x="116" y="120" width="14" height="6" rx="2" fill="#1A1A1A"/>
                <rect x="138" y="120" width="14" height="6" rx="2" fill="#1A1A1A"/>
                {/* neck connector — small cream curve where head joins shoulder */}
                <path d="M158 58 Q156 70 170 76 L184 76 Q198 72 196 60 Z" fill="#FAF4E8" stroke="#1A1A1A" strokeWidth="1.8"/>
                {/* HEAD — side view (default while walking) */}
                <g className="head side">
                  <ellipse cx="166" cy="22" rx="3.6" ry="4.2" fill="#E5D3A8" transform="rotate(-14 166 22)"/>
                  <ellipse cx="206" cy="22" rx="3.2" ry="3.8" fill="#E5D3A8" transform="rotate(12 206 22)"/>
                  <path d="M153 52
                           C153 30 161 24 183 24
                           C205 24 213 30 213 52
                           C213 72 205 80 183 80
                           C161 80 153 72 153 52 Z"
                        fill="#FAF4E8"/>
                  <path d="M161 28
                           C156 32 154 40 158 48
                           C156 54 159 60 168 60
                           C176 60 180 54 180 46
                           C181 38 178 30 172 27
                           C168 25 164 25 161 28 Z" fill="#1A1A1A"/>
                  <path d="M196 30
                           C190 30 187 36 188 42
                           C189 48 194 50 200 49
                           C207 48 210 43 209 37
                           C208 32 203 30 196 30 Z" fill="#1A1A1A"/>
                  <ellipse cx="172" cy="56" rx="2.6" ry="3.4" fill="#1A1A1A"/>
                  <ellipse cx="196" cy="54" rx="2.6" ry="3.4" fill="#1A1A1A"/>
                  <path d="M168 68
                           C168 62 175 60 184 60
                           C193 60 200 62 200 68
                           C200 75 193 77 184 77
                           C175 77 168 75 168 68 Z" fill="#F1C8B6"/>
                  <ellipse cx="183" cy="63" rx="8" ry="1.5" fill="#FFE4D8" opacity="0.85"/>
                  <ellipse cx="180" cy="68" rx="1.5" ry="2.1" fill="#1A1A1A"/>
                  <ellipse cx="189" cy="68" rx="1.5" ry="2.1" fill="#1A1A1A"/>
                </g>
                {/* HEAD — front view (visible during pause; cow looks directly at the user) */}
                <g className="head front">
                  {/* black ears flared out to sides */}
                  <ellipse cx="151" cy="42" rx="9.5" ry="12" fill="#1A1A1A" transform="rotate(-32 151 42)"/>
                  <ellipse cx="152" cy="44" rx="4.5" ry="7" fill="#F2A8BD" transform="rotate(-32 151 42)"/>
                  <ellipse cx="215" cy="42" rx="9.5" ry="12" fill="#1A1A1A" transform="rotate(32 215 42)"/>
                  <ellipse cx="214" cy="44" rx="4.5" ry="7" fill="#F2A8BD" transform="rotate(32 215 42)"/>
                  {/* tiny beige horns peeking up between the ears */}
                  <ellipse cx="170" cy="22" rx="3.4" ry="4.2" fill="#E5D3A8" transform="rotate(-10 170 22)"/>
                  <ellipse cx="196" cy="22" rx="3.4" ry="4.2" fill="#E5D3A8" transform="rotate(10 196 22)"/>
                  {/* face squircle — front view, slightly wider and shorter than the side */}
                  <path d="M156 50
                           C156 30 166 24 183 24
                           C200 24 210 30 210 50
                           C210 72 200 80 183 80
                           C166 80 156 72 156 50 Z"
                        fill="#FAF4E8"/>
                  {/* black patches — symmetric on top of the head */}
                  <path d="M163 28
                           C158 32 158 40 162 46
                           C168 48 176 46 178 40
                           C179 34 175 28 170 27
                           C167 26 164 26 163 28 Z" fill="#1A1A1A"/>
                  <path d="M203 28
                           C197 27 193 30 191 36
                           C190 42 196 48 202 46
                           C208 44 209 36 207 30
                           C206 28 204 28 203 28 Z" fill="#1A1A1A"/>
                  {/* small splotch over the brow */}
                  <ellipse cx="183" cy="42" rx="6" ry="3" fill="#1A1A1A" opacity="0.78"/>
                  {/* eyes — symmetric, looking straight at the user */}
                  <ellipse cx="173" cy="55" rx="3" ry="3.8" fill="#1A1A1A"/>
                  <ellipse cx="193" cy="55" rx="3" ry="3.8" fill="#1A1A1A"/>
                  {/* eye sparkles — small white dots for cuteness */}
                  <ellipse cx="174.2" cy="53.6" rx="0.8" ry="1" fill="#FFFFFF"/>
                  <ellipse cx="194.2" cy="53.6" rx="0.8" ry="1" fill="#FFFFFF"/>
                  {/* muzzle — peach peanut, centered for front view */}
                  <path d="M171 68
                           C171 62 176 60 183 60
                           C190 60 195 62 195 68
                           C195 75 190 77 183 77
                           C176 77 171 75 171 68 Z" fill="#F1C8B6"/>
                  {/* muzzle highlight */}
                  <ellipse cx="183" cy="63" rx="7" ry="1.5" fill="#FFE4D8" opacity="0.85"/>
                  {/* symmetric nostrils */}
                  <ellipse cx="179.5" cy="68" rx="1.4" ry="2" fill="#1A1A1A"/>
                  <ellipse cx="186.5" cy="68" rx="1.4" ry="2" fill="#1A1A1A"/>
                </g>
              </svg>
            </div>
            <div className="streak-up-core">
              <span className="streak-up-flame" aria-hidden="true">🔥</span>
              <div className="streak-up-num">
                <span className="digit from">{streakUp.from}</span>
                <span className="digit to">{streakUp.to}</span>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
