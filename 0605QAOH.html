  const [discoverQuery, setDiscoverQuery] = useState('');
  const [followListOpen, setFollowListOpen] = useState(false);
  const [followListTab, setFollowListTab] = useState('following');
  const [profileFriend, setProfileFriend] = useState(null);

  const [followingSet, setFollowingSet] = useState(() => {
    try {
      const raw = JSON.parse(localStorage.getItem('qaoh-following') || 'null');
      return new Set(Array.isArray(raw) ? raw : DEFAULT_FOLLOWING);
    } catch { return new Set(DEFAULT_FOLLOWING); }
  });
  const followersSet = useMemo(() => new Set(DEFAULT_FOLLOWERS), []);

  // 받은 부르심 (incoming friend requests)
  const [incomingRequests, setIncomingRequests] = useState(() => {
    try {
      const raw = JSON.parse(localStorage.getItem('qaoh-incoming-requests') || 'null');
      return Array.isArray(raw) ? raw : [...DEFAULT_INCOMING_REQUESTS];
    } catch { return [...DEFAULT_INCOMING_REQUESTS]; }
  });
  // 보낸 부르심 (sent friend requests)
  const [sentRequests, setSentRequests] = useState(() => {
    try {
      const raw = JSON.parse(localStorage.getItem('qaoh-sent-requests') || 'null');
      return new Set(Array.isArray(raw) ? raw : []);
    } catch { return new Set(); }
  });
  const [requestsOpen, setRequestsOpen] = useState(false);
  const [requestsTab, setRequestsTab] = useState('incoming');
  const [activityOpen, setActivityOpen] = useState(false);

  const persistIncoming = (next) => {
    try { localStorage.setItem('qaoh-incoming-requests', JSON.stringify(next)); } catch {}
  };
  const persistSent = (next) => {
    try { localStorage.setItem('qaoh-sent-requests', JSON.stringify([...next])); } catch {}
  };
  const acceptRequest = (id) => {
    setIncomingRequests(prev => {
      const next = prev.filter(x => x !== id);
      persistIncoming(next);
      return next;
    });
    setFollowingSet(prev => {
      const next = new Set(prev);
      next.add(id);
      try { localStorage.setItem('qaoh-following', JSON.stringify([...next])); } catch {}
      return next;
    });
    // 친구 요청 수락 → 맞팔로우 성립 → 알림
    addNotification('mutual', id, {});
  };
  const declineRequest = (id) => {
    setIncomingRequests(prev => {
      const next = prev.filter(x => x !== id);
      persistIncoming(next);
      return next;
    });
  };
  const sendRequest = (id) => {
    setSentRequests(prev => {
      const next = new Set(prev);
      next.add(id);
      persistSent(next);
      return next;
    });
  };
  const openRequestsModal = (which) => {
    setRequestsTab(which || 'incoming');
    setRequestsOpen(true);
  };

  // 팔로우 중인 친구 (핫지 보낼 대상)
  const usingWith = useMemo(() => {
    const fromFollowing = [...followingSet]
      .map(id => USERS_BY_ID.get(id))
      .filter(Boolean);
    if (fromFollowing.length >= 6) return fromFollowing.slice(0, 6);
    // 팔로우 친구가 6명 미만이면 USING_WITH_IDS로 보강
    const seen = new Set(fromFollowing.map(u => u.id));
    const filler = USING_WITH_IDS
      .filter(id => !seen.has(id))
      .map(id => USERS_BY_ID.get(id))
      .filter(Boolean);
    return [...fromFollowing, ...filler].slice(0, 6);
  }, [followingSet]);

  /* ── 핫지(HOTJI) 보내기 — 친구 카드에서 직접 ── */
  const [hotjiPickerFriend, setHotjiPickerFriend] = useState(null);
  const [hotjiToast, setHotjiToast] = useState(null);
  const [, setHotjiTick] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setHotjiTick(n => n + 1), 60_000);
    return () => clearInterval(t);
  }, []);
  const hotjiUnlocked = useMemo(() => {
    const arr = loadJSON('qaoh-unlocked-badges', null);
    if (arr) return new Set(arr);
    return new Set(INITIAL_RECEIVED_BADGES.map(r => r.id));
  }, [hotjiToast]);
  const hotjiLastSentAt = loadJSON('qaoh-last-sent-at', 0);
  const hotjiCooldownMs = Math.max(0, COOLDOWN_MS - (Date.now() - hotjiLastSentAt));
  const hotjiReady = hotjiCooldownMs <= 0;

  // 핫지 보내기 자격 — 스트릭/포인트/쿨다운/계정 4개 게이트 통합 평가
  const streakOk = streak >= HOTJI_SEND_REQUIRES_STREAK;
  const qapoOk   = qapo   >= HOTJI_SEND_COST_QAPO;
  const hotjiBlockReason = !account
    ? 'guest'
    : !hotjiReady ? 'cooldown'
    : !streakOk  ? 'streak'
    : !qapoOk    ? 'qapo'
    : null; // null = 보낼 수 있음
  const hotjiCanSend = hotjiBlockReason === null;

  const openHotjiPicker = (friend) => {
    if (!friend) return;
    if (hotjiBlockReason === 'guest') {
      // 비회원 — 별도 nudge로 안내
      setHotjiToast({ kind: 'guest-gate', friend });
      return;
    }
    if (hotjiBlockReason === 'cooldown') {
      setHotjiToast({ kind: 'cooldown-gate', friend, cooldownMs: hotjiCooldownMs });
      return;
    }
    if (hotjiBlockReason === 'streak') {
      setHotjiToast({ kind: 'streak-gate', friend, need: HOTJI_SEND_REQUIRES_STREAK, current: streak });
      return;
    }
    if (hotjiBlockReason === 'qapo') {
      setHotjiToast({ kind: 'qapo-gate', friend, need: HOTJI_SEND_COST_QAPO, current: qapo });
      return;
    }
    setHotjiPickerFriend(friend);
  };

  const sendHotjiTo = (badge) => {
    if (!hotjiPickerFriend || !badge || !hotjiCanSend) return;
    // 100 QAPO 차감 + 쿨다운 시작 + 보낸 토스트
    setQapo(q => Math.max(0, q - HOTJI_SEND_COST_QAPO));
    saveJSON('qaoh-last-sent-at', Date.now());
    setHotjiToast({ kind: 'sent', badge, friend: hotjiPickerFriend, cost: HOTJI_SEND_COST_QAPO });
    setHotjiPickerFriend(null);
    setHotjiTick(n => n + 1);
  };

  const toggleFollow = (id) => {
    setFollowingSet(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      try { localStorage.setItem('qaoh-following', JSON.stringify([...next])); } catch {}
      return next;
    });
  };

  const followingCount = followingSet.size;
  const followersCount = followersSet.size;

  const discoverNormalized = discoverQuery.trim().replace(/^@+/, '').toLowerCase();
  const selfUser = useMemo(() => {
    if (!account || !account.handle) return null;
    const handleClean = account.handle.replace(/^@+/, '');
    return {
      id: 'me',
      nick: account.nickname || handleClean,
      handle: '@' + handleClean,
      color: '#E8C5A6',
      isSelf: true,
    };
  }, [account]);
  const discoverResults = useMemo(() => {
    if (!discoverNormalized) return [];
    const pool = selfUser ? [selfUser, ...FRIENDS, ...SOCIAL_EXTRA] : [...FRIENDS, ...SOCIAL_EXTRA];
    return pool
      .filter(u =>
        u.nick.toLowerCase().includes(discoverNormalized) ||
        u.handle.toLowerCase().includes('@' + discoverNormalized) ||
        u.handle.toLowerCase().replace(/^@/, '').includes(discoverNormalized)
      )
      .sort((a, b) => {
        if (a.isSelf) return -1;
        if (b.isSelf) return 1;
        const af = followingSet.has(a.id) ? 1 : 0;
        const bf = followingSet.has(b.id) ? 1 : 0;
        if (af !== bf) return af - bf;
        return a.nick.localeCompare(b.nick, 'ko');
      })
      .slice(0, 12);
  }, [discoverNormalized, followingSet, selfUser]);

  const friendsById = useMemo(() => {
    const m = new Map(FRIENDS.map(f => [f.id, f]));
    m.set('me', { id:'me', nick:'나', color:'#E8E0D0' });
    return m;
  }, []);

  const allStories = useMemo(() => [...myStories, ...STORIES], [myStories]);

  const authorOrder = useMemo(() => {
    const byA = new Map();
    allStories.forEach(s => { if (!byA.has(s.authorId)) byA.set(s.authorId, []); byA.get(s.authorId).push(s); });
    byA.forEach(arr => arr.sort((a, b) => a.agoH - b.agoH));
    const ids = Array.from(byA.keys());
    const meFirst = ids.filter(i => i === 'me');
    const rest = ids.filter(i => i !== 'me')
      .map(id => {
        const list = byA.get(id);
        return { id, allSeen: list.every(s => seenIds.has(s.id)), agoH: list[0].agoH };
      })
      .sort((a, b) => Number(a.allSeen) - Number(b.allSeen) || a.agoH - b.agoH)
      .map(x => x.id);
    return [...meFirst, ...rest];
  }, [allStories, seenIds]);

  const openAuthor = (id) => setViewerAuthor(id);
  const closeViewer = () => setViewerAuthor(null);
  const advanceAuthor = () => {
    const cur = authorOrder.indexOf(viewerAuthor);
    if (cur >= 0 && cur + 1 < authorOrder.length) setViewerAuthor(authorOrder[cur + 1]);
    else closeViewer();
  };
  const markSeen = (id) => {
    setSeenIds(prev => {
      if (prev.has(id)) return prev;
      const next = new Set(prev); next.add(id);
      try { localStorage.setItem('qaoh-seen-stories', JSON.stringify([...next])); } catch {}
      return next;
    });
  };
  const addMyStory = (story) => {
    setMyStories(prev => {
      const next = [story, ...prev];
      try { localStorage.setItem('qaoh-my-stories', JSON.stringify(next)); } catch {}
      return next;
    });
  };

  const viewerStories = viewerAuthor
    ? allStories.filter(s => s.authorId === viewerAuthor).sort((a, b) => a.agoH - b.agoH)
    : [];
  const viewerFriend = viewerAuthor ? friendsById.get(viewerAuthor) : null;

  return (
    <>
    <div className="scroll" key="friends">
      <div className="page-head">
        <h2>프렌즈</h2>
        <p>내 친구들은 지금 뭘 골랐을까?</p>
      </div>

      <StoryRail
        stories={STORIES.concat(myStories)}
        friendsById={friendsById}
        seenIds={seenIds}
        onOpenAuthor={openAuthor}
        onAddMine={() => setCreateOpen(true)}
        myStories={myStories}
      />

      <button className="kaoroad-entry" onClick={onOpenCourseList}>
        <span className="kaoroad-entry-icon" aria-hidden="true">🗺️</span>
        <span className="kaoroad-entry-text">
          <span className="kaoroad-entry-eyebrow">QAOHROAD ✦</span>
          <span className="kaoroad-entry-title">
            친구들의 QAOHROAD
            {courseCount > 0 && <span className="kaoroad-entry-count">{courseCount}</span>}
          </span>
          <span className="kaoroad-entry-sub">스토리를 장소로 이어 본 코스를 따라가 봐요</span>
        </span>
        <span className="kaoroad-entry-chev" aria-hidden="true">›</span>
      </button>

      <div className="discover-row">
        <div className="friend-search-wrap">
          <IconSearch size={16} />
          <input
            className="friend-search-input"
            type="text"
            value={discoverQuery}
            onChange={e => setDiscoverQuery(e.target.value)}
            placeholder="QAOH에서 친구 찾기 · 닉네임 또는 @아이디"
            autoComplete="off"
            spellCheck={false}
            aria-label="QAOH 사용자 검색"
          />
          {discoverQuery && (
            <button
              className="friend-search-clear"
              onClick={() => setDiscoverQuery('')}
              aria-label="검색어 지우기"
            >
              <IconClose size={10} />
            </button>
          )}
        </div>
      </div>

      {discoverNormalized && (
        <div className="discover-results" role="region" aria-label="QAOH 사용자 검색 결과">
          <div className="meta">
            <span className="lab">QAOH 검색</span>
            <span className="count">{discoverResults.length}명</span>
          </div>
          {discoverResults.length > 0 ? (
            discoverResults.map(u => {
              if (u.isSelf) {
                return (
                  <div key={u.id} className="user-row is-self" role="listitem">
                    <div className="av" aria-hidden="true" style={{ background: u.color }} />
                    <div className="id">
                      <div className="nick">
                        {u.nick}
                        <span className="self-tag">나</span>
                      </div>
                      <div className="handle">{u.handle}</div>
                      <div className="user-rel self">내 프로필이에요</div>
                    </div>
                    <span className="follow-btn is-self" aria-label="내 프로필">내 프로필</span>
                  </div>
                );
              }
              const iFollow = followingSet.has(u.id);
              const followsMe = followersSet.has(u.id);
              const isMutual = iFollow && followsMe;
              return (
                <div key={u.id} className="user-row" role="listitem">
                  <div className="av" aria-hidden="true" />
                  <div className="id">
                    <div className="nick">
                      {u.nick}
                      {isMutual && <span className="mutual">맞팔</span>}
                    </div>
                    <div className="handle">{u.handle}</div>
                    {iFollow && !isMutual && (
                      <div className="user-rel following">✓ 팔로잉 중</div>
                    )}
                    {!iFollow && followsMe && (
                      <div className="user-rel follower">팔로우 중</div>
                    )}
                  </div>
                  <button
                    type="button"
                    className={'follow-btn ' + (iFollow ? 'is-following' : '')}
                    onClick={() => toggleFollow(u.id)}
                    aria-pressed={iFollow}
                    aria-label={iFollow ? `${u.nick} 언팔로우` : `${u.nick} 팔로우`}
                  >
                    {iFollow ? '팔로잉' : (followsMe ? '맞팔하기' : '팔로우')}
                  </button>
                </div>
              );
            })
          ) : (
            <div className="discover-empty">
              <span className="emoji">🐮</span>
              <div className="msg">"{discoverQuery}"인 사용자가 없어요</div>
              <div className="sub">닉네임이나 @아이디 일부만 입력해도 찾아져요</div>
            </div>
          )}
        </div>
      )}

      <div className="follow-card">
        <div className="follow-stats" role="group" aria-label="팔로잉 · 팔로워">
          <button
            type="button"
            className="follow-stat"
            onClick={() => { setFollowListTab('following'); setFollowListOpen(true); }}
            aria-label={`팔로잉 ${followingCount}명 보기`}
          >
            <span className="n">{followingCount}</span>
            <span className="lab">팔로잉 ›</span>
          </button>
          <span className="follow-divider" aria-hidden="true"></span>
          <button
            type="button"
            className="follow-stat"
            onClick={() => { setFollowListTab('followers'); setFollowListOpen(true); }}
            aria-label={`팔로워 ${followersCount}명 보기`}
          >
            <span className="n">{followersCount}</span>
            <span className="lab">팔로워 ›</span>
          </button>
        </div>
      </div>

      {/* 함께 사용 중인 친구 — 카드 탭하면 핫지 보내기 */}
      <div className="using-section">
        <div className="using-head">
          <div className="title">
            <span className="anchor">{USING_WITH_ANCHOR}</span>이와 함께 사용 중인 친구
          </div>
          <button
            type="button"
            className="more-btn"
            onClick={() => openRequestsModal('incoming')}
            aria-label="받은 팔로우 보기"
          >
            더보기
            {incomingRequests.length > 0 && <span className="badge">{incomingRequests.length}</span>}
            <IconChevR size={11} />
          </button>
        </div>
        {usingWith.length > 0 ? (
          <>
          <div className="using-strip" role="list" aria-label="팔로우 중인 친구 · 핫지 보내기">
            {usingWith.map(u => {
              const cls = 'hotji-pill'
                + (hotjiBlockReason === 'cooldown' ? ' is-cooling' : '')
                + (hotjiBlockReason === 'streak'   ? ' need-streak' : '')
                + (hotjiBlockReason === 'qapo'     ? ' need-qapo'   : '');
              const tip = hotjiBlockReason === 'cooldown' ? `${fmtHoursLeft(hotjiCooldownMs)}h 후`
                       : hotjiBlockReason === 'streak'    ? `스트릭 ${HOTJI_SEND_REQUIRES_STREAK}일 필요 (지금 ${streak}일)`
                       : hotjiBlockReason === 'qapo'      ? `${HOTJI_SEND_COST_QAPO} QAOH POINT 필요`
                       : `핫지 보내기 · −${HOTJI_SEND_COST_QAPO} QAOH POINT`;
              return (
                <div key={u.id} className="using-card" role="listitem" onClick={() => setProfileFriend(u)}>
                  <div className="av" aria-hidden="true" />
                  <div className="nick">{u.nick}</div>
                  <button
                    type="button"
                    className={cls}
                    onClick={e => { e.stopPropagation(); openHotjiPicker(u); }}
                    aria-label={`${u.nick}에게 ${tip}`}
                    title={tip}
                  >
                    <span className="spark" aria-hidden="true">✦</span>
                    <span className="lab">핫지</span>
                  </button>
                </div>
              );
            })}
          </div>
          <div className="hotji-gate-bar" role="note">
            <span className="hgb-em" aria-hidden="true">✦</span>
            <span className="hgb-txt">
              핫지 보내기 — <b>스트릭 {HOTJI_SEND_REQUIRES_STREAK}일</b> · <b>{HOTJI_SEND_COST_QAPO} QAOH POINT</b> 필요
            </span>
            <span className={'hgb-state ' + (streakOk ? 'ok' : 'off')}>스트릭 {streak}</span>
            <span className={'hgb-state ' + (qapoOk ? 'ok' : 'off')}>{qapo.toLocaleString()} Q</span>
          </div>
          </>
        ) : (
          <div className="using-strip" style={{justifyContent:'center', padding:'20px 0', color:'var(--muted)', fontSize:'12px'}}>
            팔로우 중인 친구가 아직 없어요 · 친구 늘리기에서 추가해 보세요
          </div>
        )}
      </div>

      {/* 친구 늘리기 — 흰 + 박스 pill, floating 부르심 모달 */}
      <button
        type="button"
        className="grow-pill"
        onClick={() => openRequestsModal('send')}
        aria-label="친구 늘리기 — 팔로우 보내기 화면 열기"
      >
        <span className="lab">친구 늘리기</span>
        <span className="add-icon" aria-hidden="true">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.6" strokeLinecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </span>
      </button>

      {/* 친구 활동 — grow-pill 스타일, 클릭하면 모달 */}
      <button
        type="button"
        className="grow-pill"
        onClick={() => setActivityOpen(true)}
        aria-label="친구 활동 보기"
      >
        <span className="lab">친구 활동</span>
        <span className="add-icon" aria-hidden="true">
          <IconChevR size={14} />
        </span>
      </button>

      {/* 메시지함 — 스토리 답장 스레드 */}
      <button
        type="button"
        className={"grow-pill msg-inbox-pill" + (messagesUnread > 0 ? ' has-unread' : '')}
        onClick={() => onOpenMessages(null)}
        aria-label={`메시지함 열기${messagesUnread > 0 ? ` · 안 읽은 ${messagesUnread}개` : ''}`}
      >
        <span className="lab">
          <span className="msg-inbox-em" aria-hidden="true">💌</span>
          메시지함
          {messagesUnread > 0 && <span className="msg-inbox-cnt">{messagesUnread}</span>}
        </span>
        <span className="add-icon" aria-hidden="true">
          <IconChevR size={14} />
        </span>
      </button>

      <div className="section-head">
        <span className="section-title">
          <span className="pick-icon delay-2" aria-hidden="true">🫶</span>
          내 친구들의 픽 · 성수
        </span>
      </div>
      <div className="friends-rank">
        {[
          { n:1, nm:'어니언 성수', count:4 },
          { n:2, nm:'빌리엔젤',   count:3 },
          { n:3, nm:'대림창고',   count:2 },
        ].map(r => (
          <div key={r.n} className="row-item">
            <span className="n">{r.n}</span>
            <span className="nm">{r.nm}</span>
            <div className="pickers">
              {FRIENDS.slice(0, r.count).map((f, i) => (
                <button
                  key={i}
                  type="button"
                  className="ch ch-btn"
                  style={{background: f.color}}
                  onClick={() => setProfileFriend(f)}
                  aria-label={`${f.nick} 프로필`}
                >{f.nick[0]}</button>
              ))}
              <span className="label">+{r.count}명</span>
            </div>
          </div>
        ))}
      </div>

    </div>

    {viewerAuthor && viewerStories.length > 0 && (
      <StoryViewer
        key={viewerAuthor}
        author={viewerAuthor}
        friend={viewerFriend}
        stories={viewerStories}
        onClose={closeViewer}
        onAdvanceAuthor={advanceAuthor}
        onSeen={markSeen}
      />
    )}

    <CreateStorySheet
      open={createOpen}
      onClose={() => setCreateOpen(false)}
      onPost={addMyStory}
    />

    <RequestsModal
      open={requestsOpen}
      onClose={() => setRequestsOpen(false)}
      defaultTab={requestsTab}
      incomingIds={incomingRequests}
      onAccept={acceptRequest}
      onDecline={declineRequest}
      followingSet={followingSet}
      followersSet={followersSet}
      onToggleFollow={toggleFollow}
      sentSet={sentRequests}
      onSendRequest={sendRequest}
    />

    <ActivityModal
      open={activityOpen}
      onClose={() => setActivityOpen(false)}
    />

    <FollowListModal
      open={followListOpen}
      defaultTab={followListTab}
      onClose={() => setFollowListOpen(false)}
      followingSet={followingSet}
      followersSet={followersSet}
      onToggleFollow={toggleFollow}
      onOpenProfile={(u) => {
        setFollowListOpen(false);
        setProfileFriend(u);
      }}
    />

    {profileFriend && (
      <FriendProfileSheet
        friend={profileFriend}
        onClose={() => setProfileFriend(null)}
        followingSet={followingSet}
        followersSet={followersSet}
        onToggleFollow={toggleFollow}
        allStories={allStories}

/* ─────────────────  BEST PICKS  ─────────────────
   관리자가 매달 직접 선정하는 "이번 달 베스트 픽" 5곳. 카오맵 하단에 노출.
   monthStart = 해당 달 1일 00:00 timestamp(ms). 다음 달 1일이 되면
   user 화면에 "지난 달 베스트 픽" 라벨이 떠서 관리자에게 갱신을 유도.
   히스토리는 최근 12개월치까지 보관. */
const BEST_PICKS_KEY = 'qaoh-admin-best-picks';
const BEST_PICKS_HISTORY_KEY = 'qaoh-admin-best-picks-history';
const getMonthStartTs = (date = new Date()) => {
  const d = new Date(date);
  d.setHours(0, 0, 0, 0);
  d.setDate(1);
  return d.getTime();
};
const formatMonthLabel = (monthStartTs) => {
  const d = new Date(monthStartTs);
  return `${d.getFullYear()}년 ${d.getMonth() + 1}월`;
};
const loadBestPicks = () => {
  const raw = loadAdminJSON(BEST_PICKS_KEY, null);
  if (!raw || !Array.isArray(raw.picks)) return { picks: [], monthStart: 0, note: '' };
  // 기존 weekStart 데이터는 monthStart로 흡수 (그 주가 속한 달의 1일로 맞춤)
  const monthStart = raw.monthStart || (raw.weekStart ? getMonthStartTs(new Date(raw.weekStart)) : 0);
  return { picks: raw.picks, monthStart, note: raw.note || '' };
};
const saveBestPicks = (state) => saveAdminJSON(BEST_PICKS_KEY, state);
const loadBestPicksHistory = () => {
  const arr = loadAdminJSON(BEST_PICKS_HISTORY_KEY, []) || [];
  return arr.map(h => ({
    ...h,
    monthStart: h.monthStart || (h.weekStart ? getMonthStartTs(new Date(h.weekStart)) : 0),
  }));
};
const saveBestPicksHistory = (arr) => saveAdminJSON(BEST_PICKS_HISTORY_KEY, arr.slice(0, 12));
const commitBestPicks = (placeIds, note) => {
  const monthStart = getMonthStartTs();
  const current = loadBestPicks();
  // 새 달로 넘어가면 직전 결과를 히스토리에 push
  if (current.monthStart && current.monthStart !== monthStart && current.picks.length) {
    const hist = loadBestPicksHistory();
    hist.unshift({ monthStart: current.monthStart, picks: current.picks, note: current.note });
    saveBestPicksHistory(hist);
  }
  saveBestPicks({ picks: placeIds, monthStart, note: note || '' });
};

/* 카테고리별로 그룹핑해서 round-robin으로 100개 추출 → 카테고리 다양성 보장. */
const groupByCategory = (arr) => {
  const m = new Map();
  for (const item of arr) {
    const k = item.cat || '기타';
    if (!m.has(k)) m.set(k, []);
    m.get(k).push(item);
  }
  return m;
};

/* 결정적 PRNG (mulberry32) — 날짜 시드로 같은 날엔 같은 결과, 다른 날엔 다른 결과. */
const mulberry32 = (seed) => {
  let t = seed >>> 0;
  return () => {
    t = (t + 0x6D2B79F5) >>> 0;
    let r = t;
    r = Math.imul(r ^ (r >>> 15), r | 1);
    r ^= r + Math.imul(r ^ (r >>> 7), r | 61);
    return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
  };
};

const shuffleWithSeed = (arr, seed) => {
  const rand = mulberry32(seed);
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};

/* generateAIPolls — 카테고리 다양성을 보장하면서 count개 폴 생성.
   각 폴에 aiGenerated:true, generatedAt, trendScore(70~99), batchId 부여. */
const generateAIPolls = (count = 100, seedOverride) => {
  const today = new Date();
  const dateSeed = seedOverride != null ? seedOverride : (today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate());
  const rand = mulberry32(dateSeed);

  // 카테고리별 셔플
  const groups = groupByCategory(TREND_POLL_LIBRARY);
  const cats = Array.from(groups.keys());
  const shuffledGroups = new Map();
  cats.forEach(c => shuffledGroups.set(c, shuffleWithSeed(groups.get(c), dateSeed ^ c.charCodeAt(0))));

  // round-robin 픽 — 카테고리를 돌면서 한 개씩 가져옴
  const picked = [];
  const cursors = new Map(cats.map(c => [c, 0]));
  let emptyCount = 0;
  while (picked.length < count && emptyCount < cats.length) {
    emptyCount = 0;
    for (const c of cats) {
      if (picked.length >= count) break;
      const list = shuffledGroups.get(c);
      const idx = cursors.get(c);
      if (idx < list.length) {
        picked.push(list[idx]);
        cursors.set(c, idx + 1);
      } else {
        emptyCount++;
      }
    }
  }

  // 라이브러리가 100개 미만이면 다시 한 바퀴 더 (변형으로 채움)
  if (picked.length < count) {
    let i = 0;
    while (picked.length < count && i < TREND_POLL_LIBRARY.length * 3) {
      const base = TREND_POLL_LIBRARY[i % TREND_POLL_LIBRARY.length];
      picked.push({ ...base });
      i++;
    }
  }

  const batchId = 'ai' + Date.now();
  const stamp = Date.now();
  return picked.slice(0, count).map((tpl, i) => ({
    id: batchId + '_' + i,
    aiGenerated: true,
    generatedAt: stamp,
    batchId,
    trendScore: Math.floor(70 + rand() * 30), // 70~99
    cat: tpl.cat,
    loc: tpl.loc || '전국',
    title: tpl.title,
    a: tpl.a, b: tpl.b,
    ea: tpl.ea || '🅰️', eb: tpl.eb || '🅱️',
    va: 0, vb: 0, hot: 0,
    reward: 30,
  }));
};

/* 가입된 계정 레지스트리 — 핸들로 키. password와 account를 함께 보관해서
   로그아웃 후 동일 아이디/비번으로 로그인하면 프로필을 그대로 복원. */
const ACCOUNTS_REGISTRY_KEY = 'qaoh-accounts-registry-v1';
const loadAccountsRegistry = () => {
  try {
    const raw = localStorage.getItem(ACCOUNTS_REGISTRY_KEY);
    if (!raw) return {};
    const parsed = JSON.parse(raw);
    return (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) ? parsed : {};
  } catch (e) { return {}; }
};
const saveAccountsRegistry = (reg) => {
  try { localStorage.setItem(ACCOUNTS_REGISTRY_KEY, JSON.stringify(reg)); } catch (e) {}
};
const upsertAccountInRegistry = (data) => {
  const h = cleanHandle(data && data.handle);
  if (!h) return;
  const reg = loadAccountsRegistry();
  reg[h] = { account: data, password: data.password || '', savedAt: Date.now() };
  saveAccountsRegistry(reg);
};
const removeAccountFromRegistry = (h) => {
  const key = cleanHandle(h);
  if (!key) return;
  const reg = loadAccountsRegistry();
  if (key in reg) { delete reg[key]; saveAccountsRegistry(reg); }
};
const lookupAccountInRegistry = (handleInput, password) => {
  const h = cleanHandle(handleInput);
  if (!h) return { error: 'no-handle' };
  // 관리자 자격증명을 최우선 매칭. 매칭되면 admin 계정 객체를 즉시 반환.
  if (isAdminCredentials(handleInput, password)) {
    return { account: buildAdminAccount(), isAdmin: true };
  }
  // 프로젝트 주인(owner) 자격증명 — admin 다음으로 매칭. 회원가입 없이도 항상 로그인 가능.
  if (isOwnerCredentials(handleInput, password)) {
    // owner 계정도 레지스트리에 백필해서 가입 흐름과 동일하게 보이도록 함.
    const reg = loadAccountsRegistry();
    let rec = reg[OWNER_LOGIN_HANDLE];
    if (!rec) {
      rec = { account: buildOwnerAccount(), password: OWNER_LOGIN_PASSWORD, savedAt: Date.now() };
      reg[OWNER_LOGIN_HANDLE] = rec;
      saveAccountsRegistry(reg);
    }
    return { account: rec.account };
  }
  // 일반 계정: 정지된 핸들은 차단
  if (isHandleBanned(h)) return { error: 'banned' };
  const reg = loadAccountsRegistry();
  let rec = reg[h];
  // Migration fallback: 이전 세션에서 가입된 계정이 레지스트리에는 없지만 ACCOUNT_KEY에
  // 남아있으면 그것으로 매칭. 성공하면 레지스트리에 백필해서 다음부터는 정상 경로 사용.
  // 단, admin 핸들은 절대 마이그레이션 경로로 매칭되지 않음 — 반드시 isAdminCredentials를 거쳐야 함.
  if (!rec && h !== ADMIN_HANDLE) {
    try {
      const raw = localStorage.getItem('qaoh-account-v2');
      if (raw) {
        const acct = JSON.parse(raw);
        const acctHandle = cleanHandle(acct && acct.handle);
        if (acctHandle === h && acct && acct.role !== 'admin') {
          // 가입할 때 password가 저장돼 있으면 비교, 아니면(legacy 가입자) 어떤 비번이든 허용.
          const pw = (typeof acct.password === 'string' && acct.password) ? acct.password : password;
          rec = { account: acct, password: pw, savedAt: Date.now() };
          reg[h] = rec;
          saveAccountsRegistry(reg);
        }
      }
    } catch (e) {}
  }
  // 회원가입 기록이 없으면 차단 — 정식 가입을 거친 계정만 로그인 가능.
  if (!rec) return { error: 'not-registered' };
  // 핸들은 있지만 비밀번호가 다르면 차단.
  // legacy 가입자(레지스트리에 password가 비어 있는 케이스)는 첫 로그인 시 입력값으로 동기화.
  if (rec.password && rec.password !== password) {
    return { error: 'wrong-password' };
  }
  if (!rec.password) {
    rec = { ...rec, password: password };
    reg[h] = rec;
    saveAccountsRegistry(reg);
  }
  return { account: rec.account };
};

  '경남': ['창원시', '진주시', '통영시', '사천시', '김해시', '밀양시', '거제시', '양산시', '의령군', '함안군', '창녕군', '고성군', '남해군', '하동군', '산청군', '함양군', '거창군', '합천군'],
  '제주': ['제주시', '서귀포시'],
};
const REGION_CITIES = Object.keys(REGIONS);
const SignupScreen = ({ onSignup, onBack, onSwitchToLogin, closing }) => {
  const [email, setEmail] = useState('');
  const [nickname, setNickname] = useState('');
  const [handle, setHandle] = useState('');
  const [password, setPassword] = useState('');
  const [passwordVisible, setPasswordVisible] = useState(false);
  const [age, setAge] = useState('');
  const [gender, setGender] = useState('');
  const [city, setCity] = useState('');
  const [district, setDistrict] = useState('');
  const [mbti, setMbti] = useState(['', '', '', '']);
  const [income, setIncome] = useState('');
  const [handleFocused, setHandleFocused] = useState(false);
  const [termsOpen, setTermsOpen] = useState(false);
  const [termsTab, setTermsTab] = useState('terms');
  const [agreedTerms, setAgreedTerms] = useState(false);
  const [agreedPrivacy, setAgreedPrivacy] = useState(false);

  const trimmedEmail = email.trim().toLowerCase();
  const emailValid = EMAIL_RE.test(trimmedEmail);
  const emailAtIdx = trimmedEmail.indexOf('@');
  const emailHasDomain = emailAtIdx > 0 && emailAtIdx < trimmedEmail.length - 1;
  const emailDomain = emailHasDomain ? trimmedEmail.slice(emailAtIdx + 1) : '';
  const emailLocalOk = emailAtIdx > 0 && EMAIL_LOCAL_RE.test(trimmedEmail.slice(0, emailAtIdx));
  const emailDomainUnsupported = emailLocalOk && emailHasDomain && !ALLOWED_EMAIL_DOMAINS.includes(emailDomain);
  const emailErr = email.length > 0 && !emailValid;
  const trimmedNick = nickname.trim();
  const handleClean = handle.trim().toLowerCase().replace(/^@/, '');
  const nickValid = trimmedNick.length >= 2 && trimmedNick.length <= 12;
  const handleValid = HANDLE_RE.test(handleClean);
  const handleDup = handleValid && (TAKEN_HANDLES.has(handleClean) || !!loadAccountsRegistry()[handleClean]);
  const handleOk = handleValid && !handleDup;
  const passwordValid = PASSWORD_RE.test(password);
  const ageNum = parseInt(age, 10);
  const ageValid = Number.isFinite(ageNum) && ageNum >= 14 && ageNum <= 80;
  const genderValid = GENDER_OPTIONS.includes(gender);
  const cityValid = REGION_CITIES.includes(city);
  const districtValid = cityValid && REGIONS[city].includes(district);
  const mbtiValid = mbti.every(c => c !== '');
  const mbtiStr = mbtiValid ? mbti.join('') : '';
  const incomeValid = INCOME_OPTIONS.includes(income);
  const handleErr = handle.length > 0 && (!handleValid || handleDup);
  const nickErr = nickname.length > 0 && !nickValid;
  const passwordErr = password.length > 0 && !passwordValid;
  const ageErr = age.length > 0 && !ageValid;
  const canSubmit = emailValid && nickValid && handleOk && passwordValid && ageValid && genderValid && cityValid && districtValid && mbtiValid && incomeValid && agreedTerms && agreedPrivacy;

  const setMbtiAxis = (axisIdx, value) => {
    setMbti(prev => prev.map((c, i) => (i === axisIdx ? value : c)));
  };

  const onCityChange = (next) => {
    setCity(next);
    setDistrict('');
  };

  const districtList = cityValid ? REGIONS[city] : [];

  const submit = (e) => {
    if (e && e.preventDefault) e.preventDefault();
    if (!canSubmit) return;
    onSignup({
      email: trimmedEmail,
      nickname: trimmedNick,
      handle: '@' + handleClean,
      password,
      age: ageNum,
      gender,
      region: { city, district },
      mbti: mbtiStr,
      income,
      joinedAt: Date.now(),
    });
  };

  const openTerms = (which) => (e) => {
    if (e && e.preventDefault) e.preventDefault();
    setTermsTab(which);
    setTermsOpen(true);
  };

  return (
    <form className={"signup-screen" + (closing ? ' is-closing' : '')} key="signup" onSubmit={submit} noValidate>
      {(onBack || onSwitchToLogin) ? (
        <div className="signup-back-row">
          {onBack ? (
            <button
              type="button"
              className="signup-back"
              onClick={onBack}
              aria-label="카홈으로 돌아가기"
            >
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
                <path d="M15 18l-6-6 6-6"/>
              </svg>
              카홈으로
            </button>
          ) : <span />}
          {onSwitchToLogin ? (
            <button
              type="button"
              className="signup-switch"
              onClick={onSwitchToLogin}
              aria-label="이미 계정이 있다면 로그인"
            >
              <span className="signup-switch-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                  <polyline points="10 17 15 12 10 7"/>
                  <line x1="15" y1="12" x2="3" y2="12"/>
                </svg>
              </span>
              <span>로그인</span>
            </button>
          ) : null}
        </div>
      ) : null}
      <div className="signup-hero">
        <div className="signup-mark" aria-hidden="true">
          <img src="mpni3byd-Main-Mascot-transparent.png" alt="" />
        </div>
        <div className="signup-greet">QAOH에 어서 오세요 <em>🐮</em></div>
        <div className="signup-sub">내 픽을 시작하려면 1분만 알려주세요</div>
      </div>

      <div className="signup-form">
        <div className="signup-field">
          <label className="signup-label" htmlFor="signup-email">
            이메일 <span className="req">*</span>
            <span className="vis private">비공개</span>
          </label>
          <div className="signup-input-wrap">
            <input
              id="signup-email"
              className="signup-input"
              type="email"
              inputMode="email"
              placeholder="예: hello@gmail.com"
              value={email}
              maxLength={64}
              autoComplete="email"
              autoCorrect="off"
              autoCapitalize="off"
              spellCheck={false}
              onChange={(e) => setEmail(e.target.value)}
            />
          </div>
          <div className={"signup-hint" + (emailErr ? ' err' : '')}>
            {emailErr
              ? (emailDomainUnsupported
                ? 'Gmail · Daum · Naver 메일만 사용할 수 있어요 (@gmail.com / @daum.com / @naver.com)'
                : '이메일 형식이 올바르지 않아요')
              : 'Gmail · Daum · Naver 메일만 사용 가능 · 친구에게 공개되지 않아요'}
          </div>
        </div>

        <div className="signup-field">
          <label className="signup-label" htmlFor="signup-nick">
            닉네임 <span className="req">*</span>
            <span className="vis public">친구 공개</span>
          </label>
          <div className="signup-input-wrap">
            <input
              id="signup-nick"
              className="signup-input"
              type="text"
              placeholder="예: 짜장면짱"
              value={nickname}
              maxLength={12}
              autoComplete="off"
              autoCorrect="off"
              spellCheck={false}
              onChange={(e) => setNickname(e.target.value)}
            />
          </div>
          <div className={"signup-hint" + (nickErr ? ' err' : '')}>
            {nickErr ? '2–12자로 입력해 주세요' : '2–12자, 한글/영문/숫자 가능'}
          </div>
        </div>

        <div className="signup-field">
          <label className="signup-label" htmlFor="signup-handle">
            아이디 <span className="req">*</span>
            <span className="vis public">친구 공개</span>
          </label>
          <div className={"signup-input-wrap has-prefix" + (handleFocused ? ' focused' : '')}>
            <span className="prefix">@</span>
            <input
              id="signup-handle"
              className="signup-input"
              type="text"
              placeholder="qaoh_id"
              value={handle}
              maxLength={15}
              autoComplete="off"
              autoCorrect="off"
              autoCapitalize="off"
              spellCheck={false}
              onFocus={() => setHandleFocused(true)}
              onBlur={() => setHandleFocused(false)}
              onChange={(e) => setHandle(e.target.value)}
            />
          </div>
          <div className={"signup-hint" + (handleErr ? ' err' : '')}>
            {handleDup
              ? '이미 사용 중인 아이디예요. 다른 아이디로 시도해 주세요'
              : handleErr
                ? '영문 소문자·숫자·_만, 2–15자'
                : handleValid
                  ? '✓ 사용할 수 있는 아이디예요'
                  : '영문 소문자·숫자·_, 친구가 검색할 수 있어요'}
          </div>
        </div>

        <div className="signup-field">
          <label className="signup-label" htmlFor="signup-password">
            비밀번호 <span className="req">*</span>
            <span className="vis private">비공개</span>
          </label>
          <div className="signup-input-wrap signup-pw-wrap">
            <input
              id="signup-password"
              className="signup-input signup-pw-input"
              type={passwordVisible ? 'text' : 'password'}
              placeholder="영문 + 숫자 8자 이상"
              value={password}
              maxLength={32}
              autoComplete="new-password"
              autoCorrect="off"
              autoCapitalize="off"
              spellCheck={false}
              onChange={(e) => setPassword(e.target.value)}
            />
            <button
              type="button"
              className="signup-pw-eye"
              onClick={() => setPasswordVisible(v => !v)}
              aria-label={passwordVisible ? '비밀번호 숨기기' : '비밀번호 보기'}
              aria-pressed={passwordVisible}
            >
              {passwordVisible ? '🙈' : '👁'}
            </button>
          </div>
          <div className={"signup-hint" + (passwordErr ? ' err' : '')}>
            {passwordErr
              ? '영문과 숫자를 모두 포함해 8자 이상으로 만들어 주세요'
              : passwordValid
                ? '✓ 안전한 비밀번호예요'
                : '영문 + 숫자 조합으로 8자 이상, 특수문자(!@#$…)도 가능'}
          </div>
        </div>

        <div className="signup-field">
          <label className="signup-label" htmlFor="signup-age">
            나이 <span className="req">*</span>
            <span className="vis public">또래 공개</span>
          </label>
          <div className="signup-input-wrap">
            <input
              id="signup-age"
              className="signup-input"
              type="text"
              inputMode="numeric"
              pattern="[0-9]*"
              placeholder="예: 24"
              value={age}
              maxLength={2}
              autoComplete="off"
              onChange={(e) => setAge(e.target.value.replace(/[^0-9]/g, ''))}
            />
          </div>
          <div className={"signup-hint" + (ageErr ? ' err' : '')}>
            {ageErr ? '14–80 사이로 입력해 주세요' : '또래 친구들에게만 공개돼요'}
          </div>
        </div>

        <div className="signup-field">
          <label className="signup-label">
            성별 <span className="req">*</span>
            <span className="vis public">친구 공개</span>
          </label>
          <div className="signup-gender" role="radiogroup" aria-label="성별">
            {GENDER_OPTIONS.map(g => (
              <button
                key={g}
                type="button"
                role="radio"
                aria-checked={gender === g}
                className={"signup-gender-opt" + (gender === g ? ' active' : '')}
                onClick={() => setGender(g)}
              >
                <span className="icon" aria-hidden="true">{g === '여성' ? '👧' : '👦'}</span>
                <span>{g}</span>
              </button>
            ))}
          </div>
        </div>

        <div className="signup-field">
          <label className="signup-label">
            거주 지역 <span className="req">*</span>
            <span className="vis public">친구 공개</span>
          </label>
          <div className="signup-region">
            <select
              className={"signup-region-select" + (city ? '' : ' placeholder')}
              value={city}
              onChange={(e) => onCityChange(e.target.value)}
              aria-label="시·도 선택"
            >
              <option value="" disabled>시·도</option>
              {REGION_CITIES.map(c => (
                <option key={c} value={c}>{c}</option>
              ))}
            </select>
            <select
              className={"signup-region-select" + (district ? '' : ' placeholder')}
              value={district}
              onChange={(e) => setDistrict(e.target.value)}
              disabled={!cityValid}
              aria-label="구·시·군 선택"
            >
              <option value="" disabled>{cityValid ? '구·시·군' : '먼저 시·도를 골라요'}</option>
              {districtList.map(d => (
                <option key={d} value={d}>{d}</option>
              ))}
            </select>
          </div>
          <div className="signup-hint">전국 어디서나 가입할 수 있어요 · 시 → 구·시·군 단위</div>
        </div>

        <div className="signup-field">
          <label className="signup-label">
            MBTI <span className="req">*</span>
            <span className="vis public">친구 공개</span>
          </label>
          <div className="signup-mbti" role="group" aria-label="MBTI 선택">
            {MBTI_AXES.map((pair, axisIdx) => (
              <div key={axisIdx} className="signup-mbti-group" role="radiogroup">
                {pair.map(letter => (
                  <button
                    key={letter}
                    type="button"
                    role="radio"
                    aria-checked={mbti[axisIdx] === letter}
                    className={"signup-mbti-opt" + (mbti[axisIdx] === letter ? ' active' : '')}
                    onClick={() => setMbtiAxis(axisIdx, letter)}
                  >
                    {letter}
                  </button>
                ))}
              </div>
            ))}
            {mbtiValid && <span className="signup-mbti-result">{mbtiStr}</span>}
          </div>
          <span className="signup-mbti-note">🫶 친구들은 내 MBTI를 볼 수 있어요</span>
        </div>

        <div className="signup-field">
          <label className="signup-label">
            소득 구간 <span className="req">*</span>
            <span className="vis private">비공개</span>
          </label>
          <div className="signup-income-note">
            <span className="lock" aria-hidden="true">🔒</span>
            <span>
              이 질문은 <b>조사를 위해서</b> 물어보는 거예요. 최대한 솔직하게 답해 주시면 좋아요.
              {' '}<b>개인 정보는 식별되지 않고, 어떤 친구에게도 공개되지 않아요.</b>
            </span>
          </div>
          <div className="signup-income" role="radiogroup" aria-label="월급 구간">
            {INCOME_OPTIONS.map(opt => (
              <button
                key={opt}
                type="button"
                role="radio"
                aria-checked={income === opt}
                className={"signup-income-opt" + (income === opt ? ' active' : '')}
                onClick={() => setIncome(opt)}
              >
                {opt}
              </button>
            ))}
          </div>
        </div>

        <div className="signup-field">
          <label className="signup-label">
            이용약관 · 개인정보 처리방침 <span className="req">*</span>
            <span className="vis private">필수 동의</span>
          </label>
          <div className="signup-agree-hint">
            🔒 가입을 시작하려면 두 약관을 모두 읽고 체크해 주세요. <b>회원님의 정보는 조사·마케팅·리서치·익명화된 데이터 판매</b> 목적으로 활용될 수 있어요.
          </div>
          <div className="signup-agree-card">
            <button
              type="button"
              className="signup-agree-row"
              onClick={() => setAgreedTerms(v => !v)}
              aria-pressed={agreedTerms}
              aria-label="이용약관 동의 토글"
            >
              <span className={'signup-agree-check' + (agreedTerms ? ' checked' : '')} aria-hidden="true">✓</span>
              <span className="signup-agree-text">
                <span className="signup-agree-label">이용약관에 동의합니다</span>
                <span className="signup-agree-sub">QAOH 서비스 이용 규칙 · 콘텐츠 권리 · 회원 책임</span>
              </span>
              <span
                className="signup-agree-link"
                role="button"
                tabIndex={0}
                onClick={(e) => { e.stopPropagation(); setTermsTab('terms'); setTermsOpen(true); }}
                onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); e.stopPropagation(); setTermsTab('terms'); setTermsOpen(true); } }}
              >
                자세히 보기
              </span>
            </button>
            <div className="signup-agree-divider" aria-hidden="true" />
            <button
              type="button"
              className="signup-agree-row"
              onClick={() => setAgreedPrivacy(v => !v)}
              aria-pressed={agreedPrivacy}
              aria-label="개인정보 처리방침 동의 토글"
            >
              <span className={'signup-agree-check' + (agreedPrivacy ? ' checked' : '')} aria-hidden="true">✓</span>
              <span className="signup-agree-text">
                <span className="signup-agree-label">개인정보 처리방침에 동의합니다</span>
                <span className="signup-agree-sub">조사·통계·마케팅·리서치·익명화된 외부 제공 포함</span>
              </span>
              <span
                className="signup-agree-link"
                role="button"
                tabIndex={0}
                onClick={(e) => { e.stopPropagation(); setTermsTab('privacy'); setTermsOpen(true); }}
                onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); e.stopPropagation(); setTermsTab('privacy'); setTermsOpen(true); } }}
              >
                자세히 보기
              </span>
            </button>
          </div>
        </div>

        {!canSubmit && (
          <div className="signup-missing" role="status" aria-live="polite">
            <span className="signup-missing-dot" aria-hidden="true">!</span>
            <span>
              {!emailValid ? (emailDomainUnsupported ? 'Gmail · Daum · Naver 메일만 사용할 수 있어요' : '이메일을 정확히 입력해 주세요')
                : !nickValid ? '닉네임을 2–12자로 입력해 주세요'
                : !handleValid ? '아이디를 정확히 입력해 주세요'
                : handleDup ? '이미 사용 중인 아이디예요. 다른 아이디로 시도해 주세요'
                : !passwordValid ? '비밀번호를 영문+숫자 8자 이상으로 만들어 주세요'
                : !ageValid ? '나이를 14–80 사이로 입력해 주세요'
                : !genderValid ? '성별을 선택해 주세요'
                : !cityValid ? '거주 지역(시·도)을 선택해 주세요'
                : !districtValid ? '거주 지역(구·시·군)을 선택해 주세요'
                : !mbtiValid ? 'MBTI 4글자를 모두 선택해 주세요'
                : !incomeValid ? '소득 구간을 선택해 주세요'
                : !agreedTerms ? '이용약관에 동의해 주세요'
                : !agreedPrivacy ? '개인정보 처리방침에 동의해 주세요'
                : '입력 정보를 확인해 주세요'}
            </span>
          </div>
        )}
        <button
          type="submit"
          className="signup-cta"
          disabled={!canSubmit}
          onClick={(e) => {
            e.preventDefault();
            if (!canSubmit) return;
            onSignup({
              email: trimmedEmail,
              nickname: trimmedNick,
              handle: '@' + handleClean,
              password,
              age: ageNum,
              gender,
              region: { city, district },
              mbti: mbtiStr,
              income,
              joinedAt: Date.now(),
            });
          }}
        >
          <span>{canSubmit ? '가입하고 시작하기' : '아직 입력 중'}</span>
          <span className="spark" aria-hidden="true">✨</span>
        </button>
      </div>
      {termsOpen ? (
        <TermsSheet

const LoginScreen = ({ onLogin, onBack, onSwitchToSignup, errorMessage, clearError }) => {
  const [handle, setHandle] = useState('');
  const [password, setPassword] = useState('');
  const [passwordVisible, setPasswordVisible] = useState(false);
  const [handleFocused, setHandleFocused] = useState(false);
  const [submitted, setSubmitted] = useState(false);

  const handleClean = cleanHandle(handle);
  const handleSyntaxOk = HANDLE_RE.test(handleClean);
  const handlePresent = handleClean.length > 0;
  const passwordPresent = password.length > 0;

  const onChangeHandle = (e) => {
    setHandle(e.target.value);
    if (errorMessage && clearError) clearError();
  };
  const onChangePassword = (e) => {
    setPassword(e.target.value);
    if (errorMessage && clearError) clearError();
  };

  const submit = (e) => {
    if (e && e.preventDefault) e.preventDefault();
    if (e && e.stopPropagation) e.stopPropagation();
    setSubmitted(true);
    try { console.log('[QAOH login] submit', { handleClean, hasPw: passwordPresent }); } catch(_) {}
    // 무조건 onLogin을 호출 — 부모가 결과(성공/오류)를 화면에 띄움.

    onLogin(handleClean, password);

    const k = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', k);
    return () => window.removeEventListener('keydown', k);
  }, [onClose]);
  return (
    <div className="picker-back" onClick={onClose}>
      <div className="picker-sheet" onClick={e => e.stopPropagation()} role="dialog" aria-modal="true">
        <div className="picker-grip" />
        <div className="picker-head">
          <div className="em" style={{color: badge.color, filter: `drop-shadow(0 0 12px ${badge.color}66)`}}>{badge.em}</div>
          <div>
            <div className="ttl">{badge.nm} 보내기</div>
            <div className="des">{badge.desc}</div>
          </div>
        </div>
        <div className="picker-list">
          {friends.map(f => (
            <div key={f.id} className="picker-row">
              <div className="av" />
              <div className="meta">
                <div className="nk">{f.nick}</div>
                <div className="hd">{f.handle}</div>
              </div>
              <button className="send" onClick={() => onPick(f)}>보내기</button>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

const ReceivedBadgesModal = ({ received, friends, filterId, onClose }) => {
  useEffect(() => {
    const k = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', k);
    return () => window.removeEventListener('keydown', k);
  }, [onClose]);
  const fById = friends.reduce((m, f) => { m[f.id] = f; return m; }, {});
  const filtered = filterId ? received.filter(r => r.id === filterId) : received;
  const grouped = BADGES
    .map(b => ({ b, rows: filtered.filter(r => r.id === b.id).sort((a, x) => x.t - a.t) }))
    .filter(g => g.rows.length > 0);
  const headBadge = filterId ? BADGE_BY_ID[filterId] : null;
  return (
    <div className="recv-back" onClick={onClose}>
      <div className="recv-modal" onClick={e => e.stopPropagation()} role="dialog" aria-modal="true">
        <div className="recv-head">
          <div className="ttl">
            {headBadge
              ? <><span style={{color: headBadge.color, fontSize: 18, filter: `drop-shadow(0 0 6px ${headBadge.color}55)`}}>{headBadge.em}</span> {headBadge.nm}</>
              : <>친구가 보낸 핫지 <span style={{color: 'var(--accent)'}}>✦</span></>}
          </div>
          <button className="icon-btn" onClick={onClose} aria-label="닫기"><IconClose size={14} /></button>
        </div>
        {grouped.length === 0 ? (
          <div style={{textAlign: 'center', padding: '20px 0', color: 'var(--muted)', fontSize: 12.5}}>아직 받은 핫지가 없어요</div>
        ) : grouped.map(g => (
          <div key={g.b.id} className="recv-group">
            {!filterId && (
              <div className="gh">
                <span className="em" style={{color: g.b.color, filter: `drop-shadow(0 0 6px ${g.b.color}55)`}}>{g.b.em}</span>
                <span className="nm">{g.b.nm}</span>
              </div>
            )}
            {g.rows.map((r, i) => {
              const fr = fById[r.from] || { nick: '친구', handle: '@friend' };
              return (
                <div key={i} className="recv-row">
                  <div className="av" />
                  <div className="nk">{fr.nick}</div>
                  <div className="hd">{fr.handle}</div>
                  <div className="ago">{fmtRelTime(r.t)}</div>
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
};

const MysteryCoach = ({ onClose }) => {
  useEffect(() => {
    const k = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', k);
    return () => window.removeEventListener('keydown', k);
  }, [onClose]);
  return (
    <div className="mystery-back" onClick={onClose}>
      <div className="mystery-card" onClick={e => e.stopPropagation()}>
        <div className="big-lock">🔒</div>
        <div className="ttl">미스테리 핫지</div>
        <div className="des">친구한테서 이 핫지를 받으면 잠금이 풀려요 <span className="spark">✦</span><br/>풀리면 너도 친구에게 보낼 수 있어요</div>
        <button className="ok" onClick={onClose}>알겠어요</button>
      </div>
    </div>

const BadgeToast = ({ kind, badge, friend, onClose, need, current, cost, cooldownMs }) => {
  useEffect(() => {
    const dur = kind === 'received' ? 4000
              : kind === 'sent'     ? 3500
              : 3200; // gate-* toasts
    const t = setTimeout(onClose, dur);
    return () => clearTimeout(t);
  }, [onClose, kind]);

  // 게이트 토스트 — 핫지를 보낼 수 없는 이유를 친절하게 안내
  if (kind === 'streak-gate' || kind === 'qapo-gate' || kind === 'cooldown-gate' || kind === 'guest-gate') {
    const isStreak   = kind === 'streak-gate';
    const isQapo     = kind === 'qapo-gate';
    const isCooldown = kind === 'cooldown-gate';
    const em  = isStreak ? '🔥' : isQapo ? 'Q' : isCooldown ? '⏳' : '🐮';
    const lab = isStreak ? '스트릭이 부족해요'
             : isQapo   ? 'QAOH POINT가 부족해요'
             : isCooldown ? '잠깐만요'
             : '회원만 보낼 수 있어요';
    const msg = isStreak ? `${HOTJI_SEND_REQUIRES_STREAK}일 이상 스트릭이 필요해요 · 지금 ${current ?? 0}일 · 카홈에서 매일 16표`
             : isQapo   ? `1회당 ${HOTJI_SEND_COST_QAPO} QAOH POINT가 필요해요 · 지금 ${(current ?? 0).toLocaleString()} Q · 투표하고 모아요`
             : isCooldown ? `다음 핫지까지 약 ${fmtHoursLeft(cooldownMs || 0)}시간 남았어요`
             : `${friend?.nick || '친구'}에게 핫지를 보내려면 회원가입이 필요해요`;
    return (
      <div className="hotji-toast hotji-toast-gate" role="status">
        <div className="em">{em}</div>
        <div className="txt">
          <div className="lab">{lab}</div>
          <div className="msg">{msg}</div>
        </div>
        <button className="close" onClick={onClose} aria-label="닫기">×</button>
      </div>
    );
  }

  if (!badge) return null;
  const isSent = kind === 'sent';
  return (
    <div className={`hotji-toast ${isSent ? 'sent' : ''}`} role="status">
      <div className="em" style={{filter: `drop-shadow(0 0 8px ${badge.color}66)`}}>{badge.em}</div>
      <div className="txt">
        <div className="lab">{kind === 'received' ? '핫지 받았어요!' : '핫지 보냈어요!'}</div>
        <div className="msg">
          {friend?.nick}{kind === 'received' ? '이 ' + badge.nm + '을 보냈어요' : '에게 ' + badge.nm + ' 보냄 ✨'}
          {isSent && typeof cost === 'number' && <span className="cost"> · −{cost} QAOH POINT</span>}
        </div>
      </div>
      <button className="close" onClick={onClose} aria-label="닫기">×</button>
    </div>
  );
};

const HotjiCellLocked = () => {
  const [shake, setShake] = useState(false);
  const [coach, setCoach] = useState(false);
  const onTap = () => {
    setShake(true);
    setTimeout(() => setShake(false), 500);
    setTimeout(() => setCoach(true), 240);
  };
  return (
    <>
      <button
        className={'hotji-cell locked' + (shake ? ' shake' : '')}
        onClick={onTap}
        aria-label="잠긴 핫지 — 친구에게서 받으면 풀려요"
      >
        <span className="twinkle a"></span>
        <span className="twinkle b"></span>
        <span className="twinkle c"></span>
        <span className="lock-icon">🔒</span>
        <span className="qq">?</span>
      </button>
      {coach && <MysteryCoach onClose={() => setCoach(false)} />}
    </>
  );
};

const BadgesReceivedCard = ({ received, unlockedSet, onOpenModal, onOpenSingle, friends, onDemoReceive, lockedCount }) => {
  // group by badge id, get most recent t per badge
  const lastByBadge = received.reduce((m, r) => {
    if (!m[r.id] || m[r.id] < r.t) m[r.id] = r.t;
    return m;
  }, {});
  const countByBadge = received.reduce((m, r) => { m[r.id] = (m[r.id] || 0) + 1; return m; }, {});
  // only show unlocked (received) types, sorted by most recent
  const unlockedBadges = BADGES
    .filter(b => unlockedSet.has(b.id))
    .sort((a, b) => (lastByBadge[b.id] || 0) - (lastByBadge[a.id] || 0));
  const NEW_WINDOW = 7 * DAY;
  const newCount = received.filter(r => Date.now() - r.t < NEW_WINDOW).length;
  const lastReceived = received.slice().sort((a, b) => b.t - a.t)[0];
  const lastFriend = lastReceived ? friends.find(f => f.id === lastReceived.from) : null;
  return (
    <div className="hotji-card">
      <div className="hotji-head">
        <div className="hotji-head-l">
          <div className="hotji-title">친구한테 받은 핫지 <span className="spark">✦</span></div>
          <div className="hotji-sub">받은 종류 {unlockedBadges.length} / 8 · 친구가 보낸 응원이 쌓여요</div>
        </div>
        {newCount > 0 && (
          <button className="hotji-alarm" onClick={onOpenModal} aria-label="받은 핫지 모달 열기">
            <span className="bang"><span className="dot"></span>!</span>
            <span className="n">{newCount}</span>
            <span className="lbl">{lastFriend ? `${lastFriend.nick}이 보냄` : '새 핫지'}</span>
          </button>
        )}
      </div>
      {unlockedBadges.length === 0 ? (
        <div style={{textAlign: 'center', padding: '24px 8px', color: 'rgba(255,255,255,0.55)', fontSize: 12}}>
          아직 받은 핫지가 없어요 — 친구가 보내면 여기에 쌓여요 ✦
        </div>
      ) : (
        <div className="hotji-rack">
          {unlockedBadges.map(b => {
            const last = lastByBadge[b.id];
            const isNew = last && (Date.now() - last) < NEW_WINDOW;
            return (
              <div
                key={b.id}
                className="hotji-cell unlocked"
                style={{'--cell-color': b.color}}
                onClick={() => onOpenSingle(b.id)}
                role="button"
                tabIndex={0}
              >
                {isNew && <span className="new-bang">!</span>}
                <span className="em">{b.em}</span>
                <span className="nm">{b.nm}</span>
                <span className="got-count">{countByBadge[b.id]}명에게 받음</span>
              </div>
            );
          })}
        </div>
      )}
      {lockedCount > 0 && (
        <div className="hotji-demo">
          <button onClick={onDemoReceive} disabled={lockedCount === 0}>데모 · 새 핫지 받기</button>
        </div>
      )}
    </div>
  );
};

const BadgesSendCard = ({ unlockedSet, cooldownMs, onPick }) => {
  const isReady = cooldownMs <= 0;
  return (
    <div className="hotji-card">
      <div className="hotji-head">
        <div className="hotji-head-l">
          <div className="hotji-title">핫지 보내기 <span className="spark">✦</span></div>
          <div className="hotji-sub">1주에 한 번 친구에게 보낼 수 있어요 · 잠금 해제 {unlockedSet.size} / 8</div>
        </div>
        <div className={'hotji-status ' + (isReady ? 'ready' : '')}>
          {isReady ? '💫 보낼 준비 완료' : `🕒 ${fmtHoursLeft(cooldownMs)}h 후`}
        </div>
      </div>
      <div className="hotji-rack">
        {BADGES.map(b => {
          const unlocked = unlockedSet.has(b.id);
          if (!unlocked) {
            return <HotjiCellLocked key={b.id} />;
          }
          return (
            <div
              key={b.id}
              className="hotji-cell unlocked"
              style={{'--cell-color': b.color}}
            >
              <span className="em">{b.em}</span>
              <span className="nm">{b.nm}</span>
              <button
                className="send-btn"
                disabled={!isReady}
                onClick={(e) => { e.stopPropagation(); if (isReady) onPick(b.id); }}
              >
                {isReady ? '보내기' : '대기 중'}
              </button>
            </div>
          );
        })}
      </div>
    </div>
  );
};

/* ─────────────────  PROFILE TAB  ───────────────── */
const ProfileTab = ({ qapo, voteCount, onOpenSettings, currentTheme, account, onLogout, voted, onGoVote, entering, locationAllowed, notifPrefs, savedCourses = [], onOpenCourse = () => {}, onRemoveCourse = () => {} }) => {
  const joinedDays = account && account.joinedAt
    ? Math.max(1, Math.floor((Date.now() - account.joinedAt) / 86400000) + 1)
    : 1;

  /* ── HOTJI state (persisted) ── */
  const [received, setReceived] = useState(() => loadJSON('qaoh-received-badges', INITIAL_RECEIVED_BADGES));
  const [unlockedSet, setUnlockedSet] = useState(() => {
    const arr = loadJSON('qaoh-unlocked-badges', null);
    if (arr) return new Set(arr);
    return new Set(INITIAL_RECEIVED_BADGES.map(r => r.id));
  });
  const [lastSentAt, setLastSentAt] = useState(() => loadJSON('qaoh-last-sent-at', 0));
  const [, setTick] = useState(0);
  useEffect(() => { saveJSON('qaoh-received-badges', received); }, [received]);
  useEffect(() => { saveJSON('qaoh-unlocked-badges', [...unlockedSet]); }, [unlockedSet]);
  useEffect(() => { saveJSON('qaoh-last-sent-at', lastSentAt); }, [lastSentAt]);
  useEffect(() => {
    const t = setInterval(() => setTick(n => n + 1), 60_000);
    return () => clearInterval(t);
  }, []);

  const cooldownMs = Math.max(0, COOLDOWN_MS - (Date.now() - lastSentAt));
  const lockedCount = BADGES.length - unlockedSet.size;
  const friendsAll = FRIENDS;

  /* ── modals/sheet ── */
  const [recvModal, setRecvModal] = useState(null); // { filterId? } | null
  const [pickerBadge, setPickerBadge] = useState(null); // badge | null
  const [toast, setToast] = useState(null); // { kind, badge, friend }

  /* ── 자기 바이오 (persisted, decorate-able) ── */
  const [myBio, setMyBio] = useState(() => loadJSON('qaoh-my-bio', { text: '', style: 'soft', emoji: '🐮' }));
  const [bioEditOpen, setBioEditOpen] = useState(false);
  useEffect(() => { saveJSON('qaoh-my-bio', myBio); }, [myBio]);

  const onSend = (friend) => {
    if (!pickerBadge || cooldownMs > 0) return;
    setLastSentAt(Date.now());
    setToast({ kind: 'sent', badge: pickerBadge, friend });
    setPickerBadge(null);
  };

  const onDemoReceive = () => {
    // pick a random locked badge + random friend, simulate receiving it
    const lockedIds = BADGE_IDS.filter(id => !unlockedSet.has(id));
    if (lockedIds.length === 0) return;
    const id = lockedIds[Math.floor(Math.random() * lockedIds.length)];
    const from = friendsAll[Math.floor(Math.random() * friendsAll.length)];
    const next = [...received, { id, from: from.id, t: Date.now() }];
    setReceived(next);
    setUnlockedSet(prev => { const n = new Set(prev); n.add(id); return n; });
    setToast({ kind: 'received', badge: BADGE_BY_ID[id], friend: from });
  };

  return (
  <>
  <div className={"scroll" + (entering ? ' profile-fade-in' : '')} key="profile">
    <div className="page-head between" style={{display:'flex', alignItems:'center', justifyContent:'space-between'}}>
      <h2>카오필</h2>
      <button className="icon-btn" onClick={() => onOpenSettings('theme')} aria-label="테마"><IconTheme size={16} /></button>
    </div>

    <div className="profile-hero">
      <div className="profile-avatar-wrap">
        <div className="profile-avatar"><Cow size={56} /></div>
        {received.length > 0 && (
          <div className="avatar-popular" aria-label={`받은 핫지 ${received.length}개`}>
            <span className="num">{received.length}</span>
            <span className="lab">🔥 핫지</span>
          </div>
        )}
      </div>
      <div className="profile-name">{account ? account.handle : '@gen_z_kim'}</div>
      <div className="profile-meta">{account ? `만 ${account.age}세 · ${account.gender || '비공개'} · ${account.region ? account.region.city + ' ' + account.region.district : '한국'} · ${account.mbti} · 가입 ${joinedDays}일째` : '만 24세 · 여성 · 서울 마포구 · INFP · 가입 142일째'}</div>

      <button
        type="button"
        className={'profile-bio bio-style-' + (myBio.style || 'soft') + (myBio.text ? '' : ' is-empty')}
        onClick={() => setBioEditOpen(true)}
        aria-label="바이오 편집"
      >
        <span className="bio-emoji" aria-hidden="true">{myBio.emoji || '🐮'}</span>
        <span className="bio-text">{myBio.text || '한 줄 바이오를 꾸며보세요 ✦'}</span>
        <span className="bio-edit-ico" aria-hidden="true">✎</span>
      </button>
    </div>

    <div className="qapo-hero">
      <div className="label">내 QAOH POINT</div>
      <div className="num" style={{position:'relative', zIndex:1}}>{qapo.toLocaleString()}</div>
      <div className="actions">
        <button className="btn primary">충전하기</button>
        <button className="btn">선물하기</button>
      </div>
    </div>

    <div className="stats-row">
      <div className="stat"><div className="v">{voteCount}</div><div className="l">총 투표</div></div>
      <div className="stat"><div className="v">8</div><div className="l">만든 투표</div></div>
      <div className="stat"><div className="v">23</div><div className="l">저장한 곳</div></div>
    </div>

    <div className="hotji-stats">
      <div className="hotji-stat count" role="button" tabIndex={0} onClick={() => setRecvModal({})}>
        <div className="lab">받은 핫지 ✦</div>
        <div className="num">{unlockedSet.size}<span className="unit">/ 8</span></div>
        <div className="cap">받은 종류만큼 늘어요</div>
      </div>
      {cooldownMs > 0 ? (
        <div className="hotji-stat timer">
          <div className="lab">다음 핫지 보내기 ⏰</div>
          <div className="num">{fmtHoursLeft(cooldownMs)}<span className="unit">시간</span></div>
          <div className="cap">기다리면 친구에게 보낼 수 있어요</div>
        </div>
      ) : (
        <div className="hotji-stat count" style={{borderStyle:'dashed'}}>
          <div className="lab">💫 보낼 준비 완료</div>
          <div className="num" style={{fontSize:18}}>지금 보낼 수 있어요</div>
          <div className="cap">잠금 해제한 핫지 중에서</div>
        </div>
      )}
    </div>

    <BadgesReceivedCard
      received={received}
      unlockedSet={unlockedSet}
      onOpenModal={() => setRecvModal({})}
      onOpenSingle={(id) => setRecvModal({ filterId: id })}
      friends={friendsAll}
      onDemoReceive={onDemoReceive}
      lockedCount={lockedCount}
    />

    <BadgesSendCard
      unlockedSet={unlockedSet}
      cooldownMs={cooldownMs}
      onPick={(id) => setPickerBadge(BADGE_BY_ID[id])}
    />

    <div className="section-head">
      <span className="section-title section-title-with-ico">
        <span className="section-ico" aria-hidden="true">🗺️</span>
        <span>내 QAOHROAD</span>
      </span>
      <span className="section-more" style={{cursor:'default',pointerEvents:'none'}}>
        {savedCourses.length}곳 저장됨
      </span>
    </div>
    {savedCourses.length === 0 ? (
      <div className="my-course-empty">
        <div className="my-course-empty-icon">🗺️</div>
        <div className="my-course-empty-title">아직 저장한 코스가 없어요</div>
        <div className="my-course-empty-sub">친구의 QAOHROAD를 따라가기로 저장하면 여기에 모여요</div>
      </div>
    ) : (
      <div className="my-course-list">
        {savedCourses.map(c => {
          const myVis = c.stops.slice(0, 3);
          const myExtra = c.stops.length - myVis.length;
          return (
          <div key={c.id} className="my-course-item">
            <button className="my-course-card" onClick={() => onOpenCourse(c)}>
              <div className="my-course-cover" style={{ background: c.stops[0]?.bg || 'var(--beige)' }}>
                <div className="my-course-chain">
                  {myVis.map((s, i) => (
                    <React.Fragment key={s.id}>
                      <span className="my-course-chain-chip">{s.emoji}</span>
                      {(i < myVis.length - 1 || myExtra > 0) && <span className="my-course-chain-arrow" aria-hidden="true">›</span>}
                    </React.Fragment>
                  ))}
                  {myExtra > 0 && <span className="my-course-chain-chip more">+{myExtra}</span>}
                </div>
                <div className="my-course-chip">{c.stops.length}곳 · {formatKm(c.totalKm)}</div>
              </div>
              <div className="my-course-meta">
                <div className="my-course-title">{c.title}</div>
                <div className="my-course-sub">
                  <span className="my-course-av" style={{ background: c.friendColor || '#E5E0D0' }} />
                  {c.nick}
                  <span className="my-course-dot">·</span>
                  <span>{(c.cats || []).slice(0,2).join(' / ')}</span>
                </div>
              </div>
            </button>
            <button className="my-course-remove" onClick={() => onRemoveCourse(c.id)} aria-label="저장 해제">✕</button>
          </div>
          );
        })}
      </div>
    )}

    <div className="section-head">
      <span className="section-title section-title-with-ico">
        <span className="section-ico" aria-hidden="true"><IconSettings size={14} /></span>
        <span>설정</span>
      </span>
      <button className="section-more" onClick={() => onOpenSettings('menu')} aria-label="전체 설정 열기">
        전체 <IconChevR size={12} />
      </button>
    </div>

function courseAgoLabel(h) {
  if (h < 1) return Math.round(h * 60) + '분 전';
  if (h < 24) return Math.round(h) + '시간 전';
  return Math.round(h / 24) + '일 전';
}
function formatKm(km) {
  if (km == null || isNaN(km)) return '—';
  if (km < 1) return Math.round(km * 1000) + 'm';
  return km.toFixed(1) + 'km';
}
