/* ─────────────────  PEEK demographics (mock, deterministic) ─────────────────
   "눈치보기" — derives plausible demographic breakdowns from a poll's id+category
   so the same poll always shows the same numbers across mounts. */
const peekRand = (seed, salt) => {
  // deterministic LCG in [0, 1)
  let x = ((seed * 9301 + 49297 + salt * 7919) % 233280) / 233280;
  return x < 0 ? x + 1 : x;
};
const getPeekStats = (poll) => {
  if (!poll) return null;
  const total = (poll.va || 0) + (poll.vb || 0);
  const seed  = parseInt(String(poll.id).replace(/\D/g, ''), 10) || 1;
  const pctA  = total > 0 ? Math.round((poll.va / total) * 100) : 50;
  // -- Gender split, biased by category ---------------------------------------
  let male;
  if (poll.cat === '카페' || poll.cat === '데이트') male = 36 + Math.floor(peekRand(seed, 1) * 12);
  else if (poll.cat === '테크' || poll.cat === '야식') male = 56 + Math.floor(peekRand(seed, 1) * 12);
  else if (poll.cat === '캠퍼스' || poll.cat === '편의점') male = 44 + Math.floor(peekRand(seed, 1) * 12);
  else male = 46 + Math.floor(peekRand(seed, 1) * 12);
  male = Math.max(22, Math.min(78, male));
  const female = 100 - male;
  // -- Age buckets [10대, 20대, 30대, 40대, 50대+] ----------------------------
  let ages;
  if (poll.cat === '카페' || poll.cat === '캠퍼스')      ages = [12, 48, 24, 11, 5];
  else if (poll.cat === '데이트')                       ages = [8, 52, 26, 10, 4];
  else if (poll.cat === '테크')                         ages = [6, 38, 32, 16, 8];
  else if (poll.cat === '야식')                         ages = [10, 44, 28, 13, 5];
  else if (poll.cat === '편의점')                       ages = [14, 42, 22, 14, 8];
  else                                                  ages = [10, 42, 26, 14, 8];
  ages = ages.map((v, i) => Math.max(2, v + Math.floor(peekRand(seed, 100 + i) * 7) - 3));
  const s1 = ages.reduce((a, b) => a + b, 0);
  ages = ages.map(v => Math.round((v / s1) * 100));
  ages[1] += 100 - ages.reduce((a, b) => a + b, 0); // correct rounding drift onto the dominant 20대 bucket
  // -- Choice × Gender cross-tab (% who chose option A) -----------------------
  const skew = Math.floor(peekRand(seed, 200) * 22) - 11; // -11 .. +10
  const malePctA   = Math.max(15, Math.min(85, pctA + skew));
  const femalePctA = Math.max(15, Math.min(85, pctA - skew));
  return { total, male, female, ages, malePctA, femalePctA, pctA };
};
const PEEK_AGE_LABELS = ['10대', '20대', '30대', '40대', '50대+'];

/* ─────────────  NEAR-ME LOCATION MAP  ─────────────
   Maps a user's region district to a list of poll-level neighborhood labels
   that count as "near me". First entry is the primary neighborhood (shown
   in the location-strip). '전국' polls are always considered global, not
   near-by, so they don't crowd out actually-local picks. */
const NEARBY_BY_DISTRICT = {
  '마포구':   ['홍대', '신촌', '망원', '연남', '합정'],
  '서대문구': ['신촌', '홍대', '연남'],
  '용산구':   ['이태원', '한남', '용산'],
  '강남구':   ['강남', '압구정', '청담', '논현'],
  '서초구':   ['서초', '강남', '방배'],
  '성동구':   ['성수', '왕십리', '뚝섬'],
  '광진구':   ['건대', '성수', '구의'],
  '종로구':   ['종로', '인사동', '안국'],
  '중구':     ['명동', '을지로', '동대문'],
  '송파구':   ['잠실', '석촌', '문정'],
  '영등포구': ['여의도', '영등포', '문래'],
  '관악구':   ['신림', '서울대입구', '봉천'],
  '동작구':   ['노량진', '사당', '흑석'],
  '강서구':   ['마곡', '발산', '화곡'],
};
const DEFAULT_NEAR_LOCS = ['홍대', '신촌', '망원', '연남', '합정'];
const getNearbyLocsForDistrict = (district) => {
  if (!district) return DEFAULT_NEAR_LOCS;
  return NEARBY_BY_DISTRICT[district] || DEFAULT_NEAR_LOCS;
};

/* ─────────────────  HOME TAB  ───────────────── */
const HomeTab = ({ polls, onVote, voted, qapo, account }) => {
  const [now, setNow] = useState(0);
  const [expanded, setExpanded] = useState(false);
  const [theme, setTheme] = useState('전체');
  const [pickId, setPickId] = useState(null); // floating modal: poll id or null
  const [peekOpen, setPeekOpen] = useState(false); // 눈치보기 panel inside pick-modal
  const [themeSearchOpen, setThemeSearchOpen] = useState(false);
  const [themeQuery, setThemeQuery] = useState('');
  // 랜덤 트렌딩 시드 — HomeTab 마운트 시 한 번, 테마 전환·셔플 버튼 누를 때마다 갱신
  const [themeShuffleSeed, setThemeShuffleSeed] = useState(() => Date.now());
  const themeSearchInputRef = useRef(null);
  useEffect(() => { const t = setInterval(() => setNow(n => n + 1), 1000); return () => clearInterval(t); }, []);
  // 테마가 바뀔 때마다 자동 리셔플 — 카테고리 전환에도 매번 다른 트렌딩이 보이게
  useEffect(() => { if (theme !== '전체') setThemeShuffleSeed(Date.now()); }, [theme]);
  // Close peek panel whenever the floating modal changes target / closes
  useEffect(() => { setPeekOpen(false); }, [pickId]);
  // ESC to close pick modal (also collapses 눈치보기 first if open)
  useEffect(() => {
    if (pickId === null) return;
    const onKey = (e) => {
      if (e.key !== 'Escape') return;
      if (peekOpen) setPeekOpen(false);
      else setPickId(null);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [pickId, peekOpen]);
  // ESC + autofocus for the theme-search modal
  useEffect(() => {
    if (!themeSearchOpen) return;
    const onKey = (e) => { if (e.key === 'Escape') { setThemeSearchOpen(false); setThemeQuery(''); } };
    window.addEventListener('keydown', onKey);
    const t = setTimeout(() => themeSearchInputRef.current && themeSearchInputRef.current.focus(), 80);
    return () => { window.removeEventListener('keydown', onKey); clearTimeout(t); };
  }, [themeSearchOpen]);

  // Daily 1위 트렌드: rotates at local 00:00.
  // `now` ticks every second, so as soon as the local date flips the day index increments and a new hero takes over.
  const today = new Date();
  const localMidnightMs = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();
  const dayIndex = Math.floor(localMidnightMs / 86400000);
  const heroIdx = polls.length ? dayIndex % polls.length : 0;
  const hero = polls[heroIdx];
  const heroTotal = hero.va + hero.vb;
  const heroPctA = Math.round((hero.va / heroTotal) * 100);
  const heroPctB = 100 - heroPctA;
  const heroWin = heroPctB > heroPctA ? 'b' : 'a';

  // Live countdown to next local midnight (00:00). When it hits zero, the day index above flips and a new hero takes over.
  const msUntilMidnight = (() => {
    const t = new Date();
    const next = new Date(t.getFullYear(), t.getMonth(), t.getDate() + 1, 0, 0, 0, 0);
    return Math.max(0, next.getTime() - t.getTime());
  })();
  const remaining = Math.floor(msUntilMidnight / 1000);
  const h = String(Math.floor(remaining / 3600)).padStart(2, '0');
  const m = String(Math.floor((remaining % 3600) / 60)).padStart(2, '0');
  const s = String(remaining % 60).padStart(2, '0');

  // User's neighborhood — derived from account.region.district, defaults to 홍대 cluster
  const userDistrict = account && account.region && account.region.district;
  const nearbyLocs = getNearbyLocsForDistrict(userDistrict);
  const nearbySet = useMemo(() => new Set(nearbyLocs), [nearbyLocs.join('|')]);
  const primaryNeighborhood = nearbyLocs[0] || '홍대';

  // Theme chips for 테마 픽 — owns its own card list, independent of 인기 픽
  // No 전체 chip — refresh icon in the header resets the selection
  // '내 근처' filters by user's neighborhood cluster (defined in NEARBY_BY_DISTRICT)
  const themes = [
    { key: '내 근처', emoji: '📍' },
    { key: '맛집',    emoji: '🍜' },
    { key: '카페',    emoji: '☕' },
    { key: '데이트',  emoji: '💕' },
    { key: '야식',    emoji: '🌙' },
    { key: '테크',    emoji: '📱' },
    { key: '캠퍼스',  emoji: '🎓' },
    { key: '활동',    emoji: '🏃' },
    { key: '편의점',  emoji: '🏪' },
  ];

  // 테마 픽: 가장 유명한 곳들 중 랜덤 — 카테고리 후보 → 인기순(투표수+핫지) 상위 15 → 시드 셔플 → 6개 노출.
  // '내 근처'는 사용자 동네 클러스터로 후보 풀을 잡음. 시드는 theme 전환 / 🎲 버튼으로 갱신.
  const THEME_FAMOUS_POOL = 15;   // 후보 풀: 카테고리 인기 상위
  const THEME_SHOW_LIMIT  = 6;    // 노출 카드 수
  const themePool = useMemo(() => {
    if (theme === '전체') return [];
    const candidates = theme === '내 근처'
      ? polls.filter(p => nearbySet.has(p.loc))
      : polls.filter(p => p.cat === theme);
    if (candidates.length === 0) return [];
    const famous = candidates.slice().sort((a, b) => {
      const sA = (a.va + a.vb) + (a.hot || 0) * 0.4;
      const sB = (b.va + b.vb) + (b.hot || 0) * 0.4;
      return sB - sA;
    }).slice(0, THEME_FAMOUS_POOL);
    return shuffleWithSeed(famous, themeShuffleSeed >>> 0).slice(0, THEME_SHOW_LIMIT);
  }, [theme, polls, themeShuffleSeed, nearbySet]);

  // 인기 픽: full pool sorted by total participation (votesA + votesB), capped 1 / 15
  const popularPool = polls
    .slice()
    .sort((a, b) => (b.votesA + b.votesB) - (a.votesA + a.votesB));
  const popularRest = expanded ? popularPool.slice(0, 15) : popularPool.slice(0, 1);

  // Shared renderer so 테마 픽 + 인기 픽 use identical card markup
  const renderCard = (p, idx) => {
    const total = p.va + p.vb;
    const pctA = Math.round((p.va / total) * 100);
    const pctB = 100 - pctA;
    const myVote = voted[p.id];
    const beige = idx % 3 === 1;
    // 근처 표시: 사용자의 동네 클러스터에 속한 폴에 작은 📍 칩을 붙임
    // ('전국' 폴은 제외 — 위치 시그널이 없는 글로벌 폴은 동네 추천이 아님)
    const isNearby = p.loc !== '전국' && nearbySet.has(p.loc);
    // Tap card surface → open floating pick modal. Option buttons stop propagation to vote directly.
    return (
      <article
        key={p.id}
        className={"trend-card" + (beige ? ' beige' : '') + (isNearby ? ' nearby' : '')}
        role="button"
        tabIndex={0}
        onClick={() => setPickId(p.id)}
        onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setPickId(p.id); } }}
        aria-label={`${p.title} 자세히 보기${isNearby ? ' · 내 근처' : ''}`}
        style={{ cursor: 'pointer' }}>
        <div className="meta">
          <span className="pill cream">#{p.cat}</span>
          {isNearby && <span className="pill nearby-pill" title="내 근처 투표">📍 {p.loc}</span>}
          <span className="fire"><IconFire />{p.hot.toLocaleString()}</span>
        </div>
        <h3 className="question">{p.title}</h3>
        <div className="trend-opts">
          <button
            className={"trend-opt " + (myVote === 'a' ? 'voted' : '')}
            onClick={(e) => { e.stopPropagation(); onVote(p.id, 'a'); }}
            disabled={!!myVote}>
            <span><span className="opt-emoji" aria-hidden="true">{p.ea}</span>{p.a}</span>
            {myVote && <span className="sub">{pctA}%</span>}
          </button>
          <span className="vs">vs</span>
          <button
            className={"trend-opt " + (myVote === 'b' ? 'voted' : '')}
            onClick={(e) => { e.stopPropagation(); onVote(p.id, 'b'); }}
            disabled={!!myVote}>
            <span><span className="opt-emoji" aria-hidden="true">{p.eb}</span>{p.b}</span>
            {myVote && <span className="sub">{pctB}%</span>}
          </button>
        </div>
        <div className="trend-foot">
          <span className="loc">📍 {p.loc} · {total.toLocaleString()}명</span>
          <span className="qapo">+{p.reward} QAOH POINT</span>
        </div>
      </article>
    );
  };

  // Resolve currently-open pick (modal data) — null when closed
  const activePick = pickId !== null ? polls.find(p => p.id === pickId) : null;

  return (
    <>
    <div className="scroll" key="home">
      <div className="location-strip">
        <span className="ping"></span>
        <span className="grow">{primaryNeighborhood} · 내 위치</span>
        <IconChevD size={14} />
      </div>

      <div
        className="hero"
        role="button"
        tabIndex={0}
        onClick={() => setPickId(hero.id)}
        onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setPickId(hero.id); } }}
        aria-label={`지금 1위 트렌드 · ${hero.title} 자세히 보기`}
        style={{ cursor: 'pointer' }}>
        <div className="hero-top">
          <span className="hero-label"><span className="dot"></span>사람들이 고르는 #1</span>
          <span className="hero-timer">{h}:{m}:{s} 남음</span>
        </div>
        <h2 className="hero-title">
          <span className="cat">#{hero.cat}</span>
          {hero.title}
        </h2>
        <div className="hero-opts-visual">
          <div className="hero-opt-side">
            <div className={"hero-opt-circle" + (heroWin === 'a' ? ' win' : '')} aria-hidden="true">{hero.ea}</div>
            <div className="hero-opt-name">{hero.a}</div>
            <div className={"hero-opt-pct" + (heroWin === 'a' ? ' win' : '')}>{heroPctA}<span style={{fontSize: 14, opacity: 0.55}}>%</span></div>
          </div>
          <div className="hero-vs-badge" aria-hidden="true">vs</div>
          <div className="hero-opt-side">
            <div className={"hero-opt-circle" + (heroWin === 'b' ? ' win' : '')} aria-hidden="true">{hero.eb}</div>
            <div className="hero-opt-name">{hero.b}</div>
            <div className={"hero-opt-pct" + (heroWin === 'b' ? ' win' : '')}>{heroPctB}<span style={{fontSize: 14, opacity: 0.55}}>%</span></div>
          </div>
        </div>
        <div className="hero-bar" aria-hidden="true">
          <div className="hero-bar-a" style={{ width: heroPctA + '%' }}></div>
          <div className="hero-bar-b" style={{ width: heroPctB + '%' }}></div>
        </div>
        <div className="hero-foot">
          <span className="left">{heroTotal.toLocaleString()}명 참여중</span>
          <button className="hero-cta" onClick={(e) => { e.stopPropagation(); onVote(hero.id, 'b'); }}>
            지금 투표 <span className="reward">+{hero.reward} QAOH POINT</span>
          </button>
        </div>
      </div>

      <div className="section-head">
        <span className="section-title">
          <span className="pick-icon" aria-hidden="true">🎨</span>
          테마 픽
          {theme !== '전체' && <span style={{ color: 'var(--muted)', fontWeight: 600, fontSize: 13, marginLeft: 6, letterSpacing: '-0.02em' }}>· {theme === '내 근처' ? `${primaryNeighborhood} 근처` : theme}</span>}
        </span>
        <span className="theme-action-group">
          {theme !== '전체' && (
            <button
              className="theme-shuffle"
              onClick={() => setThemeShuffleSeed(Date.now())}
              aria-label="랜덤 트렌딩 다시 뽑기"
              title="다른 핫픽 보기">
              <span aria-hidden="true">🎲</span>
            </button>
          )}
          <button
            className="theme-search-btn"
            onClick={() => setThemeSearchOpen(true)}
            aria-label="테마 검색">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="11" cy="11" r="7"/>
              <path d="M21 21l-4.3-4.3"/>
            </svg>
          </button>
          {theme !== '전체' && (
            <button
              className="theme-refresh"
              onClick={() => setTheme('전체')}
              aria-label="테마 초기화">
              <IconRefresh size={14} />
            </button>
          )}
        </span>
      </div>
      <div className="chips" role="tablist" aria-label="테마 픽">
        {themes.map(t => (
          <button
            key={t.key}
            role="tab"
            aria-selected={theme === t.key}
            className={"chip" + (theme === t.key ? ' active' : '') + (t.key === '내 근처' ? ' near-chip' : '')}
            onClick={() => setTheme(t.key)}>
            <span aria-hidden="true">{t.emoji}</span>
            <span>{t.key}</span>
          </button>
        ))}
      </div>

      {theme !== '전체' && (
        themePool.length === 0 ? (
          <div style={{ margin: '4px 18px 16px', padding: '28px 18px', textAlign: 'center', background: 'var(--white)', border: '1px dashed var(--line)', borderRadius: 18, color: 'var(--muted)', fontSize: 13, fontWeight: 600, letterSpacing: '-0.02em' }}>
            <div style={{ fontSize: 28, marginBottom: 8 }}>🐮</div>
            <div style={{ marginBottom: 10 }}>{theme === '내 근처' ? `${primaryNeighborhood} 근처 투표가 아직 없어요` : `${theme} 테마의 투표가 아직 없어요`}</div>
            <button onClick={() => setTheme('전체')} style={{ background: 'var(--black)', color: 'var(--bg)', border: 'none', borderRadius: 999, padding: '8px 14px', fontSize: 12, fontWeight: 700, letterSpacing: '-0.02em', cursor: 'pointer', fontFamily: 'inherit' }}>테마 해제</button>
          </div>
        ) : (
          <div className="trend-list">
            {themePool.map(renderCard)}
          </div>
        )
      )}

      <div className="section-divider" aria-hidden="true"></div>

      <div className="section-head">
        <span className="section-title">
          <span className="pick-icon delay-1" aria-hidden="true">🔥</span>
          인기 픽
        </span>
        {popularPool.length > 1 && (
          <button className="section-link" onClick={() => setExpanded(v => !v)} aria-expanded={expanded}>
            {expanded ? '접기' : '전체 보기'}
            <span style={{ display: 'inline-flex', transform: expanded ? 'rotate(-90deg)' : 'none', transition: 'transform 0.2s ease' }}>
              <IconChevR size={12} />
            </span>
          </button>
        )}
      </div>

      <div className="trend-list">
        {popularRest.map(renderCard)}
      </div>

      <div className="caption">투표하고 <b>QAOH POINT</b>를 모아 보세요</div>
    </div>

    {/* Floating Pick Modal — sibling of .scroll so .scroll's overflow doesn't clip it. Positions relative to .phone. */}
    <div
      className={"pick-backdrop" + (activePick ? ' show' : '')}
      onClick={() => setPickId(null)}
      aria-hidden={!activePick}
    />
    <div
      className={"pick-modal" + (activePick ? ' show' : '')}
      role="dialog"
      aria-modal="true"
      aria-label="투표 자세히 보기"
      aria-hidden={!activePick}>
        {activePick && (() => {
          const total = activePick.va + activePick.vb;
          const pctA = Math.round((activePick.va / total) * 100);
          const pctB = 100 - pctA;
          const myVote = voted[activePick.id];
          return (
            <>
              <button className="pick-modal-close" onClick={() => setPickId(null)} aria-label="닫기">
                <IconClose size={16} />
              </button>
              <div className="pick-modal-body">
                <div className="meta">
                  <span className="pill cream">#{activePick.cat}</span>
                  <span className="fire"><IconFire />{activePick.hot.toLocaleString()}</span>
                </div>
                <h3 className="question">{activePick.title}</h3>
                <div className="pick-opts">
                  <button
                    className={"pick-opt " + (myVote === 'a' ? 'voted' : '')}
                    onClick={() => onVote(activePick.id, 'a')}
                    disabled={!!myVote}>
                    <span className="left">
                      <span className="opt-emoji" aria-hidden="true">{activePick.ea}</span>
                      <span className="name">{activePick.a}</span>
                    </span>
                    {myVote && <span className="pct">{pctA}%</span>}
                  </button>
                  <div className="pick-vs">VS</div>
                  <button
                    className={"pick-opt " + (myVote === 'b' ? 'voted' : '')}
                    onClick={() => onVote(activePick.id, 'b')}
                    disabled={!!myVote}>
                    <span className="left">
                      <span className="opt-emoji" aria-hidden="true">{activePick.eb}</span>
                      <span className="name">{activePick.b}</span>
                    </span>
                    {myVote && <span className="pct">{pctB}%</span>}
                  </button>
                </div>
                {myVote && (
                  <div className="pick-bar" aria-hidden="true">
                    <div className="pick-bar-a" style={{ width: pctA + '%' }}></div>
                    <div className="pick-bar-b" style={{ width: pctB + '%' }}></div>
                  </div>
                )}
                <div className="pick-foot">
                  <span className="loc">📍 {activePick.loc} · {total.toLocaleString()}명 참여</span>
                  <span className="qapo">+{activePick.reward} QAOH POINT</span>
                </div>
                {myVote && (() => {
                  const stats = getPeekStats(activePick);
                  return (
                    <>
                      <button
                        type="button"
                        className={"peek-toggle" + (peekOpen ? ' open' : '')}
                        onClick={() => setPeekOpen(v => !v)}
                        aria-expanded={peekOpen}
                        aria-controls={`peek-panel-${activePick.id}`}>
                        <span className="peek-toggle-icon" aria-hidden="true">👀</span>
                        <span className="peek-toggle-text">
                          <b>눈치보기</b>
                          <span className="peek-toggle-sub">누가 골랐을까?</span>
                        </span>
                        <span className="peek-toggle-chev" aria-hidden="true">
                          <IconChevD size={14} />
                        </span>
                      </button>
                      <div
                        id={`peek-panel-${activePick.id}`}
                        className={"peek-panel" + (peekOpen ? ' open' : '')}
                        role="region"
                        aria-label="투표 참여자 통계"
                        aria-hidden={!peekOpen}>
                        <div className="peek-section peek-section-total">
                          <span className="peek-section-label">참여한 사람</span>
                          <span className="peek-total">
                            <b>{stats.total.toLocaleString()}</b>
                            <span>명</span>
                          </span>
                        </div>

                        <div className="peek-section">
                          <div className="peek-section-head">
                            <span className="peek-section-label">성별</span>
                            <span className="peek-section-meta">
                              남 {stats.male}% · 여 {stats.female}%
                            </span>
                          </div>
                          <div className="peek-gender-bar" aria-hidden="true">
                            <div className="peek-gender-male" style={{ width: stats.male + '%' }}>
                              <span className="peek-gender-emoji">👨</span>
                            </div>
                            <div className="peek-gender-female" style={{ width: stats.female + '%' }}>
                              <span className="peek-gender-emoji">👩</span>
                            </div>
                          </div>
                          <div className="peek-cross">
                            <div className="peek-cross-row">
                              <span className="peek-cross-key">
                                <span className="peek-cross-dot male" aria-hidden="true"></span>
                                남성은
                              </span>
                              <span className="peek-cross-val">
                                <span className="opt-emoji" aria-hidden="true">
                                  {stats.malePctA >= 50 ? activePick.ea : activePick.eb}
                                </span>
                                {stats.malePctA >= 50 ? activePick.a : activePick.b}
                                <b>{stats.malePctA >= 50 ? stats.malePctA : 100 - stats.malePctA}%</b>
                              </span>
                            </div>
                            <div className="peek-cross-row">
                              <span className="peek-cross-key">
                                <span className="peek-cross-dot female" aria-hidden="true"></span>
                                여성은
                              </span>
                              <span className="peek-cross-val">
                                <span className="opt-emoji" aria-hidden="true">
                                  {stats.femalePctA >= 50 ? activePick.ea : activePick.eb}
                                </span>
                                {stats.femalePctA >= 50 ? activePick.a : activePick.b}
                                <b>{stats.femalePctA >= 50 ? stats.femalePctA : 100 - stats.femalePctA}%</b>
                              </span>
                            </div>
                          </div>
                        </div>

                        <div className="peek-section">
                          <div className="peek-section-head">
                            <span className="peek-section-label">나이대</span>
                            <span className="peek-section-meta">
                              {(() => {
                                const max = Math.max(...stats.ages);
                                const idx = stats.ages.indexOf(max);
                                return `${PEEK_AGE_LABELS[idx]}가 가장 많아요`;
                              })()}
                            </span>
                          </div>
                          <ul className="peek-age-list">
                            {stats.ages.map((pct, i) => {
                              const max = Math.max(...stats.ages);
                              const isTop = pct === max;
                              return (
                                <li key={i} className={"peek-age-row" + (isTop ? ' top' : '')}>
                                  <span className="peek-age-label">{PEEK_AGE_LABELS[i]}</span>
                                  <span className="peek-age-track" aria-hidden="true">
                                    <span
                                      className="peek-age-fill"
                                      style={{ width: Math.max(2, Math.round((pct / max) * 100)) + '%' }}
                                    ></span>
                                  </span>
                                  <span className="peek-age-pct">{pct}%</span>
                                </li>
                              );
                            })}
                          </ul>
                        </div>

                        <div className="peek-hint">📊 익명 통계 · 응답자의 프로필을 바탕으로 집계됩니다</div>
                      </div>
                    </>
                  );
                })()}
              </div>
            </>
          );
        })()}
    </div>

    {/* Floating Theme-Search Modal — pick a theme; tapping it filters 테마 픽 below */}
    <div
      className={"theme-search-backdrop" + (themeSearchOpen ? ' show' : '')}
      onClick={() => { setThemeSearchOpen(false); setThemeQuery(''); }}
      aria-hidden={!themeSearchOpen}
    />
    <div
      className={"theme-search-modal" + (themeSearchOpen ? ' show' : '')}
      role="dialog"
      aria-modal="true"
      aria-label="테마 검색"
      aria-hidden={!themeSearchOpen}>
      <div className="theme-search-head">
        <h3><span className="ico" aria-hidden="true">🎨</span>테마 찾기</h3>
        <button className="theme-search-close" onClick={() => { setThemeSearchOpen(false); setThemeQuery(''); }} aria-label="닫기">
          <IconClose size={14} />
        </button>
      </div>
      <div className="theme-search-input-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="11" cy="11" r="7"/>
          <path d="M21 21l-4.3-4.3"/>
        </svg>
        <input
          ref={themeSearchInputRef}
          className="theme-search-input"
          placeholder="테마 검색 · 카페, 야식…"
          value={themeQuery}
          onChange={(e) => setThemeQuery(e.target.value)}
        />
        {themeQuery && (
          <button className="theme-search-clear" onClick={() => setThemeQuery('')} aria-label="지우기">×</button>
        )}
      </div>
      <div className="theme-search-list">
        {(() => {
          const q = themeQuery.trim().toLowerCase();
          const filtered = themes.filter(t => !q || t.key.toLowerCase().includes(q) || t.emoji.includes(q));
          if (filtered.length === 0) {
            return (
              <div className="theme-search-empty">
                <span className="em" aria-hidden="true">🐮</span>
                <b>"{themeQuery}"</b>에 해당하는 테마가 없어요
              </div>
            );
          }
          return filtered.map(t => {
            const count = polls.filter(p => p.cat === t.key).length;
            const isActive = theme === t.key;
            return (
              <button
                key={t.key}
                className={"theme-search-item" + (isActive ? ' active' : '')}
                onClick={() => {
                  setTheme(t.key);
                  setExpanded(false);
                  setThemeSearchOpen(false);
                  setThemeQuery('');
                }}>
                <span className="theme-search-emoji" aria-hidden="true">{t.emoji}</span>
                <span className="theme-search-name">{t.key}</span>
                <span className="theme-search-count">{count}개 픽</span>
              </button>
            );
          });
        })()}
      </div>
    </div>
    </>
  );
};

/* ─────────────────  MAP TAB  ───────────────── */
const MapTab = ({ polls = [] }) => {
  const [chip, setChip] = useState('내 근처');
  const [sortMode, setSortMode] = useState('거리 순'); // '거리 순' | '인기 순'
  const chips = ['내 근처', '오늘', '이번 주', '전체', '맛집', '카페', '쇼핑', '활동', '캠퍼스'];

  // Search overlay state
  const [searchOpen, setSearchOpen] = useState(false);
  const [searchQuery, setSearchQuery] = useState('');
  const searchInputRef = useRef(null);

  // Active neighborhood filter (set when the user picks a 위치 from search).
  // Anchors distance + filters PLACES to that hood until cleared.
  const [selectedHood, setSelectedHood] = useState(null);

  // TOP 15 dropdown (gray inline panel next to sort toggle)
  const [top15Open, setTop15Open] = useState(false);

  // 베스트 픽 — 관리자가 매주 선정한 5곳. localStorage에서 직접 읽어 카오맵 하단에 노출.
  const [bestPicksState, setBestPicksState] = useState(() => loadBestPicks());
  useEffect(() => {
    // 다른 탭(관리자 콘솔)에서 갱신했을 때를 위해 stage 진입 시 한 번 더 읽기.
    setBestPicksState(loadBestPicks());
    const onStorage = (e) => { if (e.key === BEST_PICKS_KEY) setBestPicksState(loadBestPicks()); };
    window.addEventListener('storage', onStorage);
    return () => window.removeEventListener('storage', onStorage);
  }, []);
  const bestPicksList = useMemo(() => {
    const ids = bestPicksState.picks || [];
    return ids.map(id => PLACES.find(p => p.id === id)).filter(Boolean);
  }, [bestPicksState]);
  const bestMonthIsCurrent = bestPicksState.monthStart === getMonthStartTs();
  const bestMonthLabel = bestPicksState.monthStart ? formatMonthLabel(bestPicksState.monthStart) : '';

  // ── Place detail bottom-sheet (drag-down to dismiss) ──
  const [sheetPlace, setSheetPlace] = useState(null); // null | place
  const sheetRef    = useRef(null);
  const sheetDragRef = useRef({ active: false, startY: 0, dy: 0, t0: 0 });
  const [sheetClosing, setSheetClosing] = useState(false);

  const openSheet  = (pl) => { setSheetClosing(false); setSheetPlace(pl); };
  const closeSheet = () => {
    setSheetClosing(true);
    setTimeout(() => { setSheetPlace(null); setSheetClosing(false); }, 260);
  };

  const onSheetDown = (e) => {
    const el = sheetRef.current; if (!el) return;
    sheetDragRef.current = {
      active: true,
      startY: e.touches ? e.touches[0].clientY : e.clientY,
      dy: 0,
      t0: Date.now(),
    };
    el.classList.add('dragging');
  };
  const onSheetMove = (e) => {
    const d = sheetDragRef.current;
    if (!d.active) return;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    const dy = Math.max(0, y - d.startY); // drag DOWN only
    d.dy = dy;
    const el = sheetRef.current; if (!el) return;
    el.style.transform = `translateY(${dy}px)`;
    const bd = el.parentElement && el.parentElement.querySelector('.sheet-backdrop');
    if (bd) bd.style.opacity = String(Math.max(0, 1 - dy / 380));
  };
  const onSheetUp = () => {
    const d = sheetDragRef.current;
    if (!d.active) return;
    d.active = false;
    const el = sheetRef.current; if (!el) return;
    el.classList.remove('dragging');
    const dt = Math.max(1, Date.now() - d.t0);
    const velocity = d.dy / dt; // px per ms downward
    if (d.dy > 110 || velocity > 0.55) {
      closeSheet();
    } else {
      el.style.transform = '';
      const bd = el.parentElement && el.parentElement.querySelector('.sheet-backdrop');
      if (bd) bd.style.opacity = '';
    }
  };

  // Live location state. null until the first fix arrives or we fall back.
  const [userPos, setUserPos] = useState(null);
  const [accuracy, setAccuracy] = useState(null);
  const [geoStatus, setGeoStatus] = useState('idle'); // idle | locating | live | denied | unavailable | fallback
  const [mapReady, setMapReady] = useState(false);
  const mapElRef = useRef(null);
  const mapRef = useRef(null);
  const userMarkerRef = useRef(null);
  const userCircleRef = useRef(null);
  const watchIdRef = useRef(null);
  const openInfoRef = useRef(null);
  const pinOverlaysRef = useRef([]);

  // ───── one-time map init ─────
  useEffect(() => {
    let cancelled = false;

    function initMap() {
      if (cancelled || !mapElRef.current || mapRef.current) return;
      if (typeof window.kakao === 'undefined' || typeof window.kakao.maps === 'undefined') {
        console.error('[QAOH] kakao or kakao.maps is undefined after SDK load');
        return;
      }
      try {
        window.kakao.maps.load(() => {
          if (cancelled || !mapElRef.current || mapRef.current) return;
          try {
            const map = new window.kakao.maps.Map(mapElRef.current, {
              center: new window.kakao.maps.LatLng(SEONGSU_FALLBACK.lat, SEONGSU_FALLBACK.lng),
              level: 4,
            });

            mapRef.current = map;
            setMapReady(true);
            setTimeout(() => { if (!cancelled) map.relayout(); }, 300);
          } catch (err) {
            console.error('[QAOH] kakao.maps.load callback error:', err);
          }
        });
      } catch (err) {
        console.error('[QAOH] kakao.maps.load() call error:', err);
      }
    }

    const sdkScript = document.getElementById('kakao-sdk');
    if (typeof window.kakao !== 'undefined' && typeof window.kakao.maps !== 'undefined') {
      // SDK already fully loaded (e.g. tab switch back)
      initMap();
    } else if (sdkScript) {
      // Script tag exists but may not have loaded yet — wait for it
      sdkScript.addEventListener('load', initMap, { once: true });
      sdkScript.addEventListener('error', () => {
        console.error('[QAOH] Failed to load Kakao Maps SDK. Check that https://dapi.kakao.com is reachable and the JS key + registered domain are correct.');
      }, { once: true });
      // Also try immediately in case the load event already fired
      if (sdkScript.readyState === 'complete' || typeof window.kakao !== 'undefined') {
        initMap();
      }
    } else {
      console.error('[QAOH] #kakao-sdk script tag not found in DOM');
    }

    return () => {
      cancelled = true;
      pinOverlaysRef.current.forEach(o => { try { o.setMap(null); } catch (_) {} });
      pinOverlaysRef.current = [];
      if (mapRef.current) {
        mapRef.current = null;
      }
    };
  }, []);

  // ───── place pins: re-render when chip filter changes ─────
  useEffect(() => {
    const map = mapRef.current;
    if (!mapReady || !map || typeof window.kakao === 'undefined' || typeof window.kakao.maps === 'undefined') return;

    // tear down previous overlays + close any open infowindow
    pinOverlaysRef.current.forEach(o => { try { o.setMap(null); } catch (_) {} });
    pinOverlaysRef.current = [];
    if (openInfoRef.current) {
      try { openInfoRef.current.close(); } catch (_) {}
      openInfoRef.current = null;
    }

    const visible = CATEGORY_CHIPS.has(chip)
      ? PLACES.filter(p => p.cat === chip)
      : PLACES;

    visible.forEach((pl, i) => {
      const pos = new window.kakao.maps.LatLng(pl.lat, pl.lng);
      const pinEl = document.createElement('div');
      pinEl.className = 'qaoh-place-pin' + (i === 0 ? ' top' : '');
      pinEl.textContent = String(i + 1);

      const infowindow = new window.kakao.maps.InfoWindow({
        position: pos,
        content: '<div style="font-family:Pretendard,sans-serif;font-size:13px;font-weight:700;color:#1A1A1A;letter-spacing:-0.01em;padding:8px 10px;">'
          + pl.name
          + '<div style="font-size:11px;color:#5C544A;margin-top:2px;font-weight:400;">'
          + pl.tags + ' · ' + pl.votes.toLocaleString() + '표</div></div>',
        removable: true,
      });

      pinEl.addEventListener('click', () => {
        if (openInfoRef.current) openInfoRef.current.close();
        infowindow.open(map);
        openInfoRef.current = infowindow;
      });

      const overlay = new window.kakao.maps.CustomOverlay({
        position: pos,
        content: pinEl,
        map: map,
        yAnchor: 1.2,
      });
      pinOverlaysRef.current.push(overlay);
    });
  }, [mapReady, chip]);

  // ───── geolocation: start watch on mount, clean up on unmount ─────
  useEffect(() => {
    if (!navigator.geolocation) {
      setGeoStatus('unavailable');
      setUserPos({ lat: SEONGSU_FALLBACK.lat, lng: SEONGSU_FALLBACK.lng });
      return;
    }
    setGeoStatus('locating');
    const id = navigator.geolocation.watchPosition(
      (pos) => {
        const { latitude, longitude, accuracy } = pos.coords;
        setUserPos({ lat: latitude, lng: longitude });
        setAccuracy(accuracy);
        setGeoStatus('live');
      },
      (err) => {
        if (err.code === 1) setGeoStatus('denied');
        else setGeoStatus('unavailable');
        setUserPos({ lat: SEONGSU_FALLBACK.lat, lng: SEONGSU_FALLBACK.lng });
      },
      { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
    );
    watchIdRef.current = id;
    return () => {
      if (watchIdRef.current != null) navigator.geolocation.clearWatch(watchIdRef.current);
    };
  }, []);

  // ───── reflect userPos on the map (marker + accuracy ring + recenter on first fix) ─────
  useEffect(() => {
    const map = mapRef.current;
    if (!map || !userPos || typeof window.kakao === 'undefined' || typeof window.kakao.maps === 'undefined') return;

    const latlng = new window.kakao.maps.LatLng(userPos.lat, userPos.lng);

    if (!userMarkerRef.current) {
      const markerEl = document.createElement('div');
      markerEl.className = 'qaoh-user-marker';
      userMarkerRef.current = new window.kakao.maps.CustomOverlay({
        position: latlng,
        content: markerEl,
        map: map,
        zIndex: 10,
      });
      map.setCenter(latlng);
      map.setLevel(4);
    } else {
      userMarkerRef.current.setPosition(latlng);
    }

    if (accuracy && geoStatus === 'live') {
      if (userCircleRef.current) {
        userCircleRef.current.setMap(null);
        userCircleRef.current = null;
      }
      userCircleRef.current = new window.kakao.maps.Circle({
        map: map,
        center: latlng,
        radius: accuracy,
        strokeWeight: 1,
        strokeColor: '#E8654E',
        strokeOpacity: 0.4,
        fillColor: '#E8654E',
        fillOpacity: 0.1,
      });
    }
  }, [userPos, accuracy, geoStatus]);

  const recenter = () => {
    const map = mapRef.current;
    if (!map || !userPos) return;
    map.setLevel(4);
    map.panTo(new window.kakao.maps.LatLng(userPos.lat, userPos.lng));
  };

  const retryGeo = () => {
    if (!navigator.geolocation) return;
    setGeoStatus('locating');
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        setUserPos({ lat: pos.coords.latitude, lng: pos.coords.longitude });
        setAccuracy(pos.coords.accuracy);
        setGeoStatus('live');
      },
      (err) => {
        if (err.code === 1) setGeoStatus('denied');
        else setGeoStatus('unavailable');
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  };

  // ───── Search ─────
  const openSearch = () => setSearchOpen(true);
  const closeSearch = () => { setSearchOpen(false); setSearchQuery(''); };

  // Autofocus the input shortly after the overlay mounts so the keyboard
  // animation doesn't fight the slide-in.
  useEffect(() => {
    if (!searchOpen) return;
    const t = setTimeout(() => searchInputRef.current && searchInputRef.current.focus(), 80);
    return () => clearTimeout(t);
  }, [searchOpen]);

  // 상품 픽 — polls whose category isn't strictly a venue type (so the
  // "product/topic pick" feel comes through). Restaurants/cafes show up in
  // 가게 instead via PLACES.
  const productPickCategories = new Set(['테크', '편의점', '활동', '캠퍼스', '데이트', '야식']);

  const searchHits = useMemo(() => {
    const q = searchQuery.trim().toLowerCase();
    const match = (s) => !q || (s || '').toLowerCase().includes(q);

    let neighborhoods = NEIGHBORHOODS.filter(n =>
      match(n.name) || match(n.desc) || match(n.tag) || match(n.city)
    );

    let places = PLACES.filter(p =>
      match(p.name) || match(p.tags) || match(p.cat)
    );

    let picks = polls.filter(p => {
      if (!q) return productPickCategories.has(p.cat);
      return match(p.title) || match(p.a) || match(p.b) || match(p.cat) || match(p.loc);
    });

    // When the query is empty, keep the default-state lists tight so the
    // panel reads as curated suggestions rather than a dump.
    if (!q) {
      neighborhoods = neighborhoods.slice(0, 6);
      places = places.slice(0, 4);
      picks  = picks.slice(0, 3);
    }

    return { neighborhoods, places, picks };
  }, [searchQuery, polls]);

  const handlePickNeighborhood = (n) => {
    setSelectedHood(n);
    setChip('내 근처');
    if (mapRef.current) { mapRef.current.setLevel(5); mapRef.current.panTo(new window.kakao.maps.LatLng(n.lat, n.lng)); }
    closeSearch();
  };
  const clearHood = () => setSelectedHood(null);
  const handlePickPlace = (p) => {
    if (mapRef.current) { mapRef.current.setLevel(3); mapRef.current.panTo(new window.kakao.maps.LatLng(p.lat, p.lng)); }
    closeSearch();
  };
  const handlePickPoll = () => {
    closeSearch();
  };

  const totalHits =
    searchHits.neighborhoods.length +
    searchHits.places.length +
    searchHits.picks.length;

  // Compute distances + sort.
  // - When a hood is selected from search: anchor distances to the hood
  //   center and filter PLACES to those within ~3km (the "in this 동네" set).
  // - Otherwise: anchor to live GPS, show every place.
  // Top-3 surface stays primary; the dropdown reveals the full TOP 15.
  const RADIUS_KM = 3;
  const TOP_N = 3;
  const TOP_FULL = 15;
  const rankedAll = useMemo(() => {
    const origin = selectedHood
      ? { lat: selectedHood.lat, lng: selectedHood.lng }
      : userPos;
    let base = origin
      ? PLACES.map(p => ({ ...p, km: haversineKm(origin, { lat: p.lat, lng: p.lng }) }))
      : PLACES.map(p => ({ ...p, km: null }));
    if (selectedHood) {
      base = base.filter(p => p.km != null && p.km <= RADIUS_KM);
    }
    if (CATEGORY_CHIPS.has(chip)) {
      base = base.filter(p => p.cat === chip);
    }
    if (sortMode === '인기 순') {
      base.sort((a, b) => b.votes - a.votes);
    } else {
      base.sort((a, b) => (a.km ?? Infinity) - (b.km ?? Infinity));
    }
    return base.slice(0, TOP_FULL);
  }, [userPos, sortMode, selectedHood, chip]);
  const ranked = useMemo(() => rankedAll.slice(0, TOP_N), [rankedAll]);

  const statusText = (() => {
    if (geoStatus === 'live') {
      const accTxt = accuracy ? ' · ±' + Math.round(accuracy) + 'm' : '';
      return <><span className="live-dot"></span>실시간 위치{accTxt}</>;
    }
    if (geoStatus === 'locating') return <><span className="live-dot off"></span>위치 확인 중…</>;
    if (geoStatus === 'denied')   return <><span className="live-dot err"></span>위치 권한 거부됨 · 성수동 기본값</>;
    if (geoStatus === 'unavailable') return <><span className="live-dot err"></span>위치 사용 불가 · 성수동 기본값</>;
    return <><span className="live-dot off"></span>위치 준비 중…</>;
  })();

  return (
    <>
    <div className="scroll" key="map">
      <div className="page-head with-action">
        <div>
          <h2>카오맵</h2>
          <p>내 주변에서 지금 가장 인기 있는 곳</p>
        </div>
        <button
          className="map-search-btn"
          onClick={openSearch}
          aria-label="검색"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <circle cx="11" cy="11" r="7"/>
            <path d="M21 21l-4.3-4.3"/>
          </svg>
        </button>
      </div>

      <div className="chips">
        {chips.map(c => (

/* ─────────────────  VOTE TAB  ───────────────── */
const VoteTab = ({ polls, onVote, voted, todayVotes = 0, dailyQuota = 16, streakPhase = 'fresh', cooldownRemainingMs = 0 }) => {
  const fmtCooldown = (ms) => {
    const totalMin = Math.max(0, Math.ceil(ms / 60000));
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    if (h <= 0) return `${m}분 후`;
    if (m === 0) return `${h}시간 후`;
    return `${h}시간 ${m}분 후`;
  };
  const idxNode = streakPhase === 'cooldown'
    ? (
      <span className="vote-deck-idx is-cooldown" aria-label={`쿨다운 ${fmtCooldown(cooldownRemainingMs)}`} title="다음 스트릭 가능 시각">
        <IconFire />{fmtCooldown(cooldownRemainingMs)}
      </span>
    )
    : (
      <span className="vote-deck-idx" aria-label={`오늘 ${Math.min(todayVotes, dailyQuota)}개 / ${dailyQuota}개`}>
        <IconFire />{Math.min(todayVotes, dailyQuota)} / {dailyQuota}
      </span>
    );
  const [sort, setSort] = useState('인기순');
  const [cursor, setCursor] = useState(0);
  const [leaveDir, setLeaveDir] = useState('up'); // 'up' = 다음, 'down' = 이전

  // Display starts at 3 and counts 3 → 2 → 1, but the advance is hard-pinned
  // to exactly 2 seconds via a separate setTimeout (decoupled from the ticks).
  const CD_TOTAL_MS = 2000;
  const CD_START    = 3;
  const CD_TICK_MS  = Math.floor(CD_TOTAL_MS / CD_START); // ~666ms

  // 거리순 — 내 위치 기준 가까운 동네 우선
  const DIST_RANK = { '홍대': 1, '신촌': 2, '성수': 3, '이태원': 4, '강남': 5, '서울': 6, '전국': 9 };

  const sorted = useMemo(() => {
    const arr = [...polls];
    if (sort === '인기순') arr.sort((a, b) => b.hot - a.hot);
    if (sort === '거리순') {
      arr.sort((a, b) => {
        const aR = DIST_RANK[a.loc] ?? 99;
        const bR = DIST_RANK[b.loc] ?? 99;
        return aR - bR || b.hot - a.hot;
      });
    }
    return arr.slice(0, 3); // top 3 만
  }, [polls, sort]);

  // Reset cursor when sort changes so order matches.
  useEffect(() => { setCursor(0); }, [sort]);

  const len     = Math.max(1, sorted.length);
  const current = sorted[cursor];
  const next    = sorted[(cursor + 1) % len];
  const prev    = sorted[(cursor - 1 + len) % len];

  // ---------- Swipe state ----------
  const cardRef    = useRef(null);
  const draggingRef = useRef(false);
  const startYRef   = useRef(0);
  const dyRef       = useRef(0);
  const startTRef   = useRef(0);
  const [leaving, setLeaving] = useState(false);
  const lockRef    = useRef(false); // prevents double-advance

  const advance = () => {
    if (lockRef.current) return;
    lockRef.current = true;
    setLeaving(true);
    // wait for CSS transition to finish, then swap card and reset
    setTimeout(() => {
      setCursor(c => (c + 1) % Math.max(1, sorted.length));
      setLeaving(false);
      lockRef.current = false;
    }, 320);
  };

  const setTransform = (dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translateY(${dy}px) rotate(${dy * -0.015}deg)`;
    el.style.opacity   = String(Math.max(0.4, 1 + dy / 600));
  };
  const clearTransform = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = '';
    el.style.opacity   = '';
  };

  const onPointerDown = (e) => {
    if (lockRef.current || leaving) return;
    draggingRef.current = true;
    startYRef.current   = e.touches ? e.touches[0].clientY : e.clientY;
    dyRef.current       = 0;
    startTRef.current   = Date.now();
    if (cardRef.current) cardRef.current.classList.add('dragging');
  };
  const onPointerMove = (e) => {
    if (!draggingRef.current) return;
    const y  = e.touches ? e.touches[0].clientY : e.clientY;
    const dy = y - startYRef.current;
    // only honor upward drag past a few px; allow tiny downward give
    if (dy > 20) return;
    dyRef.current = dy;
    setTransform(dy);
  };
  const onPointerUp = () => {
    if (!draggingRef.current) return;
    draggingRef.current = false;
    if (cardRef.current) cardRef.current.classList.remove('dragging');
    const dy = dyRef.current;
    const dt = Math.max(1, Date.now() - startTRef.current);
    const velocity = -dy / dt; // px per ms upward
    // threshold: 110px upward OR fast flick (> 0.5 px/ms upward)
    if (dy < -110 || velocity > 0.5) {
      advance();
    } else {
      clearTransform();
    }
  };

  // ---------- Auto-advance countdown after vote ----------
  const myVote = current ? voted[current.id] : undefined;
  const [cd, setCd] = useState(null);

  useEffect(() => {
    if (!myVote) { setCd(null); return; }
    setCd(CD_START);
    const tickId = setInterval(() => {
      setCd(prev => (prev == null || prev <= 0) ? prev : prev - 1);
    }, CD_TICK_MS);
    const advanceId = setTimeout(() => {
      clearInterval(tickId);
      setCd(0);
      advance();
    }, CD_TOTAL_MS);
    return () => { clearInterval(tickId); clearTimeout(advanceId); };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [myVote, current && current.id]);

  // ---------- Empty state ----------
  if (!current) {
    return (
      <div className="vote-deck" key="vote-empty">
        <div className="vote-deck-head">
          <h2>카오픽</h2>
          {idxNode}
        </div>
        <div className="vote-empty">
          <div className="num">🐮</div>
          <div>지금 이 위치엔 투표가 없어요</div>
          <button onClick={() => setSort('인기순')}>전체 인기순 보기</button>
        </div>
      </div>
    );
  }

  // ---------- Render ----------
  const total = current.va + current.vb;
  const pctA  = Math.round((current.va / total) * 100);
  const pctB  = 100 - pctA;
  const winA  = pctA >= pctB;
  const optClass = (mine, isThis) => {
    if (!mine) return 'vote-opt';
    return 'vote-opt voted ' + (mine === isThis ? 'win' : 'lose');
  };

  return (
    <div className="vote-deck" key="vote-deck">
      <div className="vote-deck-head">
        <h2>카오픽</h2>
        {idxNode}
      </div>

      <div className="sort-tabs" style={{padding: '0 0 10px'}}>
        {['인기순','최신순','내 근처'].map(s => (
          <button key={s} className={"sort-tab" + (sort === s ? ' active' : '')} onClick={() => setSort(s)}>{s}</button>
        ))}
      </div>

      <div className="vote-stage">
        {next && (
          <article className="vote-card next" aria-hidden="true">

        <article
          key={`front-${current.id}`}
          ref={cardRef}
          className={"vote-card front" + (leaving ? ' leaving' : '')}
          onTouchStart={onPointerDown}
          onTouchMove={onPointerMove}
          onTouchEnd={onPointerUp}
          onTouchCancel={onPointerUp}
          onMouseDown={onPointerDown}
          onMouseMove={(e) => draggingRef.current && onPointerMove(e)}
          onMouseUp={onPointerUp}
          onMouseLeave={() => draggingRef.current && onPointerUp()}
        >
          <div className="vote-meta">
            <span className="pill cream">#{current.cat}</span>
            <span className="fire"><IconFire />{current.hot.toLocaleString()}</span>
          </div>
          <h3 className="vote-question">{current.title}</h3>

            <span>📍 {current.loc}</span>

          </p>

          <div className="vote-opts">
            <button
              className={optClass(myVote, 'a')}
              onClick={() => onVote(current.id, 'a')}
              disabled={!!myVote}
            >
              <div className="opt-fill" style={{ width: myVote ? pctA + '%' : 0 }}></div>
              <span className="opt-name"><span className="opt-emoji" aria-hidden="true">{current.ea}</span>{current.a}</span>
              <span className="opt-pct">{pctA}%</span>
            </button>
            <span className="vote-vs">VS</span>
            <button
              className={optClass(myVote, 'b')}
              onClick={() => onVote(current.id, 'b')}
              disabled={!!myVote}
            >
              <div className="opt-fill" style={{ width: myVote ? pctB + '%' : 0 }}></div>
              <span className="opt-name"><span className="opt-emoji" aria-hidden="true">{current.eb}</span>{current.b}</span>
              <span className="opt-pct">{pctB}%</span>
            </button>
          </div>

          <div className="vote-foot">
            {!myVote ? (
              <>
                <span className="reward">+{current.reward} QAOH POINT</span>
                <span className="swipe-hint">
                  <span className="arrow">↑</span> 위로 스와이프 → 다음
                </span>
              </>
            ) : (
              <>
                <span className="reward">+{current.reward} QAOH POINT 적립</span>
                <NextCountdown value={cd} max={CD_START} />
              </>
            )}
          </div>
        </article>
      </div>
    </div>
  );
};

const NextCountdown = ({ value, max }) => {
  // When the timer has fired (value === null) keep the ring full + label at 0
  // so the user doesn't see the count jump back to `max` during the leave animation.
  const v = value == null ? 0 : value;
  const c = 2 * Math.PI * 7; // r=7
  const progress = value == null ? 0 : v / max;
  const dashoffset = c * (1 - progress);
  return (
    <span className="next-cd">
      <span className="ring">
        <svg width="16" height="16" viewBox="0 0 16 16">
          <circle cx="8" cy="8" r="7" fill="none" strokeWidth="2" className="track"/>
          <circle cx="8" cy="8" r="7" fill="none" strokeWidth="2" strokeLinecap="round"
                  className="fill"
                  strokeDasharray={c}
                  strokeDashoffset={dashoffset}/>
        </svg>
      </span>
      다음 투표 · {v}
    </span>
  );
};

const StoryRail = ({ stories, friendsById, seenIds, onOpenAuthor, onAddMine, myStories }) => {
  const byAuthor = useMemo(() => {
    const m = new Map();
    stories.forEach(s => {
      if (!m.has(s.authorId)) m.set(s.authorId, []);
      m.get(s.authorId).push(s);
    });
    m.forEach(arr => arr.sort((a, b) => a.agoH - b.agoH));
    return m;
  }, [stories]);
  const authors = useMemo(() => {
    const ids = Array.from(byAuthor.keys());
    return ids.map(id => {
      const f = friendsById.get(id);
      const list = byAuthor.get(id);
      const allSeen = list.every(s => seenIds.has(s.id));
      // dominant kind for ring color (mixed if multiple kinds in one author)
      const kinds = new Set(list.map(s => s.kind || 'photo'));
      const kindKey = kinds.size > 1 ? 'mixed' : (list[0].kind || 'photo');
      return { id, friend: f, latest: list[0], allSeen, kindKey };
    }).sort((a, b) => Number(a.allSeen) - Number(b.allSeen) || a.latest.agoH - b.latest.agoH);
  }, [byAuthor, friendsById, seenIds]);

  const myKinds = useMemo(() => {
    if (!myStories.length) return null;
    const set = new Set(myStories.map(s => s.kind || 'photo'));
    return set.size > 1 ? 'mixed' : [...set][0];
  }, [myStories]);

  return (
    <div className="story-rail" role="list">
      <button
        type="button"
        className="story-cell"
        onClick={() => myStories.length ? onOpenAuthor('me') : onAddMine()}
        aria-label={myStories.length ? '내 스토리 보기' : '내 스토리 만들기'}
      >
        <div className={"story-ring " + (myStories.length ? 'kind-' + myKinds : 'add')}>
          <div className="story-av">
            <div className="story-av-mascot" aria-hidden="true" />
          </div>
          {!myStories.length && <span className="story-add-btn" aria-hidden="true">＋</span>}
        </div>
        <span className="story-name muted">{myStories.length ? '내 스토리' : '스토리 만들기'}</span>
      </button>
      {authors.map(a => (
        <button
          key={a.id}
          type="button"
          className="story-cell"
          onClick={() => onOpenAuthor(a.id)}
          aria-label={`${a.friend.nick}님 ${a.kindKey === 'place' ? '장소' : a.kindKey === 'haul' ? '쇼핑' : a.kindKey === 'selfie' ? '한컷' : ''} 스토리 보기`}
        >
          <div className={"story-ring kind-" + a.kindKey + (a.allSeen ? ' seen' : '')}>
            <div className="story-av">
              <div className="story-av-mascot" aria-hidden="true" />
            </div>
          </div>
          <span className="story-name">{a.friend.nick}</span>
        </button>
      ))}
    </div>
  );
};

const STORY_DURATION_MS = 5000;

const StoryViewer = ({ author, friend, stories, onClose, onAdvanceAuthor, onSeen }) => {
  const [idx, setIdx] = useState(0);
  const [progress, setProgress] = useState(0);
  const [closing, setClosing] = useState(false);
  const rafRef = useRef(null);
  const startRef = useRef(0);
  const elapsedRef = useRef(0);
  const pausedRef = useRef(false);
  const videoRef = useRef(null);
  const setPaused = (v) => {
    pausedRef.current = v;
    const v0 = videoRef.current;
    if (v0) { if (v) { v0.pause(); } else { v0.play().catch(() => {}); } }
  };

  useEffect(() => {
    if (closing) return;
    const cur = stories[idx];
    if (cur) onSeen(cur.id);
    // Video-backed stories use the <video> element's own playback time as the progress driver.
    if (cur && cur.video) {
      setProgress(0);
      return () => {}; // no rAF for video stories
    }
    startRef.current = performance.now();
    elapsedRef.current = 0;
    setProgress(0);
    const tick = (t) => {
      if (pausedRef.current) { startRef.current = t - elapsedRef.current; rafRef.current = requestAnimationFrame(tick); return; }
      elapsedRef.current = t - startRef.current;
      const pct = Math.min(100, (elapsedRef.current / STORY_DURATION_MS) * 100);
      setProgress(pct);
      if (pct >= 100) {
        if (idx + 1 < stories.length) {
          setIdx(i => i + 1);
        } else {
          onAdvanceAuthor();
        }
        return;
      }
      rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [idx, stories.length, closing]);

  const handleVideoTime = () => {
    const v0 = videoRef.current;
    if (!v0 || !v0.duration) return;
    setProgress(Math.min(100, (v0.currentTime / v0.duration) * 100));
  };
  const handleVideoEnded = () => {
    if (idx + 1 < stories.length) setIdx(i => i + 1);
    else onAdvanceAuthor();
  };

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape') doClose();
      else if (e.key === 'ArrowRight') goNext();
      else if (e.key === 'ArrowLeft') goPrev();
    };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [idx, stories.length]);

  const doClose = () => { setClosing(true); setTimeout(onClose, 220); };
  const goNext = () => {
    if (idx + 1 < stories.length) setIdx(i => i + 1);
    else onAdvanceAuthor();
  };
  const goPrev = () => {
    if (idx > 0) setIdx(i => i - 1);
    else { setProgress(0); startRef.current = performance.now(); }
  };

  const cur = stories[idx];
  if (!cur) return null;
  const stickerIcon = cur.sticker?.type === 'place' ? '📍'
                    : cur.sticker?.type === 'product' ? '🛍'
                    : cur.sticker?.type === 'mood' ? '✨' : '🐮';

  return (
    <div
      className={"story-viewer" + (closing ? ' fade-out' : '')}
      role="dialog"
      aria-label={`${friend.nick}님 스토리`}
      onPointerDown={() => setPaused(true)}
      onPointerUp={() => setPaused(false)}
      onPointerLeave={() => setPaused(false)}
      onPointerCancel={() => setPaused(false)}
    >
      <div className="story-bg" style={cur.photo
        ? { backgroundImage: `url(${cur.photo})`, backgroundSize: 'cover', backgroundPosition: 'center', backgroundColor: '#000' }
        : cur.video ? { background: '#000' } : { background: cur.bg }}>
        {!cur.photo && !cur.video && <div className="story-bg-noise" />}
        {cur.video && (
          <video
            key={cur.id}
            ref={videoRef}
            className="story-video"
            src={cur.video}
            autoPlay
            playsInline
            muted={false}
            onTimeUpdate={handleVideoTime}
            onEnded={handleVideoEnded}
            onError={handleVideoEnded}
          />
        )}
        {(cur.photo || cur.video) && <div style={{position:'absolute', inset:0, background:'linear-gradient(180deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0) 35%, rgba(0,0,0,0) 60%, rgba(0,0,0,0.45) 100%)'}} />}
      </div>

      <div className="story-bars">
        {stories.map((_, i) => (
          <div key={i} className={"story-bar" + (i < idx ? ' done' : i === idx ? ' active' : '')}>
            <div className="story-bar-fill" style={i === idx ? {width: progress + '%'} : undefined} />
          </div>
        ))}
      </div>

      <div className="story-header">
        <div className="story-header-av">
          <div className="story-av-mascot" aria-hidden="true" />
        </div>
        <div className="story-header-meta">
          <div className="story-header-name">{friend.nick}</div>
          <div className="story-header-time">
            <span>{fmtAgo(cur.agoH)}</span>
            <span className="story-privacy" title="친구만 볼 수 있어요">🔒 친구만</span>
          </div>
        </div>
        <button className="story-close" onClick={(e) => { e.stopPropagation(); doClose(); }} aria-label="닫기"><IconClose size={16} /></button>
      </div>

      <div className="story-content">
        {!cur.photo && !cur.video && <div className="story-emoji" key={cur.id} aria-hidden="true">{cur.emoji}</div>}
        <div className="story-caption" style={(cur.photo || cur.video) ? { position:'absolute', bottom: 110, left: 24, right: 24, maxWidth: 'none', fontSize: 18 } : undefined}>{cur.caption}</div>
      </div>

      {cur.sticker && (
        <div className="story-sticker">
          <div className="story-sticker-card">
            <span className="story-sticker-icon" aria-hidden="true">{stickerIcon}</span>
            <div className="story-sticker-text">
              <span className="story-sticker-label">{cur.sticker.label}</span>
              {cur.sticker.sub && <span className="story-sticker-sub">{cur.sticker.sub}</span>}
            </div>
          </div>
        </div>
      )}

      <div className="story-zones" aria-hidden="true">
        <div className="story-zone left" onClick={(e) => { e.stopPropagation(); goPrev(); }} />
        <div className="story-zone right" onClick={(e) => { e.stopPropagation(); goNext(); }} />
      </div>

      <div className="story-footer" onPointerDown={(e) => e.stopPropagation()}>
        <input className="story-reply" placeholder={`${friend.nick}에게 답장…`} />
        <button className="story-react" aria-label="좋아요">♡</button>
        <button className="story-react" aria-label="공유"><IconShare size={14} /></button>
      </div>
    </div>
  );
};

const CreateStorySheet = ({ open, onClose, onPost }) => {
  const [tpl, setTpl] = useState(STORY_TEMPLATES[0]);
  const [caption, setCaption] = useState('');
  const [colorIdx, setColorIdx] = useState(0);
  const [paletteExpanded, setPaletteExpanded] = useState(false);
  const [photoDataUrl, setPhotoDataUrl] = useState(null);
  const [videoDataUrl, setVideoDataUrl] = useState(null);
  const photoInputRef = useRef(null);
  const videoInputRef = useRef(null);

  useEffect(() => {
    if (open) {
      setTpl(STORY_TEMPLATES[0]);
      setCaption('');
      setColorIdx(0);
      setPaletteExpanded(false);
      setPhotoDataUrl(null);
      setVideoDataUrl(null);
    }
  }, [open]);
  useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [open, onClose]);

  const allColors = useMemo(
    () => paletteExpanded ? [...STORY_COLORS_BASE, ...STORY_COLORS_EXTRA] : STORY_COLORS_BASE,
    [paletteExpanded]
  );
  const finalCaption = caption.trim() || tpl.defaultCaption;
  const hasPhoto = !!photoDataUrl;
  const hasVideo = !!videoDataUrl;
  const hasMedia = hasPhoto || hasVideo;

  const handlePhotoFile = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => { setPhotoDataUrl(ev.target.result); setVideoDataUrl(null); };
    reader.readAsDataURL(file);
    e.target.value = '';
  };
  const handleVideoFile = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    if (file.size > 40 * 1024 * 1024) {
      alert('동영상은 40MB 이하만 업로드할 수 있어요.');
      e.target.value = '';
      return;
    }
    const reader = new FileReader();
    reader.onload = (ev) => { setVideoDataUrl(ev.target.result); setPhotoDataUrl(null); };
    reader.readAsDataURL(file);
    e.target.value = '';
  };

  const submit = () => {
    onPost({
      id: 's-me-' + Date.now(),
      authorId: 'me',
      agoH: 0,
      kind: hasVideo ? 'video' : (hasPhoto ? 'photo' : tpl.id),
      bg: allColors[colorIdx]?.css || STORY_COLORS_BASE[0].css,
      photo: photoDataUrl,
      video: videoDataUrl,
      emoji: tpl.defaultEmoji,
      caption: finalCaption,
      sticker: tpl.id === 'selfie' ? { type:'mood', label:'친구만 볼 수 있어요' } : null,
    });
    onClose();
  };

  const previewBg = allColors[colorIdx]?.css || STORY_COLORS_BASE[0].css;

  return (
    <>
      <div className={"create-story-backdrop" + (open ? ' open' : '')} onClick={onClose} aria-hidden={!open} />
      <div className={"create-story-sheet" + (open ? ' open' : '')} role="dialog" aria-modal="true" aria-label="스토리 만들기" aria-hidden={!open}>
        <div className="create-story-handle" />

        <div className="create-story-header">
          <div>
            <div className="create-story-title">스토리 만들기 ✨</div>
            <div className="create-story-sub">🔒 친구만 · 24시간 뒤 사라져요</div>
          </div>
          <button className="create-story-close" onClick={onClose} aria-label="닫기"><IconClose size={14} /></button>
        </div>

        <div className="create-preview" style={{background: previewBg}}>
          {hasPhoto && <div className="create-preview-photo" style={{backgroundImage: `url(${photoDataUrl})`}} />}
          {hasVideo && (
            <video className="create-preview-video" src={videoDataUrl} autoPlay muted loop playsInline />
          )}
          {!hasMedia && <div className="story-bg-noise" />}
          <span className="create-preview-badge">{hasVideo ? '🎬 동영상' : (hasPhoto ? '📷 사진' : `${tpl.em} ${tpl.nm}`)}</span>
          {hasMedia && (
            <button className="create-preview-remove" onClick={() => { setPhotoDataUrl(null); setVideoDataUrl(null); }} aria-label="미디어 제거"><IconClose size={12} /></button>
          )}
          <div className="create-preview-content">
            <span className="create-preview-emoji">{tpl.defaultEmoji}</span>
            <span className="create-preview-caption">{finalCaption}</span>
          </div>
        </div>

        <div className="create-section-lbl">템플릿</div>
        <div className="create-templates">
          {STORY_TEMPLATES.map(t => (
            <button
              key={t.id}
              type="button"
              className={"create-template" + (tpl.id === t.id ? ' active' : '')}
              onClick={() => setTpl(t)}
              aria-pressed={tpl.id === t.id}
            >
              <span className="create-template-em">{t.em}</span>
              <span className="create-template-nm">{t.nm}</span>
            </button>
          ))}
        </div>

        <input
          className="create-input"
          placeholder={tpl.placeholder}
          value={caption}
          maxLength={48}
          onChange={(e) => setCaption(e.target.value)}
        />

        <div className="create-section-lbl">미디어 · 배경 색</div>
        <div className="create-tools-row">
          <input
            ref={photoInputRef}
            type="file"
            accept="image/*"
            style={{display:'none'}}
            onChange={handlePhotoFile}
          />
          <input
            ref={videoInputRef}
            type="file"
            accept="video/*"
            style={{display:'none'}}
            onChange={handleVideoFile}
          />
          <button
            type="button"
            className={"create-photo-btn" + (hasPhoto ? ' has-photo' : '')}
            onClick={() => photoInputRef.current?.click()}
            aria-label="사진 첨부"
          >
            <span className="ph-em">{hasPhoto ? '✓' : '📷'}</span>
            <span className="ph-lbl">사진</span>
          </button>
          <button
            type="button"
            className={"create-photo-btn create-video-btn" + (hasVideo ? ' has-photo' : '')}
            onClick={() => videoInputRef.current?.click()}
            aria-label="동영상 첨부"
          >
            <span className="ph-em">{hasVideo ? '✓' : '🎬'}</span>
            <span className="ph-lbl">동영상</span>
          </button>

          <div className="create-colors-wrap" role="radiogroup" aria-label="배경 색상">
            {allColors.map((c, i) => (
              <button
                key={c.id}
                type="button"
                className={"create-color" + (colorIdx === i ? ' active' : '')}
                style={{background: c.css}}
                onClick={() => setColorIdx(i)}
                aria-label={`색상 ${i + 1}`}
                aria-pressed={colorIdx === i}
              />
            ))}
            <button
              type="button"
              className={"create-color-add" + (paletteExpanded ? ' expanded' : '')}
              onClick={() => setPaletteExpanded(p => !p)}
              aria-label={paletteExpanded ? '색상 줄이기' : '색상 더보기'}
              aria-expanded={paletteExpanded}
            >＋</button>
          </div>
        </div>

        <div className="create-actions">
          <button className="btn ghost" onClick={onClose}>취소</button>
          <button className="btn full-ink" onClick={submit}>친구에게 공유</button>
        </div>
      </div>
    </>
  );
};

const RequestsModal = ({
  open, onClose, defaultTab,
  incomingIds, onAccept, onDecline,
  followingSet, followersSet, onToggleFollow, sentSet, onSendRequest,
}) => {

      return () => clearTimeout(t);

                  <div className="info">

const ActivityModal = ({ open, onClose }) => {

  useEffect(() => {

  }, [open]);

  }, []);
  const hiddenCount = ACTIVITY.length - visibleActivity.length;

    return visibleActivity.filter(a =>
      a.who.toLowerCase().includes(q) ||
      a.pollTitle.toLowerCase().includes(q) ||
      a.choice.toLowerCase().includes(q)
    );

  if (!open) return null;

  return (
    <div
      className="req-modal-back"

                <button
                  className="friend-search-clear"

const FollowListModal = ({
  open, onClose, defaultTab = 'following',
  followingSet, followersSet,
  onToggleFollow, onOpenProfile,
}) => {
  const [tab, setTab] = useState(defaultTab);
  const [query, setQuery] = useState('');

  useEffect(() => { if (open) setTab(defaultTab); }, [open, defaultTab]);
  useEffect(() => { if (!open) setQuery(''); }, [open]);

  useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [open, onClose]);

  const normalizedQuery = query.trim().replace(/^@+/, '').toLowerCase();
  const list = useMemo(() => {
    const baseIds = tab === 'following' ? [...followingSet] : [...followersSet];
    const users = baseIds.map(id => USERS_BY_ID.get(id)).filter(Boolean);
    users.sort((a, b) => a.nick.localeCompare(b.nick, 'ko'));
    if (!normalizedQuery) return users;
    return users.filter(u =>
      u.nick.toLowerCase().includes(normalizedQuery) ||
      u.handle.toLowerCase().includes('@' + normalizedQuery) ||
      u.handle.toLowerCase().replace(/^@/, '').includes(normalizedQuery)
    );
  }, [tab, followingSet, followersSet, normalizedQuery]);

  const followingCount = followingSet.size;
  const followersCount = followersSet.size;

  if (!open) return null;

  return (
    <div
      className="req-modal-back"
      onClick={e => { if (e.target === e.currentTarget) onClose(); }}
      role="dialog"
      aria-modal="true"
      aria-label="팔로잉 · 팔로워"
    >
      <div className="req-modal" onClick={e => e.stopPropagation()}>
        <div className="handle-bar" aria-hidden="true" />
        <div className="head">
          <h3>{tab === 'following' ? '팔로잉' : '팔로워'}</h3>
          <button className="close" onClick={onClose} aria-label="닫기"><IconClose size={14} /></button>
        </div>
        <div className="follow-list-tabs" role="tablist" aria-label="팔로잉 / 팔로워">
          <button
            type="button"
            role="tab"
            aria-selected={tab === 'following'}
            className={'fl-tab ' + (tab === 'following' ? 'active' : '')}
            onClick={() => setTab('following')}
          >
            <span className="n">{followingCount}</span>
            <span className="lab">팔로잉</span>
          </button>
          <button
            type="button"
            role="tab"
            aria-selected={tab === 'followers'}
            className={'fl-tab ' + (tab === 'followers' ? 'active' : '')}
            onClick={() => setTab('followers')}
          >
            <span className="n">{followersCount}</span>
            <span className="lab">팔로워</span>
          </button>
        </div>
        <div className="body fl-body">
          <div className="activity-search-row">
            <div className="friend-search-wrap">
              <IconSearch size={16} />
              <input
                className="friend-search-input"
                type="text"
                value={query}
                onChange={e => setQuery(e.target.value)}
                placeholder={tab === 'following' ? '팔로잉 검색 · @qaoh_id' : '팔로워 검색 · @qaoh_id'}
                autoComplete="off"
                spellCheck={false}
              />
              {query && (
                <button
                  className="friend-search-clear"
                  onClick={() => setQuery('')}
                  aria-label="검색어 지우기"
                >
                  <IconClose size={10} />
                </button>
              )}
            </div>
          </div>
          <div className="fl-list" role="list">
            {list.length === 0 ? (
              query ? (
                <div className="activity-empty">
                  <div className="activity-empty-em" aria-hidden="true">🔍</div>
                  <div className="activity-empty-t"><b>"{query}"</b> 검색 결과가 없어요</div>
                  <div className="activity-empty-s">닉네임 또는 @아이디 일부만 입력해도 찾아져요</div>
                </div>
              ) : (
                <div className="activity-empty">
                  <div className="activity-empty-em" aria-hidden="true">✦</div>
                  <div className="activity-empty-t">
                    {tab === 'following' ? '아직 팔로우 중인 친구가 없어요' : '아직 팔로워가 없어요'}
                  </div>
                  <div className="activity-empty-s">
                    {tab === 'following' ? '친구 늘리기에서 새 친구를 찾아보세요' : '카오 활동이 쌓이면 팔로워가 늘어나요'}
                  </div>
                </div>
              )
            ) : (
              list.map(u => {
                const iFollow = followingSet.has(u.id);
                const followsMe = followersSet.has(u.id);
                const isMutual = iFollow && followsMe;
                const meta = FRIEND_PROFILE_BY_NICK.get(u.nick);
                return (
                  <button
                    key={u.id}
                    type="button"
                    className="fl-row"
                    role="listitem"
                    onClick={() => onOpenProfile(u)}
                  >
                    <div className="fl-av" style={{background: u.color}} aria-hidden="true">{u.nick[0]}</div>
                    <div className="fl-id">
                      <div className="fl-nick">
                        {u.nick}
                        {isMutual && <span className="mutual">맞팔</span>}
                      </div>
                      <div className="fl-handle">{u.handle}</div>
                      {meta && (
                        <div className="fl-meta">
                          <span className="fl-mbti">{meta.mbti}</span>
                          <span className="fl-sep" aria-hidden="true">·</span>
                          <span>🔥 {FRIEND_STREAK_BY_NICK.get(u.nick) || 0}</span>

                            <span className="fl-rel following" aria-label="내가 팔로잉 중">✓ 팔로잉 중</span>
                          )}
                          {!iFollow && followsMe && (
                            <span className="fl-rel follower" aria-label="이 친구가 나를 팔로우 중">팔로우 중</span>
                          )}

                      )}

                    <button
                      type="button"
                      className={'follow-btn ' + (iFollow ? 'is-following' : '')}
                      onClick={e => { e.stopPropagation(); onToggleFollow(u.id); }}
                      aria-pressed={iFollow}
                      aria-label={iFollow ? `${u.nick} 언팔로우` : `${u.nick} 팔로우`}
                    >
                      {iFollow ? '팔로잉' : (followsMe ? '맞팔하기' : '팔로우')}
                    </button>
                  </button>
                );
              })
            )}
          </div>
        </div>
      </div>
    </div>
  );
};
