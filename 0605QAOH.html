    align-items: baseline;
    gap: 2px;
    color: var(--black);
    font-variant-numeric: tabular-nums;
  }
  .peek-total b {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: -0.03em;
  }
  .peek-total span {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    margin-left: 2px;
  }

  /* Gender stack bar */
  .peek-gender-bar {
    display: flex;
    height: 26px;
    border-radius: 999px;
    overflow: hidden;
    background: color-mix(in oklab, var(--black) 6%, var(--bg));
    border: 1px solid color-mix(in oklab, var(--black) 6%, transparent);
  }
  .peek-gender-male,
  .peek-gender-female {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: width 0.4s cubic-bezier(.22,1,.36,1);
    min-width: 0;
  }
  .peek-gender-male {
    background: linear-gradient(135deg,
      color-mix(in oklab, var(--accent) 38%, var(--black)),
      color-mix(in oklab, var(--accent) 56%, var(--black)));
    color: var(--bg);
  }
  .peek-gender-female {
    background: linear-gradient(135deg,
      color-mix(in oklab, var(--beige, #F2E8D5) 70%, var(--white)),
      var(--beige, #F2E8D5));
    color: var(--black);
  }
  .peek-gender-emoji {
    font-size: 13px;
    line-height: 1;
    filter: drop-shadow(0 1px 1px rgba(0,0,0,0.18));
  }

  /* Choice × gender cross-tab */
  .peek-cross {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .peek-cross-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 9px 12px;
    background: color-mix(in oklab, var(--black) 3%, var(--bg));
    border-radius: 11px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: -0.015em;
  }
  .peek-cross-key {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    color: var(--muted);
  }
  .peek-cross-dot {
    width: 8px;
    height: 8px;
    border-radius: 999px;
    display: inline-block;
  }
  .peek-cross-dot.male {
    background: color-mix(in oklab, var(--accent) 56%, var(--black));
  }
  .peek-cross-dot.female {
    background: var(--beige, #F2E8D5);
    border: 1px solid color-mix(in oklab, var(--black) 14%, transparent);
  }
  .peek-cross-val {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--black);
    font-variant-numeric: tabular-nums;
  }
  .peek-cross-val b {
    font-weight: 900;
    font-size: 13px;
    margin-left: 2px;
    color: var(--accent);
  }
  .peek-cross-val .opt-emoji {
    font-size: 13px;
    line-height: 1;
  }

  /* Age bars */
  .peek-age-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .peek-age-row {
    display: grid;
    grid-template-columns: 48px 1fr 36px;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .peek-age-label {
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .peek-age-track {
    position: relative;
    height: 10px;
    background: color-mix(in oklab, var(--black) 5%, var(--bg));
    border-radius: 999px;
    overflow: hidden;
  }
  .peek-age-fill {
    position: absolute;
    inset: 0 auto 0 0;
    border-radius: 999px;
    background: linear-gradient(90deg,
      color-mix(in oklab, var(--accent) 28%, var(--black)),
      color-mix(in oklab, var(--accent) 55%, var(--black)));
    transition: width 0.55s cubic-bezier(.22,1,.36,1);
  }
  .peek-age-row.top .peek-age-fill {
    background: linear-gradient(90deg,
      color-mix(in oklab, var(--accent) 55%, var(--black)),
      var(--accent));
  }
  .peek-age-row.top .peek-age-label {
    color: var(--black);
    font-weight: 900;
  }
  .peek-age-row.top .peek-age-pct {
    color: var(--accent);
    font-weight: 900;
  }
  .peek-age-pct {
    color: var(--black);
    font-variant-numeric: tabular-nums;
    text-align: right;
  }
  .peek-hint {
    margin-top: 12px;
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: -0.01em;
  }
  @media (prefers-reduced-motion: reduce) {
    .peek-toggle,
    .peek-panel,
    .peek-toggle-chev,
    .peek-gender-male,
    .peek-gender-female,
    .peek-age-fill {
      transition: none;
    }
  }

  /* SPLASH SCREEN */
  .splash {
    position: absolute;
    inset: 0;
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    background: var(--bg);
    opacity: 1;
    transition: opacity 0.45s ease;
    pointer-events: auto;
  }
  .splash.hide {
    opacity: 0;
    pointer-events: none;
  }
  .splash-mark {
    width: 132px;
    height: 132px;
    border-radius: 28px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: splashPop 0.7s cubic-bezier(0.34, 1.4, 0.6, 1) both;
  }
  .splash-mark img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    transform: scale(2.25);
    transform-origin: center 52%;
    display: block;
  }
  .splash-name {
    font-size: 34px;
    font-weight: 800;
    letter-spacing: 0.04em;
    color: var(--ink);
    animation: splashFadeUp 0.55s cubic-bezier(0.2, 0.7, 0.3, 1) 0.7s both;
  }
  @keyframes splashPop {
    0%   { transform: scale(0.7); opacity: 0; }
    60%  { transform: scale(1.05); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes splashFadeUp {
    0%   { transform: translateY(8px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }
  @media (prefers-reduced-motion: reduce) {
    .splash-mark, .splash-name { animation: none; }
  }
  .splash-mascot-wrap {
    position: relative;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: splashMascotPop 0.65s cubic-bezier(0.34, 1.6, 0.5, 1) 0.15s both;
  }
  .splash-mascot {
    width: 200px;
    height: auto;
    display: block;
    animation: splashMascotFloat 3.2s ease-in-out 0.9s infinite;
    transform-origin: center bottom;
  }
  @keyframes splashMascotPop {
    0%   { transform: scale(0.3) translateY(28px); opacity: 0; }
    55%  { transform: scale(1.08) translateY(-6px); opacity: 1; }
    78%  { transform: scale(0.96) translateY(2px); }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }
  @keyframes splashMascotFloat {
    0%, 100% { transform: translateY(0) rotate(-1.5deg); }
    50%      { transform: translateY(-5px) rotate(1.5deg); }
  }
  @media (prefers-reduced-motion: reduce) {
    .splash-mascot-wrap, .splash-mascot { animation: none; }
  }

  /* UNLOCK CELEBRATION (signup → 카오필 transition) */
  .unlock-celeb {
    position: absolute;
    inset: 0;
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    background: linear-gradient(160deg, #0A0A0A 0%, #1A1A1A 100%);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    opacity: 0;
    animation: unlockBackdropIn 0.35s ease forwards;
    pointer-events: auto;
  }
  .unlock-celeb.is-leaving {
    animation: unlockBackdropOut 0.55s ease forwards;
  }
  .unlock-stage {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .unlock-card {
    position: relative;
    width: 300px;
    padding: 32px 28px 28px;
    border-radius: 32px;
    background: linear-gradient(165deg, #FBF6EC 0%, #F4EBD7 100%);
    box-shadow:
      0 30px 60px -20px rgba(0,0,0,0.55),
      0 14px 28px -10px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,255,255,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    animation: unlockCardIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both,
               unlockCardFloat 4.8s ease-in-out 0.9s infinite;
    transform-origin: center bottom;
  }
  .unlock-card::before {
    content: "";
    position: absolute;
    inset: -40%;
    background:
      radial-gradient(circle at 30% 20%, rgba(217,119,87,0.18) 0%, transparent 45%),
      radial-gradient(circle at 75% 85%, rgba(180,140,80,0.14) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  .unlock-card::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: -18px;
    transform: translateX(-50%);
    width: 78%;
    height: 22px;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.32) 0%, transparent 70%);
    filter: blur(4px);
    pointer-events: none;
    z-index: -1;
  }
  .unlock-wave {
    width: 240px;
    height: 280px;
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: unlockWaveIn 0.75s cubic-bezier(0.34, 1.56, 0.64, 1) 0.12s both;
  }
  .unlock-mascot {
    width: 220px;
    height: auto;
    display: block;
    image-rendering: auto;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    will-change: transform;
    filter: drop-shadow(0 8px 18px rgba(0,0,0,0.18));
  }
  .unlock-message {
    margin-top: 10px;
    color: #FFFFFF;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.01em;
    text-align: center;
    text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    opacity: 0;
    animation: unlockMessageIn 0.55s cubic-bezier(0.2, 0.7, 0.3, 1) 1.6s both;
  }
  .unlock-message em {
    color: var(--accent, #D97757);
    font-style: normal;
    margin-right: 6px;
  }
  @keyframes unlockBackdropIn {
    0%   { opacity: 0; }
    100% { opacity: 1; }
  }
  @keyframes unlockBackdropOut {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes unlockWaveIn {
    0%   { transform: translateY(20px) scale(0.85); opacity: 0; }
    60%  { transform: translateY(-4px) scale(1.04); opacity: 1; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }
  @keyframes unlockCardIn {
    0%   { transform: translateY(36px) scale(0.6); opacity: 0; }
    60%  { transform: translateY(-6px) scale(1.04); opacity: 1; }
    78%  { transform: translateY(3px) scale(0.98); }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }
  @keyframes unlockCardFloat {
    0%, 100% { transform: translateY(0) rotate(-0.6deg); }
    50%      { transform: translateY(-8px) rotate(0.6deg); }
  }
  @keyframes unlockHandWave {
    0%, 100% { transform: rotate(-14deg); }
    25%      { transform: rotate(18deg); }
    50%      { transform: rotate(-10deg); }
    75%      { transform: rotate(18deg); }
  }
  @keyframes unlockMessageIn {
    0%   { transform: translateY(10px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }

  /* SIGNUP FADE-OUT (when transitioning to 카오필) */
  .signup-screen.is-closing {
    animation: signupFadeOut 0.55s cubic-bezier(0.2, 0.7, 0.3, 1) forwards;
    pointer-events: none;
  }
  @keyframes signupFadeOut {
    0%   { opacity: 1; transform: scale(1) translateY(0); }
    100% { opacity: 0; transform: scale(0.97) translateY(-8px); }
  }

  /* PROFILE FADE-IN (when arriving from signup unlock) */
  .scroll.profile-fade-in {
    animation: profileFadeIn 0.5s cubic-bezier(0.2, 0.7, 0.3, 1) both;
  }
  @keyframes profileFadeIn {
    0%   { opacity: 0; transform: translateY(6px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .unlock-celeb,
    .unlock-celeb.is-leaving,
    .unlock-card,
    .unlock-wave,
    .unlock-mascot,
    .unlock-message,
    .signup-screen.is-closing,
    .scroll.profile-fade-in {
      animation: none;
    }
    .unlock-celeb { opacity: 1; }
    .unlock-message { opacity: 1; }
  }

  /* STREAK-UP CELEBRATION (fires when daily quota hit; stays until tap) */
  .streak-up {
    position: absolute;
    inset: 0;
    z-index: 150;
    pointer-events: auto;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(26, 26, 26, 0.42);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    opacity: 0;
    animation: streakUpFadeIn 0.42s ease forwards;
    overflow: hidden;
  }
  .streak-up.dismissing { animation: streakUpFadeOut 0.35s ease forwards; }
  @keyframes streakUpFadeIn  { 0% { opacity: 0; } 100% { opacity: 1; } }
  @keyframes streakUpFadeOut { 0% { opacity: 1; } 100% { opacity: 0; } }
  .streak-up-hint {
    position: absolute;
    bottom: 96px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--bg);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    opacity: 0;
    animation: streakHintIn 0.6s ease 1.6s forwards;
    pointer-events: none;
  }
  @keyframes streakHintIn { 0% { opacity: 0; transform: translate(-50%, 4px); } 100% { opacity: 0.55; transform: translate(-50%, 0); } }
  .streak-up-core {
    position: relative;
    width: 220px;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }
  .streak-up-flame {
    position: absolute;
    top: -8px;
    left: 50%;
    font-size: 44px;
    line-height: 1;
    transform: translateX(-50%) scale(0.7);
    filter: drop-shadow(0 0 0 transparent);
    animation: streakUpFlame 3s cubic-bezier(0.34, 1.2, 0.5, 1) forwards;
    z-index: 2;
  }
  @keyframes streakUpFlame {
    0%   { transform: translateX(-50%) scale(0.6); filter: drop-shadow(0 0 0 transparent); }
    14%  { transform: translateX(-50%) scale(1);   filter: drop-shadow(0 0 6px color-mix(in srgb, var(--accent) 45%, transparent)); }
    42%  { transform: translateX(-50%) scale(1.35); filter: drop-shadow(0 0 14px color-mix(in srgb, var(--accent) 65%, transparent)); }
    62%  { transform: translateX(-50%) scale(1.75) translateY(-4px); filter: drop-shadow(0 0 26px color-mix(in srgb, var(--accent) 85%, transparent)); }
    82%  { transform: translateX(-50%) scale(2.0) translateY(-6px); filter: drop-shadow(0 0 36px color-mix(in srgb, var(--accent) 95%, transparent)); }
    100% { transform: translateX(-50%) scale(2.0) translateY(-6px); filter: drop-shadow(0 0 40px color-mix(in srgb, var(--accent) 95%, transparent)); }
  }
  .streak-up-num {
    position: relative;
    width: 200px;
    height: 150px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.04em;
  }
  .streak-up-num .digit {
    position: absolute;
    top: 50%;
    left: 50%;
    font-size: 124px;
    font-weight: 900;
    color: var(--bg);
    text-shadow: 0 10px 30px rgba(0,0,0,0.5);
    line-height: 1;
    transform: translate(-50%, -50%);
  }
  .streak-up-num .digit.from {
    animation: streakDigitOut 3s ease forwards;
  }
  .streak-up-num .digit.to {
    opacity: 0;
    animation: streakDigitIn 3s cubic-bezier(0.34, 1.55, 0.55, 1) forwards;
  }
  @keyframes streakDigitOut {
    0%   { transform: translate(-50%, -50%) scale(1);     opacity: 1; }
    40%  { transform: translate(-50%, -50%) scale(1);     opacity: 1; }
    55%  { transform: translate(-50%, -160%) scale(0.65); opacity: 0; }
    100% { transform: translate(-50%, -160%) scale(0.65); opacity: 0; }
  }
  @keyframes streakDigitIn {
    0%   { transform: translate(-50%, 60%) scale(0.65);   opacity: 0; }
    48%  { transform: translate(-50%, 60%) scale(0.65);   opacity: 0; }
    62%  { transform: translate(-50%, -50%) scale(1.18);  opacity: 1; }
    76%  { transform: translate(-50%, -50%) scale(0.96);  opacity: 1; }
    88%  { transform: translate(-50%, -50%) scale(1.02);  opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1);     opacity: 1; }
  }
  .streak-up-label {
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--bg);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
    opacity: 0;
    animation: streakLabelIn 3s ease forwards;
  }
  @keyframes streakLabelIn {
    0%   { opacity: 0; transform: translate(-50%, 6px); }
    22%  { opacity: 0.92; transform: translate(-50%, 0); }
    100% { opacity: 0.92; transform: translate(-50%, 0); }
  }
  .streak-up-cow {
    position: absolute;
    left: -220px;
    top: 52%;
    z-index: 3;
    transform: translateY(-50%);
    animation: streakCowTrip 4s cubic-bezier(0.4, 0.04, 0.4, 1) forwards;
    filter:
      drop-shadow(0 14px 18px rgba(0,0,0,0.30))
      drop-shadow(0 4px 6px rgba(0,0,0,0.18));
    pointer-events: none;
  }
  .streak-up-cow svg { display: block; }
  .streak-up-cow .head {
    transform-box: fill-box;
    transform-origin: 50% 100%;
  }
  .streak-up-cow .head.side {
    animation:
      cowHeadLook 4s ease-in-out forwards,
      cowHeadSideOpacity 4s ease-in-out forwards;
  }
  .streak-up-cow .head.front {
    transform-box: fill-box;
    transform-origin: 50% 90%;
    opacity: 0;
    animation:
      cowHeadFrontOpacity 4s ease-in-out forwards,
      cowHeadFrontNod 4s ease-in-out forwards;
  }
  .streak-up-cow .leg {
    transform-box: fill-box;
    transform-origin: 50% 6%;
    animation: cowLegWalk 4s linear forwards;
  }
  .streak-up-cow .leg.lh2,
  .streak-up-cow .leg.lf2 { animation-name: cowLegWalkAlt; animation-delay: 0s; }
  .streak-up-cow .tail {
    transform-box: fill-box;
    transform-origin: 100% 0%;
    animation: cowTailSwing 4s ease-in-out forwards;
  }
  .streak-up-cow .ground-shadow {
    transform-box: fill-box;
    transform-origin: 50% 50%;
    animation: cowGroundShadow 4s ease-in-out forwards;
  }
  .streak-up-cow .ear-l { transform-box: fill-box; transform-origin: 50% 100%; animation: cowEarFlickL 1.8s ease-in-out infinite; }
  .streak-up-cow .ear-r { transform-box: fill-box; transform-origin: 50% 100%; animation: cowEarFlickR 1.8s ease-in-out infinite; }
  /* 4s sequenced walk: 0-25% walk in → 25-30% turn head to camera → 30-70% pause facing viewer → 70-75% turn head back → 75-100% walk out.
     Phone 390px wide; SVG 200px wide rendering viewBox 220 (scale 0.909). Head center viewBox x≈183 → 166px from SVG left edge; tail tip viewBox x≈22 → ~20px.
     Park HEAD at phone center (x=195): left = 195 − 166 = 29px.
     Fully exit right: SVG.left + 20 > 390, so finish at left=400 (tail tip lands at x=420). Entrance start mirrors that Δ (371px) so the walk speed is identical in and out. */
  @keyframes streakCowTrip {
    0%   { left: -342px; }
    25%  { left: 29px; }
    75%  { left: 29px; }
    100% { left: 400px; }
  }
  @keyframes cowLegWalk {
    0%   { transform: rotate(-16deg); }
    5%   { transform: rotate(16deg); }
    12%  { transform: rotate(-16deg); }
    19%  { transform: rotate(8deg); }
    25%  { transform: rotate(0deg); }
    75%  { transform: rotate(0deg); }
    81%  { transform: rotate(-16deg); }
    88%  { transform: rotate(16deg); }
    95%  { transform: rotate(-16deg); }
    100% { transform: rotate(8deg); }
  }
  @keyframes cowLegWalkAlt {
    0%   { transform: rotate(16deg); }
    5%   { transform: rotate(-16deg); }
    12%  { transform: rotate(16deg); }
    19%  { transform: rotate(-8deg); }
    25%  { transform: rotate(0deg); }
    75%  { transform: rotate(0deg); }
    81%  { transform: rotate(16deg); }
    88%  { transform: rotate(-16deg); }
    95%  { transform: rotate(16deg); }
    100% { transform: rotate(-8deg); }
  }
  @keyframes cowTailSwing {
    0%   { transform: rotate(-10deg); }
    8%   { transform: rotate(22deg); }
    16%  { transform: rotate(-10deg); }
    25%  { transform: rotate(4deg); }
    40%  { transform: rotate(-5deg); }
    55%  { transform: rotate(5deg); }
    70%  { transform: rotate(-2deg); }
    75%  { transform: rotate(2deg); }
    83%  { transform: rotate(22deg); }
    91%  { transform: rotate(-10deg); }
    100% { transform: rotate(18deg); }
  }
  /* side head bob while walking; settles centered just before the head turn */
  @keyframes cowHeadLook {
    0%   { transform: translateY(0)    rotate(-1.5deg); }
    5%   { transform: translateY(-2px) rotate(2deg); }
    12%  { transform: translateY(0)    rotate(-1.5deg); }
    19%  { transform: translateY(-2px) rotate(2deg); }
    25%  { transform: translateY(-1px) rotate(0deg); }
    75%  { transform: translateY(-1px) rotate(0deg); }
    81%  { transform: translateY(-2px) rotate(2deg); }
    88%  { transform: translateY(0)    rotate(-1.5deg); }
    95%  { transform: translateY(-2px) rotate(2deg); }
    100% { transform: translateY(0)    rotate(-1deg); }
  }
  /* side head crossfades out 25-30%, stays hidden through pause, fades back in 70-75% */
  @keyframes cowHeadSideOpacity {
    0%, 25%   { opacity: 1; }
    30%, 70%  { opacity: 0; }
    75%, 100% { opacity: 1; }
  }
  /* front head: hidden during walk, visible during pause */
  @keyframes cowHeadFrontOpacity {
    0%, 25%   { opacity: 0; }
    30%, 70%  { opacity: 1; }
    75%, 100% { opacity: 0; }
  }
  /* front head: tiny nod + scale pop as it "appears" facing the user */
  @keyframes cowHeadFrontNod {
    0%, 25%  { transform: scale(0.94) translateY(2px); }
    32%      { transform: scale(1.06) translateY(-2px); }
    40%      { transform: scale(1)    translateY(0); }
    55%      { transform: scale(1.02) translateY(-1px); }
    70%      { transform: scale(1)    translateY(0); }
    75%, 100% { transform: scale(0.94) translateY(2px); }
  }
  /* ground shadow: scales subtly with cow's screen presence; deeper during the pause */
  @keyframes cowGroundShadow {
    0%   { transform: scaleX(0.6); opacity: 0.08; }
    25%  { transform: scaleX(1);   opacity: 0.22; }
    50%  { transform: scaleX(1.06); opacity: 0.28; }
    75%  { transform: scaleX(1);   opacity: 0.22; }
    100% { transform: scaleX(0.6); opacity: 0.08; }
  }
  @keyframes cowEarFlickL {
    0%, 80%, 100% { transform: rotate(0deg); }
    88%           { transform: rotate(-12deg); }
    94%           { transform: rotate(6deg); }
  }
  @keyframes cowEarFlickR {
    0%, 60%, 100% { transform: rotate(0deg); }
    68%           { transform: rotate(10deg); }
    74%           { transform: rotate(-4deg); }
  }
  @media (prefers-reduced-motion: reduce) {
    .streak-up-cow, .streak-up-cow .head, .streak-up-cow .leg, .streak-up-cow .tail,
    .streak-up-cow .ground-shadow,
    .streak-up-cow .ear-l, .streak-up-cow .ear-r,
    .streak-up-flame, .streak-up-num .digit, .streak-up-label {
      animation: none;
    }
    .streak-up-cow { left: 50%; transform: translate(-50%, -50%); }
    .streak-up-num .digit.from { opacity: 0; }
    .streak-up-num .digit.to { opacity: 1; }
    .streak-up-label { opacity: 0.9; }
  }

/* ─────────────────  KAOROAD — entry, list, viewer  ───────────────── */
/* Entry pill on FriendsTab (right below the story rail). */

}

.kaoroad-entry:active { transform: scale(0.99); }
.kaoroad-entry-icon { width: 46px; height: 46px; border-radius: 14px; background: var(--surface); display: grid; place-items: center; font-size: 22px; box-shadow: inset 0 0 0 1px color-mix(in oklab, var(--accent) 22%, transparent); }

.kaoroad-entry-sub { font-size: 11.5px; color: var(--muted); font-weight: 500; }

/* Course list sheet — bottom sheet showing all friends' courses. */

.course-self-cta {

}

.course-self-cta-icon { width: 44px; height: 44px; border-radius: 12px; background: var(--accent); color: #fff; display: grid; place-items: center; font-size: 18px; box-shadow: 0 4px 10px -4px color-mix(in oklab, var(--accent) 50%, transparent); }
.course-self-cta-text { display: flex; flex-direction: column; gap: 2px; }
.course-self-cta-text b { font-size: 14px; color: var(--ink); }
.course-self-cta-text span { font-size: 11.5px; color: var(--muted); }

/* Course card in the list */
.course-card {
  width: 100%; display: flex; flex-direction: column; padding: 0; border: 1px solid var(--border);
  border-radius: 22px; overflow: hidden; background: var(--surface); cursor: pointer; font: inherit; text-align: left;
  transition: transform 0.2s ease, box-shadow 0.22s ease, border-color 0.22s ease;
}
.course-card:hover { transform: translateY(-2px); border-color: color-mix(in oklab, var(--accent) 30%, var(--border)); box-shadow: 0 18px 34px -22px rgba(20,16,12,0.3); }
.course-card.is-saved { border-color: color-mix(in oklab, var(--accent) 36%, var(--border)); box-shadow: inset 0 0 0 1px color-mix(in oklab, var(--accent) 18%, transparent); }
.course-card-cover { position: relative; min-height: 104px; padding: 14px 16px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.course-card-cover::after { content: ''; position: absolute; inset: 0; pointer-events: none; background: linear-gradient(180deg, rgba(0,0,0,0.12) 0%, rgba(0,0,0,0) 40%, rgba(0,0,0,0) 60%, rgba(0,0,0,0.32) 100%); }
.course-card-chain { position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; gap: 5px; max-width: 100%; flex-wrap: nowrap; }
.course-card-chip { width: 38px; height: 38px; border-radius: 11px; display: grid; place-items: center; font-size: 21px; line-height: 1; background: rgba(255,255,255,0.96); box-shadow: 0 4px 10px -4px rgba(0,0,0,0.32), inset 0 0 0 1px rgba(255,255,255,0.6); flex-shrink: 0; }

.course-card-chain-arrow { color: rgba(255,255,255,0.9); font-size: 13px; font-weight: 800; text-shadow: 0 1px 2px rgba(0,0,0,0.35); flex-shrink: 0; }
.course-card-stops-chip { position: absolute; bottom: 10px; left: 12px; padding: 4px 9px; border-radius: 999px; background: rgba(20,16,12,0.7); color: #fff; font-size: 10.5px; font-weight: 700; letter-spacing: 0.02em; backdrop-filter: blur(4px); z-index: 2; line-height: 1.3; }
.course-card-saved-chip { position: absolute; top: 10px; right: 12px; padding: 4px 9px; border-radius: 999px; background: var(--accent); color: #fff; font-size: 10px; font-weight: 800; letter-spacing: 0.04em; box-shadow: 0 4px 10px -4px color-mix(in oklab, var(--accent) 60%, transparent); z-index: 2; line-height: 1.3; }
.course-card-by { position: absolute; top: 10px; left: 12px; display: inline-flex; align-items: center; gap: 7px; padding: 5px 11px 5px 5px; border-radius: 999px; background: rgba(20,16,12,0.72); color: #fff; backdrop-filter: blur(6px); box-shadow: 0 4px 10px -4px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.18); z-index: 2; line-height: 1.3; max-width: calc(100% - 24px); }
.course-card-by-av { width: 22px; height: 22px; border-radius: 50%; display: grid; place-items: center; color: #fff; font-size: 11px; font-weight: 800; flex-shrink: 0; box-shadow: inset 0 0 0 1.5px rgba(255,255,255,0.45); text-shadow: 0 1px 1px rgba(0,0,0,0.3); }
.course-card-by-name { font-size: 12.5px; font-weight: 800; letter-spacing: -0.005em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }
.course-card-by-suffix { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.7); letter-spacing: -0.005em; flex-shrink: 0; }
.course-card-body { padding: 16px 18px 18px; display: flex; flex-direction: column; gap: 10px; }
.course-card-title { font-size: 16.5px; font-weight: 700; letter-spacing: -0.005em; line-height: 1.5; color: var(--ink); word-break: keep-all; overflow-wrap: anywhere; padding-block: 2px; }
.course-card-meta { display: flex; align-items: center; flex-wrap: wrap; gap: 7px 8px; row-gap: 5px; font-size: 12.5px; line-height: 1.55; color: var(--muted); }
.course-card-friend { display: inline-flex; align-items: center; gap: 7px; font-weight: 700; color: var(--ink); line-height: 1.55; padding: 3px 10px 3px 3px; background: color-mix(in oklab, var(--accent) 7%, var(--beige)); border-radius: 999px; border: 1px solid color-mix(in oklab, var(--accent) 14%, transparent); }
.course-card-av { width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; display: grid; place-items: center; color: #fff; font-size: 11px; font-weight: 800; box-shadow: inset 0 0 0 1.5px var(--surface); text-shadow: 0 1px 1px rgba(0,0,0,0.25); }

.course-list-empty { padding: 28px 18px; text-align: center; }
.course-list-empty-icon { font-size: 32px; }
.course-list-empty-title { margin-top: 8px; font-size: 14px; font-weight: 800; color: var(--ink); }
.course-list-empty-sub { margin-top: 4px; font-size: 12px; color: var(--muted); }

/* Course viewer — fullscreen-ish sheet with timeline + map tabs */
.course-view-back { position: fixed; inset: 0; background: rgba(20,16,12,0.5); backdrop-filter: blur(6px); z-index: 220; display: flex; align-items: flex-end; justify-content: center; animation: cListBack 0.22s ease; }
.course-view-sheet { width: 100%; height: 94vh; background: var(--bg); border-radius: 28px 28px 0 0; display: flex; flex-direction: column; overflow: hidden; animation: cListIn 0.34s cubic-bezier(0.32,0.72,0.42,1.15); box-shadow: 0 -12px 32px -10px rgba(20,16,12,0.28); }

.course-view-head-meta { position: relative; z-index: 1; padding-top: 32px; }

.course-view-sub { margin-top: 8px; display: inline-flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 600; opacity: 0.94; }
.course-view-av { width: 18px; height: 18px; border-radius: 50%; box-shadow: inset 0 0 0 1.5px rgba(255,255,255,0.4); }

.course-view-tab.on { color: var(--ink); background: color-mix(in oklab, var(--accent) 8%, transparent); }

/* Timeline view */
.course-timeline { display: flex; flex-direction: column; gap: 4px; }
.course-tl-row { display: grid; grid-template-columns: 30px 1fr; gap: 12px; align-items: stretch; }
.course-tl-rail { position: relative; display: flex; flex-direction: column; align-items: center; padding-top: 6px; }
.course-tl-num { width: 26px; height: 26px; border-radius: 50%; background: var(--accent); color: #fff; display: grid; place-items: center; font-size: 12px; font-weight: 800; box-shadow: 0 6px 14px -6px color-mix(in oklab, var(--accent) 60%, transparent); position: relative; z-index: 2; }
.course-tl-line { flex: 1; width: 2px; margin-top: 4px; background: repeating-linear-gradient(to bottom, color-mix(in oklab, var(--accent) 38%, transparent) 0 5px, transparent 5px 10px); min-height: 24px; }
.course-tl-card { width: 100%; display: flex; gap: 12px; padding: 10px; border-radius: 16px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; font: inherit; text-align: left; transition: transform 0.18s ease, border-color 0.2s ease, box-shadow 0.2s ease; margin-bottom: 12px; }
.course-tl-card:hover { transform: translateY(-1px); border-color: color-mix(in oklab, var(--accent) 30%, var(--border)); box-shadow: 0 12px 24px -22px rgba(20,16,12,0.3); }
.course-tl-cover { width: 76px; min-height: 76px; border-radius: 12px; display: grid; place-items: center; flex-shrink: 0; }

.course-tl-place { font-size: 14.5px; font-weight: 800; color: var(--ink); }
.course-tl-cap { font-size: 12px; color: var(--muted); }

.course-tl-area { font-size: 10.5px; color: var(--muted); font-weight: 600; }
.course-tl-dist { font-size: 10.5px; color: var(--accent); font-weight: 700; margin-left: auto; font-variant-numeric: tabular-nums; }

/* Map view */
.course-map { display: flex; flex-direction: column; gap: 12px; }
.course-map-box { width: 100%; height: 340px; border-radius: 18px; overflow: hidden; border: 1px solid var(--border); background: var(--beige); }
.course-map-carousel { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding: 2px 1px 4px; }
.course-map-carousel::-webkit-scrollbar { display: none; }
.course-map-mini { flex: 0 0 auto; width: 92px; padding: 10px 8px; border-radius: 14px; border: 1.5px solid var(--border); background: var(--surface); cursor: pointer; font: inherit; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: border-color 0.18s ease, transform 0.18s ease; }
.course-map-mini.on { border-color: var(--accent); background: color-mix(in oklab, var(--accent) 8%, var(--surface)); transform: translateY(-1px); }

.course-map-mini-emoji { font-size: 18px; }
.course-map-mini-name { font-size: 10.5px; font-weight: 700; color: var(--ink); line-height: 1.2; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.course-map-detail { display: grid; grid-template-columns: 28px 1fr; gap: 12px; padding: 14px; border-radius: 16px; background: var(--surface); border: 1px solid var(--border); }
.course-map-detail-num { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); color: #fff; display: grid; place-items: center; font-size: 12px; font-weight: 800; }

.course-map-detail-name { font-size: 14.5px; font-weight: 800; color: var(--ink); }
.course-map-detail-cap { font-size: 12px; color: var(--muted); }
.course-map-detail-meta { display: flex; gap: 7px; align-items: center; margin-top: 2px; font-size: 10.5px; color: var(--muted); font-weight: 600; }

/* Map pin overlay (used by CustomOverlay) */
.course-pin {
  width: 30px; height: 30px; border-radius: 50% 50% 50% 8px; background: var(--accent); color: #fff;
  display: grid; place-items: center; font-size: 13px; font-weight: 800; cursor: pointer;

.course-follow-btn:hover { transform: translateY(-1px); }
.course-follow-btn:active { transform: scale(0.99); }
.course-follow-btn.is-saved { background: color-mix(in oklab, var(--accent) 20%, var(--surface)); color: var(--ink); border: 1.5px solid var(--accent); }

/* My 카오로드 gallery in ProfileTab */
.my-course-empty { margin: 0 18px 14px; padding: 24px 18px; border-radius: 18px; background: var(--surface); border: 1px dashed color-mix(in oklab, var(--accent) 30%, var(--border)); text-align: center; }

.my-course-empty-title { margin-top: 6px; font-size: 13.5px; font-weight: 800; color: var(--ink); }

.my-course-title { font-size: 13.5px; font-weight: 700; letter-spacing: -0.005em; line-height: 1.45; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-block: 2px; }
.my-course-sub { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; line-height: 1.55; color: var(--muted); font-weight: 600; }
.my-course-av { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; box-shadow: inset 0 0 0 1.5px var(--surface); }
.my-course-dot { opacity: 0.45; }
.my-course-remove { position: absolute; top: 6px; right: 6px; width: 24px; height: 24px; border-radius: 50%; border: none; background: rgba(20,16,12,0.7); color: #fff; font-size: 11px; cursor: pointer; transition: transform 0.18s ease; }

/* Course-related toast variant */

/* ── Course view header — Play reel CTA ── */
.course-view-reel-btn {

}

.course-view-reel-btn .reel-play-ico {

}

.course-reel-bg { position: absolute; inset: 0; transition: background 0.4s ease; }

.course-reel-emoji {

.course-reel-tag {

}
.course-reel-area {

}

.course-reel-zones {
  position: absolute; inset: 0; z-index: 4;

}
.course-reel-zone { cursor: pointer; }

@media (prefers-reduced-motion: reduce) {
  .course-reel, .course-reel-emoji, .course-reel-stop { animation: none !important; }

}

/* ─────────────────  STOP DETAIL SHEET (timeline row → video/photo + place)  ───────────────── */
.stop-detail-back {

.stop-detail-media {

}
.stop-detail-bg {

}
.stop-detail-video {
  width: 100%; height: 100%;

}
.stop-detail-emoji-wrap {

}
.stop-detail-emoji {

.stop-detail-placeholder {

.stop-detail-vbar {

.stop-detail-cap-text { word-break: keep-all; overflow-wrap: anywhere; }

.stop-detail-nav {

  display: grid; place-items: center;

.stop-detail-nav:hover { background: rgba(0,0,0,0.66); transform: translateY(-50%) scale(1.06); }

.stop-detail-nav.prev { left: 12px; }
.stop-detail-nav.next { right: 12px; }

.stop-detail-info {
  padding: 18px 20px 16px;

}

  display: flex; align-items: center; gap: 8px;

}
.stop-detail-cat {
  padding: 5px 11px; border-radius: 999px;
  background: color-mix(in oklab, var(--accent) 12%, var(--cream));

  letter-spacing: -0.005em;
  border: 1px solid color-mix(in oklab, var(--accent) 22%, transparent);
}
.stop-detail-area {
  font-size: 12.5px; color: var(--muted); font-weight: 600;

}
.stop-detail-name {

.stop-detail-mapwrap {

.stop-mini-pin {

}

}
.stop-detail-trip-place {

.stop-detail-foot {

  padding: 12px 16px;

  line-height: 1.25;

.stop-detail-next-place {

@media (prefers-reduced-motion: reduce) {

  .stop-detail-nav, .stop-detail-next-btn { animation: none !important; transition: none !important; }
